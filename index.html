<!DOCTYPE html>
<html lang="pt-BR">
<head>

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Supabase Configuration ---
        const supabaseUrl = 'https://rrxkmlcxrextfxfrayfp.supabase.co';
        const supabaseKey = 'sb_publishable_CyAbN__kFsKDcDo0eYSlBg_oSEoKrtd';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // --- SQL Instructions Component ---
        const SqlInstructions = ({ onClose }) => (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[60]">
                <div className="bg-white p-6 rounded-lg max-w-3xl w-full m-4 shadow-2xl overflow-y-auto max-h-[90vh]">
                    <h2 className="text-xl font-bold mb-4 text-orange-600">Configuração do Banco de Dados Necessária</h2>
                    <p className="mb-4 text-gray-700">Para conectar o sistema ao Supabase, você precisa criar a tabela no seu banco de dados.</p>
                    <ol className="list-decimal list-inside mb-4 space-y-2 text-sm text-gray-700">
                        <li>Acesse o painel do seu projeto Supabase em <a href="https://rrxkmlcxrextfxfrayfp.supabase.co" target="_blank" className="text-blue-600 underline">rrxkmlcxrextfxfrayfp.supabase.co</a></li>
                        <li>Vá para o <strong>SQL Editor</strong> (ícone de terminal na barra lateral esquerda).</li>
                        <li>Clique em <strong>New Query</strong>.</li>
                        <li>Cole o código SQL abaixo e clique em <strong>Run</strong>.</li>
                    </ol>
                    <pre className="bg-gray-800 text-green-400 p-4 rounded overflow-x-auto text-xs mb-4 font-mono leading-relaxed">
{`-- Tabela para Cambuí
create table if not exists daily_reports_cambui (
  id bigint generated by default as identity primary key,
  frente_id text not null,
  date date not null,
  report_data jsonb not null,
  created_at timestamp with time zone default timezone('utc'::text, now()) not null,
  unique(frente_id, date)
);
alter table daily_reports_cambui enable row level security;
create policy "Public Access" on daily_reports_cambui for all using (true) with check (true);

-- Tabela para Panorama
create table if not exists daily_reports_panorama (
  id bigint generated by default as identity primary key,
  frente_id text not null,
  date date not null,
  report_data jsonb not null,
  created_at timestamp with time zone default timezone('utc'::text, now()) not null,
  unique(frente_id, date)
);
alter table daily_reports_panorama enable row level security;
create policy "Public Access" on daily_reports_panorama for all using (true) with check (true);

-- Tabela para Vale do Verdão
create table if not exists daily_reports_vale_verdao (
  id bigint generated by default as identity primary key,
  frente_id text not null,
  date date not null,
  report_data jsonb not null,
  created_at timestamp with time zone default timezone('utc'::text, now()) not null,
  unique(frente_id, date)
);
alter table daily_reports_vale_verdao enable row level security;
create policy "Public Access" on daily_reports_vale_verdao for all using (true) with check (true);

-- Tabela para Floresta
create table if not exists daily_reports_floresta (
  id bigint generated by default as identity primary key,
  frente_id text not null,
  date date not null,
  report_data jsonb not null,
  created_at timestamp with time zone default timezone('utc'::text, now()) not null,
  unique(frente_id, date)
);
alter table daily_reports_floresta enable row level security;
create policy "Public Access" on daily_reports_floresta for all using (true) with check (true);
`}
                    </pre>
                    <p className="mb-4 text-sm text-gray-500">Após criar a tabela e as políticas, recarregue esta página.</p>
                    <button onClick={onClose} className="bg-orange-600 text-white px-4 py-2 rounded hover:bg-orange-700 font-bold w-full">
                        Entendi, já executei o SQL
                    </button>
                </div>
            </div>
        );

        // --- Icons ---
        const Icons = {
            Check: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>
            ),
            X: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            ),
            Plus: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            ),
            Trash: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            ),
            LayoutDashboard: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
            ),
            Shield: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            ),
            FileSpreadsheet: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>
            ),
            ChevronDown: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"/></svg>
            )
        };

        // --- Notification Component ---
        const ToastNotification = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            return (
                <div className={`fixed bottom-5 right-5 px-6 py-4 rounded-lg shadow-2xl flex items-center space-x-3 transition-all transform duration-500 z-[100] ${type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`}>
                    <div className="font-bold text-lg">
                        {type === 'success' ? <Icons.Check size={24} /> : <Icons.X size={24} />}
                    </div>
                    <div>
                        <h4 className="font-bold text-lg">{type === 'success' ? 'Registrado!' : 'Erro'}</h4>
                        <p className="text-sm font-medium opacity-90">{message}</p>
                    </div>
                    <button onClick={onClose} className="ml-4 hover:bg-white/20 rounded-full p-1 transition-colors">
                        <Icons.X size={16} />
                    </button>
                </div>
            );
        };

        const PlantLogo = ({ plant }) => {
            const [error, setError] = useState(false);
            useEffect(() => setError(false), [plant.id]);

            if (!plant.logoUrl || error) {
                return (
                    <div className={`h-12 w-12 rounded-full flex items-center justify-center text-white font-bold text-xl mr-2 shadow-md ${plant.solidBgClass}`} title={plant.name}>
                        {plant.initials}
                    </div>
                );
            }

            return (
                <img 
                    src={plant.logoUrl} 
                    alt={plant.name} 
                    className="h-12 w-auto object-contain mr-2"
                    onError={() => setError(true)} 
                />
            );
        };

        // --- Initial Data Template ---
        const createInitialData = (frenteId, dateStr, plantId = 'cambui', type = 'plantadora') => {
             const base = {
                id: frenteId,
                title: `Horas Trabalhadas por Equipamentos. ${frenteId}`,
                date: new Date(dateStr + 'T12:00:00').toLocaleDateString('pt-BR'),
                groups: [],
                plantId: plantId // Storing plantId to separate data
             };

             const isCambui = plantId === 'cambui';
             
             // Define default fleets only for Cambuí
             const getFleet = (id, frota) => isCambui ? { id, frota, shiftA: { initial: null, final: null, worked: 0 }, shiftB: { initial: null, final: null, worked: 0 }, totalAB: 0, status: 'ok', obs: '' } : null;
             
             // Helper to create empty item or pre-filled for Cambuí
             const createItem = (id, frota) => ({ 
                id: id || Math.random().toString(36).substr(2, 9), 
                frota: frota || '', 
                shiftA: { initial: null, final: null, worked: 0 }, 
                shiftB: { initial: null, final: null, worked: 0 }, 
                totalAB: 0, 
                status: 'ok', 
                obs: '' 
             });

             const cambuiItems = (items) => isCambui ? items.map(i => createItem(i.id, i.frota)) : [];

             if (type === 'distribuidora') {
                 // Template Distribuidora (similar to F4002)
                 base.groups = [
                    {
                        id: 'colhedoras',
                        name: 'Colhedoras',
                        yield: 0,
                        yieldLabel: 'Rendimento Plantio turno "A"',
                        items: cambuiItems([
                            { id: '6602', frota: '6602' },
                            { id: '6721', frota: '6721' }
                        ])
                    },
                    {
                        id: 'sulcador',
                        name: 'Trator Sulcador',
                        yield: 0,
                        yieldLabel: 'Rendimento Plantio turno "B"',
                        items: cambuiItems([
                            { id: '6966', frota: '6966' },
                            { id: '6967', frota: '6967' },
                            { id: '6968', frota: '6968' }
                        ])
                    },
                    {
                        id: 'distribuidor',
                        name: 'Trator Distribuidor',
                        yield: 0,
                        yieldLabel: 'Velocidade Trabalhada',
                        items: cambuiItems([
                            { id: '6617', frota: '6617' },
                            { id: '6668', frota: '6668' },
                            { id: '6669', frota: '6669' },
                            { id: '6670', frota: '6670' }
                        ])
                    },
                    {
                        id: 'cobridor',
                        name: 'Trator Cobridor',
                        items: cambuiItems([
                            { id: '6069', frota: '6069' },
                            { id: '6071', frota: '6071' },
                            { id: '6364', frota: '6364' }
                        ])
                    },
                    {
                        id: 'transbordo',
                        name: 'Trator Transbordo',
                        items: cambuiItems([
                            { id: '3085', frota: '3085' },
                            { id: '6611', frota: '6611' },
                            { id: '6612', frota: '6612' },
                            { id: '6615', frota: '6615' },
                            { id: '6616', frota: '6616' },
                            { id: '9375', frota: '9375' },
                            { id: '9609', frota: '9609' },
                            { id: '6459', frota: '6459' }
                        ])
                    }
                 ];
             } else {
                 // Template Plantadora (Default / F4001)
                 base.groups = [
                    {
                        id: 'colhedoras',
                        name: 'Colhedoras',
                        yield: 0,
                        yieldLabel: 'Rendimento Plantio turno "A"',
                        items: cambuiItems([
                            { id: '6603', frota: '6603' },
                            { id: '6604', frota: '6604' },
                            { id: '6722', frota: '6722' }
                        ])
                    },
                    {
                        id: 'transbordo',
                        name: 'Trator Transbordo',
                        yield: 0,
                        yieldLabel: 'Rendimento Plantio turno "B"',
                        items: cambuiItems([
                            { id: '6458', frota: '6458' },
                            { id: '9382', frota: '9382' },
                            { id: '6522', frota: '6522' },
                            { id: '6526', frota: '6526' }
                        ])
                    },
                    {
                        id: 'plantadora',
                        name: 'Trator Plantadora',
                        yield: 0,
                        yieldLabel: 'Velocidade Trabalhada',
                        items: cambuiItems([
                            { id: '6671', frota: '6671' },
                            { id: '6685', frota: '6685' }
                        ])
                    }
                 ];
             }
             return base;
        };

        // --- Components ---

        const EquipmentRow = ({ equipment, plant, onChange, onDelete, isLast }) => {
            const handleChange = (field, value) => {
                onChange(equipment.id, field, value);
            };

            const renderNumberInput = (value, fieldPath) => (
                <input
                    type="number"
                    step="0.1"
                    className="w-full h-full bg-transparent text-center focus:outline-none focus:bg-white/50"
                    value={value ?? ''}
                    onChange={(e) => handleChange(fieldPath, e.target.value === '' ? null : parseFloat(e.target.value))}
                />
            );

            return (
                <tr className={`text-sm border-b border-gray-300 ${isLast ? "" : "border-b"}`}>
                    <td className={`border-r border-gray-400 font-bold text-center relative group ${equipment.status === 'issue' ? 'bg-red-500 text-white' : `${plant.solidBgClass} text-white`}`}>
                        <div className="flex items-center justify-between h-full px-1">
                            <input 
                                type="text" 
                                value={equipment.frota} 
                                onChange={(e) => handleChange('frota', e.target.value)}
                                className="w-full bg-transparent text-center text-white font-bold focus:outline-none placeholder-white/50"
                                placeholder="Frota"
                            />
                            <button 
                                onClick={() => onDelete(equipment.id)}
                                className="opacity-0 group-hover:opacity-100 text-white hover:text-red-200 ml-1 transition-opacity"
                                title="Excluir Frota"
                            >
                                <Icons.X size={14} />
                            </button>
                        </div>
                    </td>
                    <td className="border-r border-gray-300 bg-white">{renderNumberInput(equipment.shiftA.initial, 'shiftA.initial')}</td>
                    <td className="border-r border-gray-300 bg-white">{renderNumberInput(equipment.shiftA.final, 'shiftA.final')}</td>
                    <td className="border-r border-gray-400 bg-gray-200 font-bold text-center">{equipment.shiftA.worked.toFixed(1)}</td>
                    <td className="border-r border-gray-300 bg-white">{renderNumberInput(equipment.shiftB.initial, 'shiftB.initial')}</td>
                    <td className="border-r border-gray-300 bg-white">{renderNumberInput(equipment.shiftB.final, 'shiftB.final')}</td>
                    <td className="border-r border-gray-400 bg-gray-200 font-bold text-center">{equipment.shiftB.worked.toFixed(1)}</td>
                    <td className="border-r border-gray-400 bg-gray-200 font-bold text-center">{equipment.totalAB.toFixed(1)}</td>
                    <td className="border-r border-gray-400 text-center cursor-pointer"
                        onClick={() => handleChange('status', equipment.status === 'ok' ? 'issue' : 'ok')}>
                        <div className={`flex items-center justify-center h-full w-full ${equipment.status === 'ok' ? 'text-green-600' : 'bg-red-600 text-white'}`}>
                            {equipment.status === 'ok' ? <Icons.Check size={16} /> : <Icons.X size={16} />}
                        </div>
                    </td>
                    <td className={`text-center p-0 relative ${equipment.obs.toLowerCase().includes('oficina') ? 'bg-red-500 text-white' : 'bg-green-600 text-white'}`}>
                        <input
                            type="text"
                            className="w-full h-full bg-transparent text-center text-white placeholder-white/70 focus:outline-none"
                            value={equipment.obs}
                            onChange={(e) => handleChange('obs', e.target.value)}
                        />
                    </td>
                </tr>
            );
        };

        const EquipmentGroupTable = ({ group, plant, onUpdateEquipment, onUpdateGroup, onAddEquipment, onDeleteEquipment }) => {
            const handleRowChange = (equipmentId, field, value) => {
                onUpdateEquipment(group.id, equipmentId, field, value);
            };

            const totalShiftA = group.items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
            const totalShiftB = group.items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
            const totalAB = totalShiftA + totalShiftB;
            
            const count = group.items.length;
            const avgShiftA = count > 0 ? totalShiftA / count : 0;
            const avgShiftB = count > 0 ? totalShiftB / count : 0;
            const avgTotal = avgShiftA + avgShiftB;

            return (
                <div className={`mb-6 border-2 ${plant.borderClass}`}>
                    <div className={`${plant.solidBgClass} text-white text-center font-bold border-b border-black py-1`}>
                        {group.name}
                    </div>
                    <div className="flex">
                        <div className="flex-grow">
                            <table className="w-full border-collapse">
                                <thead>
                                    <tr className={`${plant.solidBgClass} text-white text-xs`}>
                                        <th className="border border-gray-400 p-1 w-20">Frota</th>
                                        <th className="border border-gray-400 p-1 w-20">Hor.Inicial</th>
                                        <th className="border border-gray-400 p-1 w-20">Hor.Final</th>
                                        <th className="border border-gray-400 p-1 w-16">H.Trab.(A)</th>
                                        <th className="border border-gray-400 p-1 w-20">Hor.Inicial</th>
                                        <th className="border border-gray-400 p-1 w-20">Hor.Final</th>
                                        <th className="border border-gray-400 p-1 w-16">H.Trab.(B)</th>
                                        <th className="border border-gray-400 p-1 w-16">Total A-B</th>
                                        <th className="border border-gray-400 p-1 w-10">Status</th>
                                        <th className="border border-gray-400 p-1">Obs.</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {group.items.map((item, index) => (
                                        <EquipmentRow 
                                            key={item.id} 
                                            equipment={item} 
                                            plant={plant}
                                            onChange={handleRowChange}
                                            onDelete={(id) => onDeleteEquipment(group.id, id)}
                                            isLast={index === group.items.length - 1}
                                        />
                                    ))}
                                    <tr className="bg-white">
                                        <td colSpan={10} className="p-1 text-center border-t border-gray-300">
                                            <button 
                                                onClick={() => onAddEquipment(group.id)}
                                                className="text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1 px-4 rounded inline-flex items-center"
                                            >
                                                <Icons.Plus size={12} className="mr-1"/> Adicionar Frota
                                            </button>
                                        </td>
                                    </tr>
                                    <tr className={`${plant.bgClass} font-bold text-xs border-t-2 ${plant.borderClass}`}>
                                        <td colSpan={3} className="text-right pr-2 border-r border-gray-400 py-1">TOTAL HRS GERAL TURNO A</td>
                                        <td className="text-center border-r border-gray-400 bg-white">{totalShiftA.toFixed(1).replace('.', ',')}</td>
                                        <td colSpan={2} className="text-right pr-2 border-r border-gray-400">TOTAL HRS GERAL TURNO B</td>
                                        <td className="text-center border-r border-gray-400 bg-white">{totalShiftB.toFixed(1).replace('.', ',')}</td>
                                        <td className="text-center border-r border-gray-400 bg-white">{totalAB.toFixed(1).replace('.', ',')}</td>
                                        <td colSpan={2} className="bg-green-600"></td>
                                    </tr>
                                    <tr className="bg-total-yellow font-bold text-xs border-t border-orange-500">
                                        <td colSpan={3} className="text-center py-1 border-r border-gray-400">SOMA MÉDIA "A"</td>
                                        <td className="text-center border-r border-gray-400">{avgShiftA.toFixed(1).replace('.', ',')}</td>
                                        <td colSpan={2} className="text-center border-r border-gray-400">SOMA MÉDIA "B"</td>
                                        <td className="text-center border-r border-gray-400">{avgShiftB.toFixed(1).replace('.', ',')}</td>
                                        <td className="text-center border-r border-gray-400">{avgTotal.toFixed(1).replace('.', ',')}</td>
                                        <td colSpan={2} className="bg-green-600"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        {group.yield !== undefined && (
                            <div className="w-32 bg-green-600 border-l border-black flex flex-col items-center justify-center text-center p-2 relative">
                                <div className="text-white text-xs font-bold mb-2">{group.yieldLabel || 'Rendimento'}</div>
                                <input 
                                    type="number" 
                                    step="0.01"
                                    value={group.yield}
                                    onChange={(e) => onUpdateGroup(group.id, 'yield', parseFloat(e.target.value) || 0)}
                                    className="text-4xl font-bold text-black bg-white/30 w-full text-center focus:outline-none focus:bg-white rounded"
                                />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const Dashboard = ({ data, allData, selectedDate, plant }) => {
            const chartRef = useRef(null);
            const pieRef = useRef(null);
            const frenteChartRef = useRef(null);
            const rendimentoChartRef = useRef(null);
            const acumuladoChartRef = useRef(null);
            const [rangeDays, setRangeDays] = useState(7);
            const [showComparison, setShowComparison] = useState(false);

            const allItems = data.groups.flatMap(g => g.items);
            const totalHoursA = allItems.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
            const totalHoursB = allItems.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
            const totalIssues = allItems.filter(i => i.status === 'issue').length;
            const totalMachines = allItems.length;

            const frentesSummary = useMemo(() => {
                if (!allData) return [];
                return Object.keys(allData).map(frenteId => {
                    const report = allData[frenteId]?.[selectedDate];
                    if (!report) {
                        return {
                            id: frenteId,
                            totalA: 0,
                            totalB: 0,
                            totalIssues: 0,
                            totalMachines: 0,
                            operational: 0,
                            availability: 0,
                            avgHoursPerMachine: 0,
                            plantioHours: 0,
                            plantioYield: 0,
                            plantioGroupName: ''
                        };
                    }
                    const items = report.groups.flatMap(g => g.items);
                    const totalA = items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
                    const totalB = items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
                    const issues = items.filter(i => i.status === 'issue').length;
                    const machines = items.length;
                    const operational = machines - issues;
                    const totalHours = totalA + totalB;
                    const availability = machines > 0 ? operational / machines : 0;
                    const avgHoursPerMachine = machines > 0 ? totalHours / machines : 0;

                    let plantioHours = 0;
                    let plantioYield = 0;
                    let plantioGroupName = '';
                    let targetGroupId = null;

                    if (report.groups.some(g => g.id === 'tortao' || g.id === 'sulcador')) {
                        targetGroupId = 'distribuidor';
                    } else if (report.groups.some(g => g.id === 'plantadora')) {
                        targetGroupId = 'plantadora';
                    }

                    if (targetGroupId) {
                        const g = report.groups.find(gr => gr.id === targetGroupId);
                        if (g) {
                            plantioGroupName = g.name;
                            plantioHours = g.items.reduce((acc, item) => acc + (item.totalAB || 0), 0);
                            plantioYield = typeof g.yield === 'number' ? g.yield : parseFloat(g.yield) || 0;
                        }
                    }

                    return {
                        id: frenteId,
                        totalA,
                        totalB,
                        totalIssues: issues,
                        totalMachines: machines,
                        operational,
                        availability,
                        avgHoursPerMachine,
                        plantioHours,
                        plantioYield,
                        plantioGroupName
                    };
                });
            }, [allData, selectedDate]);

            const frenteGroups = useMemo(() => {
                if (!allData || !selectedDate) return [];
                return Object.keys(allData).map(frenteId => {
                    const report = allData[frenteId]?.[selectedDate];
                    if (!report) return null;
                    const labels = report.groups.map(g => g.name);
                    const horasA = report.groups.map(g => g.items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0));
                    const horasB = report.groups.map(g => g.items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0));
                    return {
                        id: frenteId,
                        labels,
                        horasA,
                        horasB
                    };
                }).filter(Boolean);
            }, [allData, selectedDate]);

            const rendimentoSeries = useMemo(() => {
                const getGroup = (frenteId, groupId) => {
                    const report = allData?.[frenteId]?.[selectedDate];
                    if (!report) return null;
                    return report.groups.find(g => g.id === groupId) || null;
                };

                const plantadora = getGroup('F4001', 'plantadora');
                const distribuidor = getGroup('F4002', 'distribuidor');

                const calc = (group) => {
                    if (!group) return { hours: 0, yield: 0 };
                    const hours = group.items.reduce((acc, item) => acc + (item.totalAB || 0), 0);
                    const y = typeof group.yield === 'number' ? group.yield : parseFloat(group.yield) || 0;
                    return { hours, yield: y };
                };

                const p = calc(plantadora);
                const d = calc(distribuidor);

                return {
                    labels: ['F4001 Plantadora', 'F4002 Distribuidor'],
                    hours: [p.hours, d.hours],
                    yields: [p.yield, d.yield]
                };
            }, [allData, selectedDate]);

            const acumuladoSummary = useMemo(() => {
                if (!allData || !selectedDate) return [];
                const selected = new Date(selectedDate);
                const min = new Date(selected);
                min.setUTCDate(min.getUTCDate() - (rangeDays - 1));

                return Object.keys(allData).map(frenteId => {
                    const dias = allData[frenteId] || {};
                    let totalA = 0;
                    let totalB = 0;
                    Object.entries(dias).forEach(([dateStr, report]) => {
                        const d = new Date(dateStr);
                        if (d >= min && d <= selected) {
                            const items = report.groups.flatMap(g => g.items);
                            totalA += items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
                            totalB += items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
                        }

                    return {

                        totalA,
                        totalB
                    };

                const pieCtx = pieRef.current.getContext('2d');

                if (frenteChartRef.current) {

                    if (window.myFrenteGroupCharts) {

                        </div>

                    </div>

                    {showComparison && (

                            <h3 className="font-bold text-gray-700 mb-4">Resumo por Frente (dia selecionado)</h3>

                                {frentesSummary.map(f => (

                                        <div className="flex justify-between text-xs">

                                                            {f.plantioHours.toFixed(1).replace('.', ',')}h

                                                        </span>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="h-64">
                                    <canvas ref={frenteChartRef}></canvas>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="min-w-full text-xs">
                                        <thead>
                                            <tr className="bg-gray-100 text-gray-700">
                                                <th className="px-2 py-1 border">Frente</th>
                                                <th className="px-2 py-1 border">Horas A</th>
                                                <th className="px-2 py-1 border">Horas B</th>
                                                <th className="px-2 py-1 border">Total</th>
                                                <th className="px-2 py-1 border">Operacionais</th>
                                                <th className="px-2 py-1 border">Disponib.</th>
                                                <th className="px-2 py-1 border">Média h/equip.</th>

                                        </thead>
                                        <tbody>
                                            {frentesSummary.map(f => (

                                                >

                    )}

                    {showComparison && (

        const AdminPanel = ({ session, plants, onClose, onLoadEntry }) => {
            const [activeTab, setActiveTab] = useState('history');
            const [selectedPlant, setSelectedPlant] = useState('cambui');
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(false);
            const [users, setUsers] = useState([]); // Mock users for now or fetch if possible

            useEffect(() => {
                if (activeTab === 'history') fetchHistory();
            }, [activeTab, selectedPlant]);

            const getTableName = (plantId) => {
                if (plantId === 'cambui') return 'daily_reports_cambui';
                if (plantId === 'panorama') return 'daily_reports_panorama';
                if (plantId === 'vale-verdao') return 'daily_reports_vale_verdao';
                if (plantId === 'floresta') return 'daily_reports_floresta';
                return 'daily_reports';
            };

            const fetchHistory = async () => {
                setLoading(true);
                const tableName = getTableName(selectedPlant);
                
                const { data, error } = await supabaseClient
                    .from(tableName)
                    .select('*')
                    .order('date', { ascending: false });
                
                if (error) {
                    console.error("Admin Fetch Error:", error);
                    alert("Erro ao buscar histórico: " + error.message);
                } else {
                    setHistory(data || []);
                }
                setLoading(false);
            };

            const handleDelete = async (record) => {
                if (!confirm(`Tem certeza que deseja excluir o registro de ${record.date} da frente ${record.frente_id}?`)) return;
                
                const tableName = getTableName(selectedPlant);
                // Try deleting by ID if available, otherwise by composite key
                let query = supabaseClient.from(tableName).delete();
                
                if (record.id) {

                    const groupB = groups.find(g => g.id === 'tortao' || g.id === 'sulcador');
                    targetGroupId = 'distribuidor';
                    yieldA = groupA ? (parseFloat(groupA.yield) || 0) : 0;
                    yieldB = groupB ? (parseFloat(groupB.yield) || 0) : 0;
                } else {
                    const groupA = groups.find(g => g.id === 'colhedoras');
                    const groupB = groups.find(g => g.id === 'transbordo');
                    targetGroupId = 'plantadora';
                    yieldA = groupA ? (parseFloat(groupA.yield) || 0) : 0;
                    yieldB = groupB ? (parseFloat(groupB.yield) || 0) : 0;
                }

                return groups.map(group => {
                    if (group.id !== targetGroupId) return group;
                    
                    const totalHours = group.items.reduce((acc, item) => acc + (item.totalAB || 0), 0);
                    let speed = 0;
                    if (totalHours > 0) {
                        // Formula: ((YieldA + YieldB) * 6666 / TotalHours / 1000) - 30%
                        const raw = ((yieldA + yieldB) * 6666) / totalHours / 1000;
                        speed = raw * 0.7; // -30%
                    }
                    return { ...group, yield: parseFloat(speed.toFixed(2)) };
                });
            };

            const updateEquipment = (groupId, equipmentId, field, value) => {
                setAllData(prev => {
                    const currentFrente = prev[activeFrenteId] || {};
                    const currentReport = currentFrente[selectedDate];
                    if (!currentReport) return prev;

                    // 1. Update Current Day
                    const newGroups = currentReport.groups.map(group => {
                        if (group.id !== groupId) return group;

                        const newItems = group.items.map(item => {
                            if (item.id !== equipmentId) return item;

                            const newItem = { ...item };
                            const setNested = (obj, path, val) => {
                                const last = path.pop();
                                const target = path.reduce((o, key) => o[key], obj);
                                if (last) target[last] = val;
                            };

                            const pathParts = field.split('.');
                            
                            // Apply change
                            if (pathParts.length === 1) {
                                newItem[field] = value;
                            } else {
                                if (pathParts[0] === 'shiftA' || pathParts[0] === 'shiftB') {
                                    const shift = pathParts[0];
                                    const prop = pathParts[1];
                                    newItem[shift] = { ...newItem[shift], [prop]: value };
                                    
                                    // Auto-calc worked hours
                                    const init = newItem[shift].initial;
                                    const fin = newItem[shift].final;
                                    if (init !== null && fin !== null) {
                                        newItem[shift].worked = fin - init;
                                    } else {
                                        newItem[shift].worked = 0;
                                    }
                                } else {
                                    setNested(newItem, pathParts, value);
                                }
                            }

                            // AUTO-FILL: Shift A Final <-> Shift B Initial (Intra-day Bidirectional)
                            if (field === 'shiftA.final' && value !== null) {
                                newItem.shiftB = { ...newItem.shiftB, initial: value };
                                // Re-calc Shift B worked
                                const bInit = value;
                                const bFin = newItem.shiftB.final;
                                if (bInit !== null && bFin !== null) {
                                    newItem.shiftB.worked = bFin - bInit;
                                }
                            }
                            if (field === 'shiftB.initial' && value !== null) {
                                newItem.shiftA = { ...newItem.shiftA, final: value };
                                // Re-calc Shift A worked
                                const aInit = newItem.shiftA.initial;
                                const aFin = value;
                                if (aInit !== null && aFin !== null) {
                                    newItem.shiftA.worked = aFin - aInit;
                                }
                            }

                            newItem.totalAB = (newItem.shiftA.worked || 0) + (newItem.shiftB.worked || 0);
                            return newItem;
                        });
                        return { ...group, items: newItems };
                    });
                    
                    const newCurrentDayData = { ...currentReport, groups: recalculateSpeed(newGroups) };
                    let newFrenteData = { ...currentFrente, [selectedDate]: newCurrentDayData };

                    // 2. AUTO-FILL: Shift B Final -> Next Day Shift A Initial (Inter-day Forward)
                    if (field === 'shiftB.final' && value !== null) {
                        const nextDate = getNextDate(selectedDate);

                        if (currentFrente[nextDate]) {
                             const nextDayReport = currentFrente[nextDate];
                             const nextGroups = nextDayReport.groups.map(group => {
                                 if (group.id !== groupId) return group;

                                 const newItems = group.items.map(item => {
                                     if (item.id !== equipmentId) return item;
                                     
                                     // Update Shift A Initial
                                     const newItem = { 
                                         ...item,
                                         shiftA: { ...item.shiftA, initial: value }
                                     };
                                     
                                     // Re-calc Shift A worked
                                     const init = value;
                                     const fin = newItem.shiftA.final;
                                     if (init !== null && fin !== null) {
                                         newItem.shiftA.worked = fin - init;
                                     } else {
                                         newItem.shiftA.worked = 0;
                                     }
                                     
                                     newItem.totalAB = (newItem.shiftA.worked || 0) + (newItem.shiftB.worked || 0);
                                     return newItem;
                                 });
                                 return { ...group, items: newItems };
                             });
                             
                             newFrenteData[nextDate] = { ...nextDayReport, groups: recalculateSpeed(nextGroups) };
                        }
                    }

                    // 3. AUTO-FILL: Shift A Initial -> Prev Day Shift B Final (Inter-day Backward)
                    if (field === 'shiftA.initial' && value !== null) {
                        const prevDate = getPrevDate(selectedDate);

                        if (currentFrente[prevDate]) {
                             const prevDayReport = currentFrente[prevDate];
                             const prevGroups = prevDayReport.groups.map(group => {
                                 if (group.id !== groupId) return group;

                                 const newItems = group.items.map(item => {
                                     if (item.id !== equipmentId) return item;
                                     
                                     // Update Shift B Final
                                     const newItem = { 
                                         ...item,
                                         shiftB: { ...item.shiftB, final: value }
                                     };
                                     
                                     // Re-calc Shift B worked
                                     const init = newItem.shiftB.initial;
                                     const fin = value;
                                     if (init !== null && fin !== null) {
                                         newItem.shiftB.worked = fin - init;
                                     } else {
                                         newItem.shiftB.worked = 0;
                                     }
                                     
                                     newItem.totalAB = (newItem.shiftA.worked || 0) + (newItem.shiftB.worked || 0);
                                     return newItem;
                                 });
                                 return { ...group, items: newItems };
                             });
                             
                             newFrenteData[prevDate] = { ...prevDayReport, groups: recalculateSpeed(prevGroups) };
                        }
                    }
                    
                    return {
                        ...prev,
                        [activeFrenteId]: newFrenteData
                    };
                });
            };

            const updateGroup = (groupId, field, value) => {
                setAllData(prev => {
                    const currentFrente = prev[activeFrenteId] || {};
                    const currentReport = currentFrente[selectedDate];
                    if (!currentReport) return prev;

                    const newGroups = currentReport.groups.map(group => {
                        if (group.id !== groupId) return group;
                        return { ...group, [field]: value };
                    });

                    return {
                        ...prev,
                        [activeFrenteId]: {
                            ...currentFrente,
                            [selectedDate]: { ...currentReport, groups: recalculateSpeed(newGroups) }
                        }
                    };
                });
            };

            const addEquipment = (groupId) => {
                 setAllData(prev => {
                    const currentFrente = prev[activeFrenteId] || {};
                    const currentReport = currentFrente[selectedDate];
                    if (!currentReport) return prev;

                    const newGroups = currentReport.groups.map(group => {
                        if (group.id !== groupId) return group;
                        
                        const newId = Date.now().toString();
                        const newItem = { 
                            id: newId, 
                            frota: 'NOVA', 
                            shiftA: { initial: null, final: null, worked: 0 }, 
                            shiftB: { initial: null, final: null, worked: 0 }, 
                            totalAB: 0, 
                            status: 'ok', 
                            obs: '' 
                        };
                        
                        return { ...group, items: [...group.items, newItem] };
                    });

                    return {
                        ...prev,
                        [activeFrenteId]: {
                            ...currentFrente,
                            [selectedDate]: { ...currentReport, groups: recalculateSpeed(newGroups) }
                        }
                    };
                });
            };

            const deleteEquipment = (groupId, equipmentId) => {
                 if(!confirm("Tem certeza que deseja remover esta frota?")) return;
                 setAllData(prev => {
                    const currentFrente = prev[activeFrenteId] || {};
                    const currentReport = currentFrente[selectedDate];
                    if (!currentReport) return prev;

                    const newGroups = currentReport.groups.map(group => {
                        if (group.id !== groupId) return group;
                        return { ...group, items: group.items.filter(i => i.id !== equipmentId) };
                    });

                    return {
                        ...prev,
                        [activeFrenteId]: {
                            ...currentFrente,
                            [selectedDate]: { ...currentReport, groups: recalculateSpeed(newGroups) }
                        }
                    };
                 });
            };

            const addNewFrente = () => {
                setNewFrenteName('');
                setNewFrenteType('plantadora');
                setShowNewFrenteModal(true);
            };

            const handleCreateFrente = () => {
                const name = newFrenteName.trim().toUpperCase();
                if (!name) {
                    alert("Digite um nome válido.");
                    return;
                }
                if (allData[name]) {
                    alert("Frente já existe!");
                    return;
                }

                setAllData(prev => ({
                    ...prev,
                    [name]: { [selectedDate]: createInitialData(name, selectedDate, plantId, newFrenteType) }
                }));
                setActiveFrenteId(name);
                setShowNewFrenteModal(false);
            };

            const deleteFrente = async () => {
                if (Object.keys(allData).length <= 1) {
                    alert("Você deve ter pelo menos uma frente.");
                    return;
                }
                if (confirm(`Tem certeza que deseja excluir a ${activeFrenteId}?`)) {
                    // Delete from Supabase
                    let tableName = 'daily_reports'; // fallback default
                    if (plantId === 'cambui') tableName = 'daily_reports_cambui';
                    else if (plantId === 'panorama') tableName = 'daily_reports_panorama';
                    else if (plantId === 'vale-verdao') tableName = 'daily_reports_vale_verdao';
                    else if (plantId === 'floresta') tableName = 'daily_reports_floresta';

                    const { error } = await supabaseClient
                        .from(tableName)
                        .delete()
                        .eq('frente_id', activeFrenteId);

                    if (error) console.error("Delete Error", error);

                    setAllData(prev => {
                        const newData = { ...prev };
                        delete newData[activeFrenteId];
                        return newData;
                    });
                    // Find next available key locally (since state update is async, use current allData keys excluding deleted)
                    const remaining = Object.keys(allData).filter(k => k !== activeFrenteId);
                    if (remaining.length > 0) setActiveFrenteId(remaining[0]);
                }
            };

            const handleLoadEntry = (targetPlantId, targetDate, targetFrenteId) => {
                setPlantId(targetPlantId);
                setSelectedDate(targetDate);
                setActiveFrenteId(targetFrenteId);
                setShowAdminPanel(false);
                setRefreshTrigger(prev => prev + 1); // Ensure we have fresh data
                setNotification({ message: `Carregando dados de ${targetFrenteId}...`, type: 'success' });
            };

            if (!session) {
                return <Auth plants={PLANTS} />;
            }

            if (showAdminPanel) {
                return <AdminPanel 
                    session={session} 
                    plants={PLANTS} 
                    onClose={() => {
                        setShowAdminPanel(false);
                        setRefreshTrigger(prev => prev + 1); // Refresh data on close in case of deletions
                    }} 
                    onLoadEntry={handleLoadEntry} 
                />;
            }

            return (
                <div className="min-h-screen bg-gray-100 font-sans">
                    {notification && (
                        <ToastNotification 
                            message={notification.message} 
                            type={notification.type} 
                            onClose={() => setNotification(null)} 
                        />
                    )}
                    {showNewFrenteModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                            <div className="bg-white rounded-lg p-6 w-96 shadow-2xl">
                                <h2 className="text-xl font-bold mb-4 text-gray-800">Nova Frente</h2>
                                
                                <div className="mb-4">
                                    <label className="block text-sm font-bold mb-1 text-gray-700">Nome da Frente</label>
                                    <input 
                                        type="text" 
                                        value={newFrenteName}
                                        onChange={(e) => setNewFrenteName(e.target.value)}
                                        className="w-full border border-gray-300 p-2 rounded uppercase focus:outline-none focus:border-blue-500 text-black"
                                        placeholder="EX: F4003"
                                        autoFocus
                                    />
                                </div>

                                <div className="mb-6">
                                    <label className="block text-sm font-bold mb-2 text-gray-700">Tipo de Frente</label>
                                    <div className="flex space-x-4">
                                        <label className="flex items-center space-x-2 cursor-pointer">
                                            <input 
                                                type="radio" 
                                                name="frenteType"
                                                value="plantadora"
                                                checked={newFrenteType === 'plantadora'}
                                                onChange={(e) => setNewFrenteType(e.target.value)}
                                                className="form-radio text-green-600 h-4 w-4"
                                            />
                                            <span className="text-gray-800">Plantadora</span>
                                        </label>
                                        <label className="flex items-center space-x-2 cursor-pointer">
                                            <input 
                                                type="radio" 
                                                name="frenteType"
                                                value="distribuidora"
                                                checked={newFrenteType === 'distribuidora'}
                                                onChange={(e) => setNewFrenteType(e.target.value)}
                                                className="form-radio text-blue-600 h-4 w-4"
                                            />
                                            <span className="text-gray-800">Distribuidora</span>
                                        </label>
                                    </div>
                                </div>

                                <div className="flex justify-end space-x-2">
                                    <button 
                                        onClick={() => setShowNewFrenteModal(false)}
                                        className="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400 text-gray-800 font-medium"
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        onClick={handleCreateFrente}
                                        className="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 font-bold"
                                    >
                                        Criar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    {showSql && <SqlInstructions onClose={() => setShowSql(false)} />}
                    {isLoading && (
                        <div className="fixed inset-0 bg-white/80 flex items-center justify-center z-50">
                            <div className={`animate-spin rounded-full h-16 w-16 border-t-4 ${plant.borderClass}`}></div>
                        </div>
                    )}
                    {/* Top Navigation Bar */}
                    <div className="bg-gray-800 text-white shadow-lg sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center space-x-4">
                                <div className="flex flex-col relative group">
                                    <div className="flex items-center space-x-2 cursor-pointer">
                                        <select 
                                            value={plantId} 
                                            onChange={(e) => setPlantId(e.target.value)}
                                            className={`text-xl font-bold ${plant.color} tracking-tighter bg-gray-800 border-none focus:ring-0 cursor-pointer appearance-none pr-6`}
                                        >
                                            {PLANTS.map(p => (
                                                <option key={p.id} value={p.id} className="text-black bg-white">{p.name}</option>
                                            ))}
                                        </select>
                                        <Icons.ChevronDown size={16} className={`absolute right-0 top-1.5 pointer-events-none ${plant.color}`} />
                                    </div>
                                    <span className="text-xs text-white font-normal block">Sistema de Gestão</span>
                                </div>
                                <div className="h-8 w-px bg-gray-600 mx-2"></div>
                                <div className="flex space-x-2">
                                    <button 
                                        onClick={() => setView('entry')}
                                        className={`px-3 py-1 rounded flex items-center space-x-1 ${view === 'entry' ? 'bg-orange-600 text-white' : 'text-gray-300 hover:text-white hover:bg-gray-700'}`}
                                    >
                                        <Icons.FileSpreadsheet size={18} />
                                        <span>Lançamento</span>
                                    </button>
                                    <button 
                                        onClick={() => setView('dashboard')}
                                        className={`px-3 py-1 rounded flex items-center space-x-1 ${view === 'dashboard' ? 'bg-orange-600 text-white' : 'text-gray-300 hover:text-white hover:bg-gray-700'}`}
                                    >
                                        <Icons.LayoutDashboard size={18} />
                                        <span>Dashboard</span>
                                    </button>
                                </div>
                            </div>

                            <div className="flex items-center space-x-4">
                                <button 
                                    onClick={handleSave} 
                                    disabled={isSaving}
                                    className={`flex items-center space-x-1 px-4 py-1 rounded font-bold shadow-lg transition-all ${isSaving ? 'bg-gray-500 cursor-not-allowed' : 'bg-green-600 hover:bg-green-500 text-white'}`}
                                    title="Salvar alterações no banco de dados"
                                >
                                    {isSaving ? (
                                        <div className="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
                                    ) : (
                                        <Icons.Check size={18} />
                                    )}
                                    <span>{isSaving ? 'Salvando...' : 'Salvar'}</span>
                                </button>

                                <div className="h-6 w-px bg-gray-600 mx-2"></div>

                                <div className="flex items-center bg-gray-700 rounded px-2 py-1 border border-gray-600">
                                    <span className="text-gray-400 text-sm mr-2">Data do Lançamento:</span>
                                    <input 
                                        type="date" 
                                        value={selectedDate}
                                        onChange={(e) => {
                                            if (e.target.value) setSelectedDate(e.target.value);
                                        }}
                                        className="bg-white text-black rounded px-2 py-1 focus:outline-none text-sm font-bold cursor-pointer"
                                    />
                                </div>

                                <div className="h-6 w-px bg-gray-600 mx-2"></div>

                                <label className="text-sm text-gray-400">Frente:</label>
                                <select 
                                    value={activeFrenteId} 
                                    onChange={(e) => setActiveFrenteId(e.target.value)}
                                    className="bg-gray-700 text-white border border-gray-600 rounded px-2 py-1 focus:outline-none focus:border-orange-500"
                                >
                                    {Object.keys(allData).map(key => (
                                        <option key={key} value={key}>{key}</option>
                                    ))}
                                </select>
                                <button onClick={addNewFrente} className="bg-green-600 hover:bg-green-700 p-1 rounded text-white" title="Adicionar Frente">
                                    <Icons.Plus size={20} />
                                </button>
                                <button onClick={deleteFrente} className="bg-red-600 hover:bg-red-700 p-1 rounded text-white" title="Excluir Frente Atual">
                                    <Icons.Trash size={20} />
                                </button>
                                
                                <div className="h-6 w-px bg-gray-600 mx-2"></div>
                                
                                {isAdmin && (
                                    <>
                                        <button 
                                            onClick={() => setShowAdminPanel(true)} 
                                            className="text-red-400 hover:text-red-300 p-1 rounded" 
                                            title="Painel Administrativo"
                                        >
                                            <Icons.Shield size={24} />
                                        </button>
                                        <div className="h-6 w-px bg-gray-600 mx-2"></div>
                                    </>
                                )}

                                <button 
                                    onClick={() => supabaseClient.auth.signOut()} 
                                    className="text-gray-300 hover:text-white text-sm font-medium flex items-center space-x-1"
                                    title="Sair do sistema"
                                >
                                    <span>Sair</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto p-4">
                        {view === 'entry' ? (
                            <div className="bg-white p-4 shadow-lg rounded">
                                {currentData ? (
                                    <>
                                        {/* Report Header */}
                                        <div className="bg-white mb-4">
                                            <div className={`flex justify-between items-end border-b-2 ${plant.borderClass} pb-2 mb-2`}>
                                                <div className="w-48 flex items-center space-x-2">
                                                    <PlantLogo plant={plant} />
                                                    <div className="block"> 
                                                        <div className={`text-3xl font-black ${plant.color} tracking-tighter leading-none`}>{plant.name}</div>
                                                        <div className="text-sm font-bold text-black leading-none ml-1">{plant.subtitle}</div>
                                                    </div>
                                                </div>
                                                <div className="text-center flex-grow px-4">
                                                    <h1 className={`text-2xl font-bold italic text-black ${plant.bgClass} rounded px-2`}>
                                                        Horas Trabalhadas por Equipamentos. {activeFrenteId}
                                                    </h1>
                                                </div>
                                                <div className="w-32"></div>
                                            </div>
                                            
                                            <div className="flex border border-black text-xs font-bold text-center bg-gray-100">
                                                <div className="w-24 border-r border-black flex items-center justify-center p-1 bg-white">Turnos</div>
                                                <div className="flex-grow flex flex-col">
                                                    <div className="border-b border-black p-1 bg-white">FECHAMENTO HORIMETRO</div>
                                                    <div className="flex flex-grow">
                                                        <div className="w-1/2 border-r border-black p-1 bg-white">"A"</div>
                                                        <div className="w-1/2 p-1 bg-white">"B"</div>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className={`${plant.solidBgClass} text-center font-bold text-xl border-x border-b border-black py-1 text-white mt-1 shadow-md`}>
                                                Horimetro das Colhedoras e Tratores
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 gap-4">
                                            {currentData.groups.map(group => (
                                                <EquipmentGroupTable 
                                                    key={group.id} 
                                                    group={group} 
                                                    plant={plant}
                                                    onUpdateEquipment={updateEquipment}
                                                    onUpdateGroup={updateGroup}
                                                    onAddEquipment={addEquipment}
                                                    onDeleteEquipment={deleteEquipment}
                                                />
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="text-center py-20">
                                        <div className="text-gray-400 text-xl mb-4">Nenhuma frente selecionada ou cadastrada para esta unidade.</div>
                                        <button 
                                            onClick={addNewFrente}
                                            className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded shadow-lg"
                                        >
                                            <Icons.Plus size={20} className="inline mr-2" />
                                            Criar Nova Frente
                                        </button>
                                    </div>
                                )}
                            </div>
                        ) : (
                            currentData ? (
                                <Dashboard data={currentData} allData={allData} selectedDate={selectedDate} plant={plant} />
                            ) : (
                                <div className="text-center py-20 text-gray-400">Nenhum dado para exibir no Dashboard.</div>
                            )
                        )}
                        
                        <div className="mt-8 text-gray-500 text-xs text-center pb-8">
                            <p>Sistema Avançado de Gestão de Horimetro - {plant.name} v2.0</p>
                            <button 
                                onClick={() => {
                                    if (confirm('ATENÇÃO: Isso apagará TODAS as frentes e dados. Deseja continuar?')) {
                                        setAllData({ 'F4001': { [selectedDate]: createInitialData('F4001', selectedDate, plantId, 'plantadora') } });
                                        localStorage.removeItem('horimetro-advanced-data-v2');
                                        localStorage.removeItem('horimetro-advanced-data');
                                        localStorage.removeItem('horimetro-data');
                                        setActiveFrenteId('F4001');
                                    }
                                }}
                                className="mt-2 text-red-500 hover:underline"
                            >
                                Resetar Tudo para Padrão
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
