            };

            const parseExcel = (f) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    // Use cellDates: true to ensure dates are parsed as Date objects
                    const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    setParsedData(json);
                };
                reader.readAsArrayBuffer(f);
            };

            const parsePDF = async (f) => {
                setProcessing(true);
                try {
                    const arrayBuffer = await f.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                    const rows = [];

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        
                        // 1. Agrupamento Avançado de Linhas (Smart Line Grouping)
                        const items = textContent.items.map(item => ({
                            str: item.str,
                            x: item.transform[4],
                            y: item.transform[5],
                            w: item.width,
                            h: item.height
                        }));

                        // Ordenar por Y (descendente - topo para baixo)
                        items.sort((a, b) => b.y - a.y);

                        const lines = [];
                        let currentLine = [];
                        let lastY = null;

                        items.forEach(item => {
                            // Tolerância dinâmica: se a diferença de Y for pequena (< 4), considera mesma linha
                            if (lastY === null || Math.abs(item.y - lastY) < 4) {
                                currentLine.push(item);
                            } else {
                                lines.push(currentLine.sort((a, b) => a.x - b.x)); // Ordenar itens da linha por X (esquerda para direita)
                                currentLine = [item];
                            }
                            lastY = item.y;
                        });
                        if (currentLine.length > 0) lines.push(currentLine.sort((a, b) => a.x - b.x));

                        // 2. Extração Inteligente de Dados (Pattern Matching & Context)
                        // Precisamos manter estado para lidar com "Header" (Frota) e "Footer" (Resumo)
                        let currentFrota = null;

                        lines.forEach(line => {
                            // Juntar strings da linha
                            const lineStr = line.map(i => i.str).join(' ');
                            
                            // Tokenização: separar por espaços
                            const parts = lineStr.split(/\s+/).filter(p => p.trim());
                            
                            // --- Lógica de Detecção de Estado ---
                            
                            // 1. Tentar detectar Frota (Header do Bloco)
                            // Padrão: Linha curta que começa com número de 3-6 dígitos (Ex: "6995" ou "10 6995")
                            const potentialFrota = parts.find(p => /^\d{3,6}$/.test(p));
                            
                            // Se a linha for curta (< 5 partes) e tiver um número compatível, assume que é um header de frota
                            // Mas cuidado para não pegar números aleatórios no meio de uma linha longa
                            if (potentialFrota && parts.length < 10) {
                                // Verifica se é "isolado" ou se é o primeiro/segundo item
                                const idx = parts.indexOf(potentialFrota);
                                if (idx <= 1) {
                                    currentFrota = potentialFrota;
                                }
                            }

                            // 2. Tentar detectar Linha de Resumo (Footer do Bloco)
                            // Padrão: Contém "Acumulado" ou "Total" E tem um valor de porcentagem/decimal no final
                            const isSummaryLine = /acumulado|total/i.test(lineStr);
                            
                            // 3. Tentar detectar Linha de Detalhe (Parada)
                            // Padrão: Contém padrão de data/hora (DD/MM/YYYY HH:MM ou DD/MM HH:MM)
                            const dateTimePattern = /(\d{2}\/\d{2}(?:\/\d{2,4})?\s+\d{2}:\d{2})/;
                            const hasDateTime = dateTimePattern.test(lineStr);

                            if (isSummaryLine && currentFrota) {
                                // Evitar duplicatas de resumo para a mesma frota (usar apenas "Acumulado por Equipamento")
                                // Se já existe um resumo para esta frota, ignoramos os subsequentes (ex: Total Somatória)
                                const alreadyHasSummary = rows.some(r => r["Frota (Detectado)"] === currentFrota && r["Tipo"] === "resumo");
                                
                                // Se a linha for explicitamente "Acumulado por Equipamento", ela deve prevalecer sobre qualquer outra
                                const isPrioritySummary = lineStr.includes("Acumulado por Equipamento");

                                if (alreadyHasSummary && !isPrioritySummary) {
                                    // Pular linhas de totais secundários
                                    return;
                                }

                                // Se encontrarmos a linha prioritária e já tivermos um resumo (que não era prioritário), removemos o antigo
                                if (alreadyHasSummary && isPrioritySummary) {
                                    const idx = rows.findIndex(r => r["Frota (Detectado)"] === currentFrota && r["Tipo"] === "resumo");
                                    if (idx !== -1) rows.splice(idx, 1);
                                }

                                // Tentar extrair a disponibilidade desta linha
                                let disp = null;
                                
                                // Estratégia: Pegar o último número da linha que pareça uma porcentagem ou decimal alto (>50)
                                for (let j = parts.length - 1; j >= 0; j--) {
                                    let p = parts[j];
                                    // Remove símbolos
                                    p = p.replace('%', '');
                                    
                                    // Tenta converter (suporta vírgula e ponto)
                                    let valStr = p.replace(',', '.');
                                    if (!isNaN(valStr) && valStr.trim() !== '') {
                                        let val = parseFloat(valStr);
                                        // Validação heurística: Disponibilidade geralmente é alta (ex: > 50) ou é 0
                                        // Se for um número muito pequeno (ex: 0.05) pode ser hora
                                        // Mas se tiver "%" no original, é certeza
                                        if (parts[j].includes('%') || (val > 0 && val <= 100)) {
                                            disp = val;
                                            break; 
                                        }
                                    }
                                }
                                
                                if (disp !== null) {
                                    rows.push({
                                        "Conteúdo da Linha": "RESUMO: " + lineStr,
                                        "Frota (Detectado)": currentFrota,
                                        "Disponibilidade (Detectado)": disp,
                                        "Data Parada": "",
                                        "Data Retorno": "",
                                        "Tempo Parado": "",
                                        "Motivo": "ACUMULADO/TOTAL",
                                        "Tipo": "resumo"
                                    });
                                }
                            } else if (hasDateTime && currentFrota) {
                                // É uma linha de detalhe
                                // Tentar extrair datas e motivo
                                const dates = lineStr.match(/(\d{2}\/\d{2}(?:\/\d{4})?\s+\d{2}:\d{2})/g) || [];
                                const dataParada = dates[0] || "";
                                const dataRetorno = dates[1] || "";
                                
                                // Motivo é o resto do texto (simplificado)
                                let motivo = lineStr;
                                // Remove as datas encontradas
                                dates.forEach(d => motivo = motivo.replace(d, ''));
                                // Remove números de ID soltos no início (ex: ID da parada)
                                motivo = motivo.replace(/^\s*\d+\s+/, '').trim();
                                // Remove a frota se aparecer
                                motivo = motivo.replace(currentFrota, '').trim();
                                // Remove durações no início (padrão 00:00 ou :00) que aparecem antes do texto
                                // Ex: ":00 :00 00:01 00:01 FINAL DE TURNO"
                                motivo = motivo.replace(/^[:\d\s]+/, '').trim();
                                // Remove porcentagem/números soltos no final da string (ex: "99,79" ou "99.79" ou "99,79%")
                                // Geralmente aparece como um número de 2 ou 3 dígitos, vírgula/ponto, 1 ou 2 casas decimais
                                motivo = motivo.replace(/\s+\d{1,3}[.,]\d{1,2}%?$/, '').trim();

                                // Tentar extrair "Tempo Fora" (Duração)
                                // Geralmente é um padrão HH:MM que sobrou no inicio ou meio, mas como já limpamos, vamos tentar pegar do original
                                // Padrão: :00 :00 [Duração Parada] [Duração Acumulada?] Texto
                                // Vamos pegar todos os padrões de tempo HH:MM na linha original que NÃO SÃO as datas
                                const timePattern = /\b\d{2}:\d{2}\b/g;
                                const allTimes = lineStr.match(timePattern) || [];
                                // Filtrar os que já foram usados nas datas
                                const usedInDates = dates.join(' ');
                                const durationCandidates = allTimes.filter(t => !usedInDates.includes(t));
                                // Assumir que o primeiro candidato restante é a duração da parada
                                const tempoParado = durationCandidates[0] || "";

                                rows.push({
                                    "Conteúdo da Linha": lineStr,
                                    "Frota (Detectado)": currentFrota,
                                    "Disponibilidade (Detectado)": 0,
                                    "Data Parada": dataParada,
                                    "Data Retorno": dataRetorno,
                                    "Tempo Parado": tempoParado,
                                    "Motivo": motivo,
                                    "Tipo": "detalhe"
                                });
                            }
                            
                            // --- Lógica Legada (Compatibilidade com formato de linha única) ---
                            if (!isSummaryLine && parts.length > 1) {
                                let frotaInline = null;
                                let dispInline = null;
                                
                                // ... (Lógica antiga mantida se necessário, mas a prioridade é o bloco)
                                // Se já detectamos via bloco, ignoramos a linha única para não duplicar, 
                                // ou usamos para complementar se a lógica de bloco falhar.
                            }
                        });
                            // Código legado removido
                    }
                    setParsedData(rows);
                    if (rows.length === 0) {
                        alert("Nenhum dado reconhecido. Verifique se o PDF contém texto selecionável (não é imagem) e se segue o padrão de colunas.");
                    }
                } catch (e) {
                    console.error(e);
                    alert("Erro ao processar PDF: " + e.message);
                } finally {
                    setProcessing(false);
                }
            };

            const processImport = async () => {
                setProcessing(true);
                setLogs([]);
                const newLogs = [];

                try {
                    // Date Validation
                    if (parsedData.length > 0) {
                        let detectedDateStr = '';
                        
                        // Scan first 10 rows to find a valid date
                        for (let i = 0; i < Math.min(parsedData.length, 10); i++) {
                            const row = parsedData[i];
                            const keys = Object.keys(row);
                            
                            // 1. Try explicit reference date columns
                            let dateKey = keys.find(k => /^(data|date|dia)$/i.test(k.trim()) || /data\s*refer[eê]ncia/i.test(k));
                            
                            // 2. Fallback to common date columns if explicit one is missing (like "Data Parada")
                            if (!dateKey) {
                                dateKey = keys.find(k => /data\s*parada/i.test(k) || /data\s*inicial/i.test(k) || /data\s*in[ií]cio/i.test(k));
                            }
                            
                            if (dateKey && row[dateKey]) {
                                const rawDate = row[dateKey];
                                
                                if (rawDate instanceof Date) {
                                    detectedDateStr = rawDate.toLocaleDateString('pt-BR');
                                    break;
                                } else if (typeof rawDate === 'number' && rawDate > 30000) {
                                    // Excel serial date fallback (approx > 1982)
                                    // (value - 25569) * 86400 * 1000
                                    try {
                                        const dateObj = new Date(Math.round((rawDate - 25569) * 86400 * 1000));
                                        // Adjust timezone offset manually because Excel serial is usually UTC-ish or local without timezone
                                        // Simplest is to just format it
                                        // Adding 12h to avoid timezone flip issues on midnight
                                        dateObj.setHours(dateObj.getHours() + 12);
                                        detectedDateStr = dateObj.toLocaleDateString('pt-BR');
                                        break;
                                    } catch (e) { console.warn("Date parse error", e); }
                                } else if (typeof rawDate === 'string') {
                                    // Extract date part from string like "04/08/2025 06:05"
                                    const ptBrMatch = rawDate.match(/(\d{2})\/(\d{2})\/(\d{4})/);
                                    if (ptBrMatch) {
                                        detectedDateStr = `${ptBrMatch[1]}/${ptBrMatch[2]}/${ptBrMatch[3]}`;
                                        break;
                                    } else {
                                        // Try splitting by space
                                        const parts = rawDate.trim().split(' ');
                                        if (parts[0].match(/\d{2}\/\d{2}\/\d{4}/)) {
                                            detectedDateStr = parts[0];
                                            break;
                                        }
                                    }
                                }
                            }
                        }

                        // Convert importDate (yyyy-mm-dd) to pt-BR for comparison
                        const [impY, impM, impD] = importDate.split('-');
                        const importDateBr = `${impD}/${impM}/${impY}`;
                        
                        // Check if detected date is valid and different from selected IMPORT date
                        if (detectedDateStr && detectedDateStr.match(/\d{2}\/\d{2}\/\d{4}/) && detectedDateStr !== importDateBr) {
                            const confirmContinue = window.confirm(`ATENÇÃO DE SEGURANÇA:\n\nO arquivo contém dados de: ${detectedDateStr}\nMas você selecionou importar para: ${importDateBr}\n\nIsso vai SOBRESCREVER os dados do dia ${importDateBr} com informações antigas.\n\nTem certeza absoluta que deseja continuar?`);
                            if (!confirmContinue) {
                                setProcessing(false);
                                return;
                            }
                        }
                    }

                    const tableName = selectedPlant === 'cambui' ? 'daily_reports_cambui' : 
                                    selectedPlant === 'panorama' ? 'daily_reports_panorama' :
                                    selectedPlant === 'vale-verdao' ? 'daily_reports_vale_verdao' :
                                    selectedPlant === 'floresta' ? 'daily_reports_floresta' : 'daily_reports';

                    // Fetch existing reports for the date to map frotas to frentes
                    const { data: reports, error } = await supabaseClient
                        .from(tableName)
                        .select('*')
                        .eq('date', importDate);

                    if (error) throw error;

                    // NEW: Fetch all equipments to support auto-adding missing fleets
                    let suffix = 'cambui';
                    if (selectedPlant === 'panorama') suffix = 'panorama';
                    else if (selectedPlant === 'vale-verdao') suffix = 'vale_verdao';
                    else if (selectedPlant === 'floresta') suffix = 'floresta';

                    const { data: allEquipments } = await supabaseClient
                        .from(`equipments_${suffix}`)
                        .select('*');
                    
                    const globalEquipmentMap = {};
                    if (allEquipments) {
                        allEquipments.forEach(eq => {
                            if (eq.frota) globalEquipmentMap[String(eq.frota).trim().toUpperCase()] = eq;
                        });
                    }

                    const reportMap = {}; 
                    reports.forEach(r => reportMap[r.frente_id] = r);

                    let updatedCount = 0;
                    let addedCount = 0;

                    for (const row of parsedData) {
                        // Smart column detection
                        const keys = Object.keys(row);
                        
                        // Handle Excel vs PDF keys
                        let frota, disp;
                        
                        if (file.name.endsWith('.pdf')) {
                            frota = row["Frota (Detectado)"];
                            disp = row["Disponibilidade (Detectado)"];
                        } else {
                            const frotaKey = keys.find(k => /frota|equipamento|cod/i.test(k)) || keys[0];
                            const dispKey = keys.find(k => /disponibilidade|disp|%/i.test(k));
                            frota = row[frotaKey];
                            disp = dispKey ? row[dispKey] : null;
                        }
                        
                        // Normalize Disp
                        if (disp && typeof disp === 'string') {
                            disp = parseFloat(disp.replace(',', '.').replace('%', ''));
                            if (disp > 1) disp = disp / 100; // Assuming it was 95.5 -> 0.955
                        } else if (disp && typeof disp === 'number') {
                            if (disp > 1) disp = disp / 100;
                        }

                        if (!frota) continue;

                        let foundReport = null;
                        let foundItem = null;

                        for (const frenteId in reportMap) {
                            const report = reportMap[frenteId];
                            const data = report.report_data;
                            if (data.groups) {
                                for (const g of data.groups) {
                                    const item = g.items.find(i => String(i.frota).trim() == String(frota).trim());
                                    if (item) {
                                        foundReport = report;
                                        foundItem = item;
                                        break;
                                    }
                                }
                            } else if (data.frotas) {
                                // Old structure support
                                const item = data.frotas.find(f => String(f.id).trim() == String(frota).trim());
                                if (item) {
                                    foundReport = report;
                                    foundItem = item;
                                    break;
                                }
                            }
                            if (foundReport) break;
                        }

                        // FALLBACK: If not found in reports, check global registry and add it
                        const normalizedFrota = String(frota).trim().toUpperCase();
                        if (!foundItem && globalEquipmentMap[normalizedFrota]) {
                            const eqInfo = globalEquipmentMap[normalizedFrota];
                            const targetFrente = eqInfo.frente;
                            const targetGroup = eqInfo.group_name || 'Outros';

                            if (targetFrente && reportMap[targetFrente]) {
                                const report = reportMap[targetFrente];
                                
                                // Ensure groups array exists
                                if (!report.report_data.groups) report.report_data.groups = [];
                                
                                // Find or create group
                                let groupObj = report.report_data.groups.find(g => g.name === targetGroup);
                                if (!groupObj) {
                                    groupObj = {
                                        id: targetGroup.toLowerCase().replace(/[^a-z0-9]/g, '-'),
                                        name: targetGroup,
                                        items: [],
                                        yield: 0,
                                        yieldLabel: 'Produção'
                                    };
                                    report.report_data.groups.push(groupObj);
                                }

                                // Create new item
                                const newItem = {
                                    id: eqInfo.id ? String(eqInfo.id) : Math.random().toString(36).substr(2, 9),
                                    frota: eqInfo.frota,
                                    shiftA: { initial: null, final: null, worked: 0, maintenance: 0 },
                                    shiftB: { initial: null, final: null, worked: 0, maintenance: 0 },
                                    totalAB: 0,
                                    status: 'ok',
                                    obs: 'Adicionado via Importação'
                                };

                                groupObj.items.push(newItem);
                                
                                foundReport = report;
                                foundItem = newItem;
                                addedCount++;
                                newLogs.push(`Frota ${frota} não estava no lançamento. Adicionada automaticamente na frente ${targetFrente}.`);
                            }
                        }

                        if (foundReport && foundItem) {
                            // Se for linha de Resumo/Acumulado, atualiza a disponibilidade principal
                            if (!row.Tipo || row.Tipo === 'resumo' || row["Conteúdo da Linha"].includes('Acumulado')) {
                                foundItem.gatec_availability = disp;
                                updatedCount++;
                                newLogs.push(`Frota ${frota}: Disponibilidade atualizada para ${(disp * 100).toFixed(1)}%`);
                            }
                            
                            // Sempre armazena os dados brutos da linha para histórico/detalhes
                            // Se já existir gatec_data como array, adiciona. Se não, cria array.
                            if (!foundItem.gatec_details) foundItem.gatec_details = [];
                            
                            // Verifica duplicidade antes de adicionar (opcional, mas bom para evitar repetecos no reprocessamento)
                            const exists = foundItem.gatec_details.some(d => 
                                d.data_parada === row["Data Parada"] && 
                                d.motivo === row["Motivo"]
                            );
                            
                            if (!exists) {
                                foundItem.gatec_details.push(row);
                            }
                            
                            foundItem.gatec_data = row; // Mantém compatibilidade com versão anterior
                        }
                    }

                    // Save logs to dedicated table
                    const logsToInsert = parsedData.map(row => ({
                        plant: selectedPlant,
                        reference_date: importDate,
                        frota: row["Frota (Detectado)"],
                        motivo: row["Motivo"],
                        data_parada: row["Data Parada"],
                        data_retorno: row["Data Retorno"],
                        tempo_parado: row["Tempo Parado"],
                        tipo: row["Tipo"],
                        disponibilidade: row["Disponibilidade (Detectado)"]
                    }));

                    if (logsToInsert.length > 0) {
                        const { error: logsError } = await supabaseClient
                            .from('availability_logs')
                            .insert(logsToInsert);
                        
                        if (logsError) {
                            console.error("Erro ao salvar logs:", logsError);
                            newLogs.push(`Aviso: Não foi possível salvar na tabela 'availability_logs' (Verifique se ela existe). Erro: ${logsError.message}`);
                        } else {
                            newLogs.push(`${logsToInsert.length} registros salvos na tabela de histórico detalhado.`);
                        }
                    }

                    // Save updates
                    for (const frenteId in reportMap) {
                        const report = reportMap[frenteId];
                        const { error: updateError } = await supabaseClient
                            .from(tableName)
                            .update({ report_data: report.report_data })
                            .eq('id', report.id);
                            
                        if (updateError) {
                             newLogs.push(`Erro ao salvar frente ${frenteId}: ${updateError.message}`);
                        }
                    }

                    setLogs(prev => [...prev, ...newLogs, `Processo concluído. ${updatedCount} atualizadas, ${addedCount} adicionadas.`]);
                    alert(`Processo concluído! ${updatedCount} frotas atualizadas e ${addedCount} novas adicionadas ao lançamento.`);

                } catch (err) {
                    console.error(err);
                    setLogs(prev => [...prev, `Erro Crítico: ${err.message}`]);
                    alert(`Erro: ${err.message}`);
                } finally {
                    setProcessing(false);
                }
            };

            return (
                <div className="space-y-6">
                    {/* Navigation Tabs */}
                    <div className="flex gap-2 border-b border-gray-200 pb-4 mb-4 overflow-x-auto">
                        <button 
                            onClick={() => setViewMode('import')} 
                            className={`px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap transition-colors ${viewMode === 'import' ? 'bg-orange-600 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}
                        >
                            <div className="flex items-center gap-2">
                                <Icons.Upload size={16} />
                                Importar Arquivo
                            </div>
                        </button>
                        <button 
                            onClick={() => setViewMode('manual')} 
                            className={`px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap transition-colors ${viewMode === 'manual' ? 'bg-orange-600 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}
                        >
                            <div className="flex items-center gap-2">
                                <Icons.Plus size={16} />
                                Adicionar Manualmente
                            </div>
                        </button>
                        <button 
                            onClick={() => setViewMode('history')} 
                            className={`px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap transition-colors ${viewMode === 'history' ? 'bg-orange-600 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-50 border border-gray-200'}`}
                        >
                            <div className="flex items-center gap-2">
                                <Icons.Clock size={16} />
                                Histórico de Disponibilidade
                            </div>
                        </button>
                    </div>

                    {/* IMPORT VIEW (Original) */}
                    {viewMode === 'import' && (
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 animate-fade-in">
                            <div className="flex items-center justify-between mb-6">
                                <h3 className="font-bold text-gray-800 flex items-center gap-2">
                                    <Icons.Upload size={20} className="text-orange-600" />
                                    Importar Arquivo Gatec
                                    <span className="ml-2 px-2 py-0.5 rounded-full text-xs bg-blue-100 text-blue-800 border border-blue-200">
                                        Unidade: {plants && plants[selectedPlant] ? plants[selectedPlant].name : selectedPlant}
                                    </span>
                                </h3>
                                <div className="text-xs text-gray-500">
                                    Formatos suportados: .xlsx, .xls, .pdf
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">Data de Referência</label>
                                    <input 
                                        type="date" 
                                        value={importDate}
                                        onChange={e => setImportDate(e.target.value)}
                                        className="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-orange-500 outline-none"
                                    />
                                    <p className="text-xs text-gray-500 mt-1">Data dos relatórios a atualizar.</p>
                                </div>
                                
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-bold text-gray-700 mb-2">Arquivo de Disponibilidade</label>
                                    <div className="relative mb-3">
                                        <input 
                                            type="file" 
                                            accept=".xlsx, .xls, .pdf"
                                            onChange={handleFileChange}
                                            className="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-orange-500 outline-none file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100"
                                        />
                                    </div>
                                    <div className="bg-orange-50 p-3 rounded-lg border border-orange-100">
                                        <div className="flex items-center gap-2 mb-2">
                                            <input 
                                                type="checkbox"
                                                checked={useGemini}
                                                onChange={e => setUseGemini(e.target.checked)}
                                                className="form-checkbox text-orange-600 h-4 w-4"
                                            />
                                            <label className="text-sm font-bold text-gray-800">Usar Inteligência Artificial para Reconhecimento Avançado</label>
                                        </div>
                                        {useGemini && (
                                            <div className="mt-2 animate-fade-in">
                                                <label className="block text-xs font-bold text-gray-600 mb-1">Provedor de IA</label>
                                                <select
                                                    value={aiProvider}

                                                {aiProvider === 'gemini' && (
                                                    <>

                                                        <input 
                                                            type="password" 
                                                            value={geminiKey}
                                                            onChange={e => setGeminiKey(e.target.value)}

                                                            className="w-full border border-orange-200 rounded-md p-1.5 text-xs focus:ring-1 focus:ring-orange-500 outline-none bg-white mb-2"

                                                            <option value="gemini-1.5-flash">Gemini 1.5 Flash (Mais estável)</option>

                                                {aiProvider === 'deepseek' && (
                                                    <>

                                                {aiProvider !== 'offline' && (

                                                        Testar Conexão com {aiProvider === 'gemini' ? 'Gemini' : 'DeepSeek'}
                                                    </button>
                                                )}
                                                
                                                <p className="text-[10px] text-gray-500 mt-1">
                                                    {aiProvider === 'gemini' && <>Necessário para usar a IA. Obtenha em: <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-blue-600 underline">Google AI Studio</a>.</>}
                                                    {aiProvider === 'deepseek' && <>Necessário para usar a IA. Obtenha em: <a href="https://platform.deepseek.com/api_keys" target="_blank" className="text-blue-600 underline">DeepSeek Platform</a>.</>}
                                                    {aiProvider !== 'offline' && " A chave fica salva no seu navegador."}
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {parsedData.length > 0 && (
                                <div className="mb-6 animate-fade-in">
                                    <div className="flex justify-between items-center mb-2">
                                        <h4 className="font-bold text-sm text-gray-600">Pré-visualização ({parsedData.length} registros)</h4>
                                    </div>

            const handleTestAudit = async () => {
                const { error } = await supabaseClient.from('audit_logs').insert({

                    frente_id: 'TESTE_SISTEMA',
                    action: 'TESTE',
                    details: 'Verificação de conexão e permissões da tabela audit_logs',
                    user_email: session?.user?.email || 'admin@teste.com',
                    timestamp: new Date().toISOString()
                });
                
                if (error) {
                    alert('ERRO: Não foi possível gravar na tabela audit_logs.\n\nDetalhe: ' + error.message + '\n\nVerifique se o script SQL foi executado corretamente no Supabase.');
                } else {

                    fetchAuditLogs();
                }
            };

            const handleUpdateUser = async (e) => {
                e.preventDefault();
                if (!editingUser) return;
                
                await handleSaveUser(editingUser);
            };

            // Helper to extract availability
            const calculateReportAvailability = (reportData) => {
                if (!reportData || !reportData.groups) return 0;
                let total = 0;
                let count = 0;
                
                reportData.groups.forEach(group => {
                    group.items.forEach(item => {
                        // Prioritize gatec_availability if present (from AvailabilityView)
                        if (item.gatec_availability) {
                            total += parseFloat(item.gatec_availability);
                            count++;
                        }
                    });
                });
                
                return count > 0 ? (total / count) : 0;
            };

            // Chart Refs
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const availChartRef = useRef(null);
            const availChartInstance = useRef(null);

            // Chart Effect
            useEffect(() => {
                if (activeView === 'dashboard' && chartRef.current && availChartRef.current && history.length > 0) {
                    // Destroy old instances
                    if (chartInstance.current) chartInstance.current.destroy();
                    if (availChartInstance.current) availChartInstance.current.destroy();

                    const ctxHours = chartRef.current.getContext('2d');
                    const ctxAvail = availChartRef.current.getContext('2d');
                    
                    // Aggregate data: Last 7 days
                    const days = 7;
                    const labels = [];
                    const dataPointsHours = [];
                    const dataPointsAvail = [];
                    const now = new Date();
                    
                    for (let i = days - 1; i >= 0; i--) {
                        const d = new Date();
                        d.setDate(now.getDate() - i);
                        const day = String(d.getDate()).padStart(2, '0');
                        const month = String(d.getMonth() + 1).padStart(2, '0');
                        const year = d.getFullYear();
                        const dateStr = `${day}/${month}/${year}`;
                        
                        labels.push(`${day}/${month}`);
                        
                        // Filter reports for this date
                        const reports = history.filter(h => h.date === dateStr);
                        
                        // Sum hours
                        const totalHours = reports.reduce((acc, r) => {
                            const report = r.report_data || {};
                            const dailyTotal = (report.frotas || []).reduce((fAcc, f) => {
                                 return fAcc + (parseFloat(f.workedHoursA) || 0) + (parseFloat(f.workedHoursB) || 0);
                            }, 0);
                            return acc + dailyTotal;
                        }, 0);
                        dataPointsHours.push(totalHours);

                        // Avg Availability
                        let dailyAvailSum = 0;
                        let dailyAvailCount = 0;
                        reports.forEach(r => {
                            const avail = calculateReportAvailability(r.report_data);
                            if (avail > 0) {
                                dailyAvailSum += avail;
                                dailyAvailCount++;
                            }
                        });
                        dataPointsAvail.push(dailyAvailCount > 0 ? (dailyAvailSum / dailyAvailCount) * 100 : 0);
                    }

                    // 1. Hours Chart
                    chartInstance.current = new Chart(ctxHours, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Horas Trabalhadas',
                                data: dataPointsHours,
                                backgroundColor: 'rgba(249, 115, 22, 0.8)',
                                borderRadius: 6,
                                borderSkipped: false,
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: '#1f2937',
                                    padding: 12,
                                    cornerRadius: 8,
                                    callbacks: { label: (ctx) => `${ctx.raw.toFixed(1)} horas` }
                                }
                            },
                            scales: {
                                y: { beginAtZero: true, grid: { borderDash: [2, 4], color: '#f3f4f6' } },
                                x: { grid: { display: false } }
                            }
                        }
                    });

                    // 2. Availability Chart
                    availChartInstance.current = new Chart(ctxAvail, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Disponibilidade Média (%)',
                                data: dataPointsAvail,
                                borderColor: 'rgba(37, 99, 235, 0.8)',
                                backgroundColor: 'rgba(37, 99, 235, 0.1)',
                                borderWidth: 3,
                                pointBackgroundColor: '#fff',
                                pointBorderColor: 'rgba(37, 99, 235, 1)',
                                pointRadius: 4,
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: '#1f2937',
                                    padding: 12,
                                    cornerRadius: 8,
                                    callbacks: { label: (ctx) => `${ctx.raw.toFixed(1)}%` }
                                }
                            },
                            scales: {
                                y: { 
                                    beginAtZero: true, 
                                    max: 100,
                                    grid: { borderDash: [2, 4], color: '#f3f4f6' } 
                                },
                                x: { grid: { display: false } }
                            }
                        }
                    });
                }
                
                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                    if (availChartInstance.current) availChartInstance.current.destroy();
                };
            }, [activeView, history]);

            // Derived Stats & Per Front Data
            const stats = useMemo(() => {
                if (!history.length) return { total: 0, thisMonth: 0, activeFrentes: 0, lastUpdate: '-', avgAvail: 0, perFront: [] };
                
                const now = new Date();
                const thisMonth = history.filter(r => {
                    const d = new Date(r.date.split('/').reverse().join('-'));
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                }).length;

                const uniqueFrentes = new Set(history.map(r => r.frente_id)).size;
                const lastUpdate = history[0]?.date || '-';

                // Calculate Global Avg Availability (Last 30 days)
                let totalAvail = 0;
                let availCount = 0;
                
                // Group by Frente
                const frontStats = {};
                
                history.forEach(r => {
                    const avail = calculateReportAvailability(r.report_data);
                    
                    // Global accumulation
                    if (avail > 0) {
                        totalAvail += avail;
                        availCount++;
                    }

                    // Per Front accumulation
                    if (!frontStats[r.frente_id]) {
                        frontStats[r.frente_id] = { 
                            name: r.frente_id, 
                            reports: 0, 
                            totalHours: 0, 
                            availSum: 0, 
                            availCount: 0,
                            lastDate: r.date
                        };

                    const report = r.report_data || {};
                    const hours = (report.frotas || []).reduce((acc, f) => acc + (parseFloat(f.workedHoursA) || 0) + (parseFloat(f.workedHoursB) || 0), 0);
                    
                    frontStats[r.frente_id].reports++;
                    frontStats[r.frente_id].totalHours += hours;
                    if (avail > 0) {
                        frontStats[r.frente_id].availSum += avail;
                        frontStats[r.frente_id].availCount++;
                    }
                });

                const perFront = Object.values(frontStats).map(f => ({
                    ...f,
                    avgAvail: f.availCount > 0 ? (f.availSum / f.availCount) : 0
                })).sort((a,b) => b.avgAvail - a.avgAvail);

                return {
                    total: history.length,
                    thisMonth,
                    activeFrentes: uniqueFrentes,
                    lastUpdate,
                    avgAvail: availCount > 0 ? (totalAvail / availCount) : 0,
                    perFront

alter table public.profiles enable row level security;
create policy "Public profiles are viewable by everyone." on profiles for select using (true);
create policy "Users can insert own profile." on profiles for insert with check (auth.uid() = id);
create policy "Users can update own profile." on profiles for update using (auth.uid() = id);

            const [firstName, setFirstName] = useState('');
            const [lastName, setLastName] = useState('');
            const [selectedPlant, setSelectedPlant] = useState('cambui');

                e.preventDefault();
                setLoading(true);
                setError(null);
                
                try {
                    if (isLogin) {
                        const { error } = await supabaseClient.auth.signInWithPassword({
                            email,
                            password
                        });

                        const { data, error } = await supabaseClient.auth.signUp({

                            options: {
                                data: {
                                    first_name: firstName,
                                    last_name: lastName,

                                }
                            }
                        });

                        // If session exists immediately, email confirmation is disabled (Test Mode)
                        if (data?.session) {
                            // User is logged in automatically
                        } else {
                            // Email confirmation required
                            alert('Cadastro realizado com sucesso! Por favor, verifique seu email para confirmar o cadastro antes de fazer login.');

                    setError(err.message);

        const EquipmentPanel = ({ plantId, plant }) => {

            const [activeFrente, setActiveFrente] = useState(''); // Init empty

            const fetchFrentes = async () => {
                let suffix = 'cambui';
                if (plantId === 'panorama') suffix = 'panorama';
                else if (plantId === 'vale-verdao') suffix = 'vale_verdao';
                else if (plantId === 'floresta') suffix = 'floresta';

                const frentesTable = `frentes_${suffix}`;

                // 1. Buscar da tabela oficial de frentes
                const { data: frentesData } = await supabaseClient
                    .from(frentesTable)
                    .select('name');
                
                // 2. Buscar da tabela de equipamentos (fallback/legacy)
                const { data: equipmentsData } = await supabaseClient
                    .from(equipmentsTable)
                    .select('frente')
                    .range(0, 9999);

                const allFrentes = new Set();
                
                // Adiciona do cadastro oficial
                if (frentesData) {
                    frentesData.forEach(item => {
                        if (item.name) allFrentes.add(item.name.trim());
                    });
                }

                // Adiciona dos equipamentos (caso exista alguma perdida)
                if (equipmentsData) {
                    equipmentsData.forEach(item => {
                        if (item.frente) allFrentes.add(item.frente.trim());
                    });
                }

                // Normaliza e ordena
                const uniqueFrentes = [...allFrentes]
                    .filter(f => f && f.trim() !== "" && f !== "Geral")
                    .sort();

                if (uniqueFrentes.length > 0) {
                    setFrentes(uniqueFrentes);
                    // Se não tem ativa ou a ativa não existe na lista, pega a primeira
                    if (!activeFrente || !uniqueFrentes.includes(activeFrente)) {
                        setActiveFrente(uniqueFrentes[0]);

                } else {
                    setFrentes([]);
                    setActiveFrente('');

            const fetchEquipments = async () => {
                if (!activeFrente) return; 
                setLoading(true);
                let tableName = 'equipments_cambui';
                if (plantId === 'panorama') tableName = 'equipments_panorama';
                else if (plantId === 'vale-verdao') tableName = 'equipments_vale_verdao';
                else if (plantId === 'floresta') tableName = 'equipments_floresta';
                
                let query = supabaseClient
                    .from(tableName)
                    .select('*');

                if (activeFrente === 'Geral') {
                    query = query.or('frente.is.null,frente.eq.Geral,frente.eq.""');
                } else {
                    query = query.eq('frente', activeFrente);
                }

                const { data, error } = await query
                    .order('group_name', { ascending: true })
                    .order('frota', { ascending: true });

                if (error) {
                    console.error('Error fetching equipments:', error);
                    if (error.code === '42703') {
                        setError("ATENÇÃO: Banco de Dados Desatualizado. Vá no menu Admin > Instruções SQL e execute o comando para adicionar a coluna 'frente'.");
                    } else {
                        setError(error.message);
                    }
                } else {
                    setEquipments(data || []);
                    const usedGroups = new Set((data || []).map(e => e.group_name));
                    predefinedGroups.forEach(g => usedGroups.add(g));
                    setGroups(Array.from(usedGroups).sort());

                setLoading(false);

            const handleAdd = async () => {

                                    >
                                        {frente}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <button 
                            onClick={() => {
                                setTargetFrente(activeFrente);
                                setIsNewFrente(false);
                                setShowAddModal(true);
                            }}
                            className="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700 flex items-center gap-2"
                        >
                            <Icons.Plus size={20} />
                            Novo Equipamento
                        </button>
                    </div>

                    {loading ? (
                         <div className="flex justify-center p-8"><div className="animate-spin rounded-full h-10 w-10 border-t-4 border-b-4 border-blue-500"></div></div>
                    ) : (
                        <div className="space-y-6">
                            {groups.map(group => {
                                const items = groupedEquipments[group] || [];
                                // If predefined group is empty, still show it if desired, or skip. 
                                // Let's show it so user can add to it easily? Or just hide empty ones?
                                // User said "dentro dele ter todos os equipaments cadastrado com opção para cadastrar novos equipamentos"
                                // Showing empty groups helps discovery.
                                
                                return (
                                    <div key={group} className="bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
                                        <div className="bg-gray-100 px-4 py-2 font-bold text-gray-700 border-b border-gray-200 flex justify-between items-center">
                                            <span>{group}</span>
                                            <span className="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded-full">{items.length} itens</span>
                                        </div>
                                        <div className="p-4 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                                            {items.map(item => (
                                                <div key={item.frota} className="bg-gray-50 border border-gray-200 rounded p-2 flex justify-between items-center relative group hover:border-blue-400 transition-colors">
                                                    <span className="font-bold text-gray-800 text-lg">{item.frota}</span>
                                                    <button 
                                                        onClick={() => handleDelete(item.frota)}
                                                        className="text-gray-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity"
                                                        title="Excluir"
                                                    >
                                                        <Icons.X size={16} />
                                                    </button>
                                                </div>
                                            ))}
                                            {items.length === 0 && (
                                                <div className="col-span-full text-center text-gray-400 text-sm italic py-2">Nenhum equipamento cadastrado neste grupo</div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[80] p-4">
                            <div className="bg-white rounded-lg p-6 w-full max-w-md shadow-2xl">
                                <h3 className="text-xl font-bold mb-4">Adicionar Equipamento</h3>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold mb-1 text-gray-700">Frente de Trabalho</label>
                                        <div className="flex gap-2">
                                            {!isNewFrente ? (
                                                <select 
                                                    value={targetFrente}
                                                    onChange={(e) => {
                                                        if (e.target.value === 'NEW') {
                                                            setIsNewFrente(true);
                                                            setTargetFrente('');
                                                        } else {
                                                            setTargetFrente(e.target.value);
                                                        }
                                                    }}
                                                    className="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-blue-500"
                                                >
                                                    {frentes.map(f => (
                                                        <option key={f} value={f}>{f}</option>
                                                    ))}

                                                </select>
                                            ) : (
                                                <div className="flex w-full gap-2">

                                                        type="text"
                                                        value={targetFrente}
                                                        onChange={(e) => setTargetFrente(e.target.value)}

                                                        placeholder="Ex: Soja, Frente 1"

                                                    <button

                                                            setTargetFrente(activeFrente);

                                                        className="px-2 text-gray-500 hover:text-red-500"
                                                        title="Cancelar nova frente"
                                                    >
                                                        <Icons.X size={20} />
                                                    </button>
                                                </div>
                                            )}

                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold mb-1 text-gray-700">Grupo</label>
                                        <select 
                                            value={newGroup}
                                            onChange={(e) => setNewGroup(e.target.value)}
                                            className="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-blue-500"
                                        >
                                            {predefinedGroups.map(g => (
                                                <option key={g} value={g}>{g}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-1 text-gray-700">Frota (Número)</label>
                                        <input 
                                            type="text"
                                            value={newFrota}
                                            onChange={(e) => setNewFrota(e.target.value)}
                                            className="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-blue-500"
                                            placeholder="Ex: 6603"
                                            autoFocus
                                        />
                                    </div>
                                </div>

                                <div className="mt-6 flex justify-end gap-2">
                                    <button 
                                        onClick={() => setShowAddModal(false)}
                                        className="px-4 py-2 bg-gray-200 text-gray-800 rounded hover:bg-gray-300 font-medium"
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        onClick={handleAdd}
                                        disabled={!newFrota}
                                        className={`px-4 py-2 text-white rounded font-bold ${!newFrota ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}
                                    >
                                        Adicionar
                                    </button>
                                </div>

                    )}

            );
        };

        const App = () => {
            const [session, setSession] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminPanel, setShowAdminPanel] = useState(false);
            const [mobileConfirmData, setMobileConfirmData] = useState(null);

            // App Mode (APK) - Detect via Capacitor or URL param
            const isAppMode = useMemo(() => window.Capacitor !== undefined || window.location.search.includes('mode=app'), []);

            useEffect(() => {
                const fetchProfileAndSetAdmin = async (currentSession) => {
                    if (!currentSession?.user) {
                        setUserProfile(null);
                        setIsAdmin(false);
                        return;
                    }

                    try {
                        const { data, error } = await supabaseClient
                            .from('profiles')
                            .select('*')
                            .eq('id', currentSession.user.id)
                            .single();
                        
                        if (data) {
                            setUserProfile(data);
                            // Admin if email matches hardcoded OR profile says is_admin
                            const isUserAdmin = currentSession.user.email === 'gutemberggg10@gmail.com' || data.is_admin === true;
                            setIsAdmin(isUserAdmin);
                            
                            // If user has a specific plant assigned and is NOT admin/manager, force that plant
                            const isManager = data.role === 'Gerente';
                            if (data.plant_id && !isUserAdmin && !isManager) {
                                setPlantId(data.plant_id);
                            }
                        } else {
                            // Fallback to metadata if profile not found
                            const isUserAdmin = currentSession.user.email === 'gutemberggg10@gmail.com';
                            setIsAdmin(isUserAdmin);
                            if (currentSession.user.user_metadata?.plant_id && !isUserAdmin) {
                                setPlantId(currentSession.user.user_metadata.plant_id);
                            }
                        }
                    } catch (err) {
                        console.error("Error fetching profile:", err);
                        setIsAdmin(currentSession.user.email === 'gutemberggg10@gmail.com');
                    }
                };

                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    fetchProfileAndSetAdmin(session);
                });

                const {
                    data: { subscription },
                } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    fetchProfileAndSetAdmin(session);
                });

                return () => subscription.unsubscribe();
            }, []);

            const [plantId, setPlantId] = useState(() => localStorage.getItem('selectedPlantId') || 'cambui');
            
            // Access Control: Determine which plants are visible to the current user
            const availablePlants = useMemo(() => {
                if (!session) return PLANTS;
                // Admins and Managers (Gerente) have full access
                if (isAdmin || userProfile?.role === 'Gerente') return PLANTS;
                
                const userPlantId = userProfile?.plant_id || session.user?.user_metadata?.plant_id;
                if (userPlantId) {
                    return PLANTS.filter(p => p.id === userPlantId);
                }
                
                return PLANTS; 
            }, [session, isAdmin, userProfile]);

            // Enforce Access Control: If current plant is not allowed, switch to allowed one
            useEffect(() => {
                if (session && availablePlants.length > 0) {
                    const isAllowed = availablePlants.find(p => p.id === plantId);
                    if (!isAllowed) {
                        setPlantId(availablePlants[0].id);
                    }
                }
            }, [availablePlants, plantId, session]);

            const plant = useMemo(() => PLANTS.find(p => p.id === plantId) || PLANTS[0], [plantId]);

            useEffect(() => {
                localStorage.setItem('selectedPlantId', plantId);
            }, [plantId]);

            const [selectedDate, setSelectedDate] = useState(() => new Date().toISOString().split('T')[0]);
            
            // State: Map of frenteId -> { [date]: ReportData }
            const [allData, setAllData] = useState({});
            const [lastSavedData, setLastSavedData] = useState({}); // For Audit Log
            const [activeFrenteId, setActiveFrenteId] = useState('');
            const [frenteTypes, setFrenteTypes] = useState({});
            
            const [view, setView] = useState('entry'); // 'entry' or 'dashboard'
            const [entryMode, setEntryMode] = useState('list'); // 'list' or 'form'

            // Mobile Flow State
            const [mobileView, setMobileView] = useState('home'); // 'home', 'shift', 'input'
            const [mobileShift, setMobileShift] = useState(null); // 'shiftA', 'shiftB'
            const [activeTab, setActiveTab] = useState('launches'); // 'launches' | 'equipments'

            // Force Entry View in App Mode
            useEffect(() => {
                if (isAppMode) {
                    setView('entry');
                    setEntryMode('form');
                }
            }, [isAppMode]);

            const [showSql, setShowSql] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [showNewFrenteModal, setShowNewFrenteModal] = useState(false);
            const [newFrenteName, setNewFrenteName] = useState('');
            const [newFrenteType, setNewFrenteType] = useState('plantadora');
            const [refreshTrigger, setRefreshTrigger] = useState(0);
            const [transferModalOpen, setTransferModalOpen] = useState(false);
            const [transferData, setTransferData] = useState(null);

            // Load Data from Supabase
            useEffect(() => {
                const loadAll = async () => {
                    setIsLoading(true);
                    try {
                        let tableName = 'daily_reports'; // fallback default
                        let frentesTable = 'frentes_cambui'; // fallback default
                        
                        if (plantId === 'cambui') { tableName = 'daily_reports_cambui'; frentesTable = 'frentes_cambui'; }
                        else if (plantId === 'panorama') { tableName = 'daily_reports_panorama'; frentesTable = 'frentes_panorama'; }
                        else if (plantId === 'vale-verdao') { tableName = 'daily_reports_vale_verdao'; frentesTable = 'frentes_vale_verdao'; }
                        else if (plantId === 'floresta') { tableName = 'daily_reports_floresta'; frentesTable = 'frentes_floresta'; }

                        // 1. Load Frentes Registry
                        const { data: frentesData, error: frentesError } = await supabaseClient
                            .from(frentesTable)
                            .select('*');
                            
                        // 2. Load Reports
                        const { data, error } = await supabaseClient
                            .from(tableName)
                            .select('*');

                        if (error || frentesError) {
                             console.error("Supabase Load Error:", error || frentesError);
                             if ((error && (error.code === '42P01' || error.message.includes('relation') || error.message.includes('does not exist'))) || 
                                 (frentesError && (frentesError.code === '42P01' || frentesError.message.includes('relation') || frentesError.message.includes('does not exist')))) {
                                setShowSql(true);
                            }
                            // Fallback to local init if error or empty
                            setAllData({});
                            setActiveFrenteId('');
                        } else {
                            const newData = {};
                            const newTypes = {};
                            
                            // Initialize with empty reports for registered frentes
                            if (frentesData) {
                                frentesData.forEach(f => {
                                    newData[f.name] = {}; 
                                    if (f.type) newTypes[f.name] = f.type;
                                });
                            }
                            setFrenteTypes(newTypes);

                            if (data) {
                                data.forEach(row => {
                                    const report = row.report_data;
                                    // Filter by Plant ID. If missing plantId (legacy), assume 'cambui'
                                    const reportPlantId = report.plantId || 'cambui';
                                    
                                    if (reportPlantId === plantId) {
                                        if (!newData[row.frente_id]) newData[row.frente_id] = {};
                                        newData[row.frente_id][row.date] = report;
                                    }
                                });
                            }
                            
                            setAllData(newData);

                console.log(`Subscribing to changes on ${tableName}...`);

                        console.log('Realtime Change:', payload);
                        
                        if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
                            const { frente_id, date, report_data } = payload.new;
                            
                            // Check if the update belongs to the current plant logic (double check)

                            setNotification({ message: 'Dados atualizados remotamente!', type: 'success' });

                            setAllData(prev => {
                                const currentFrente = prev[frente_id];

            const getNextDate = (dateStr) => {

                date.setUTCDate(date.getUTCDate() + 1);

            };

            const getPrevDate = (dateStr) => {
