    <!-- Global Error Handler for APK Debugging -->
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const errorDiv = document.getElementById('global-error-display') || document.createElement('div');
            errorDiv.id = 'global-error-display';
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '0';
            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';
            errorDiv.style.height = '100%';
            errorDiv.style.backgroundColor = 'white';
            errorDiv.style.color = 'red';
            errorDiv.style.zIndex = '99999';
            errorDiv.style.padding = '20px';
            errorDiv.style.overflow = 'auto';
            errorDiv.style.fontFamily = 'monospace';
            errorDiv.innerHTML += `<h3>Global Error:</h3><pre>${message}\n${source}:${lineno}:${colno}\n${error ? error.stack : ''}</pre><hr>`;
            document.body.appendChild(errorDiv);
            return false;
        };
        window.onunhandledrejection = function(event) {
            const errorDiv = document.getElementById('global-error-display') || document.createElement('div');
            errorDiv.id = 'global-error-display';
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '0';
            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';
            errorDiv.style.height = '100%';
            errorDiv.style.backgroundColor = 'white';
            errorDiv.style.color = 'red';
            errorDiv.style.zIndex = '99999';
            errorDiv.style.padding = '20px';
            errorDiv.style.overflow = 'auto';
            errorDiv.style.fontFamily = 'monospace';
            errorDiv.innerHTML += `<h3>Unhandled Rejection:</h3><pre>${event.reason}</pre><hr>`;
            document.body.appendChild(errorDiv);
        };
    </script>

            var missingDeps = [];

            if (typeof ReactDOM === 'undefined') missingDeps.push('ReactDOM');
            if (typeof Babel === 'undefined') missingDeps.push('Babel');
            
            if (missingDeps.length > 0) {
                var errorDiv = document.getElementById('global-error-display') || document.createElement('div');
                errorDiv.id = 'global-error-display';
                errorDiv.style.position = 'fixed';
                errorDiv.style.top = '0';
                errorDiv.style.left = '0';
                errorDiv.style.width = '100%';
                errorDiv.style.height = '100%';
                errorDiv.style.backgroundColor = 'white';
                errorDiv.style.color = 'red';
                errorDiv.style.zIndex = '99999';
                errorDiv.style.padding = '20px';
                errorDiv.innerHTML = '<h3>CRITICAL ERROR: Missing Dependencies</h3>' +
                                     '<p>The following libraries failed to load:</p>' +
                                     '<ul>' + missingDeps.map(function(d) { return '<li>' + d + '</li>'; }).join('') + '</ul>' +
                                     '<p>Please check your internet connection. This app requires internet to load libraries.</p>';
                document.body.appendChild(errorDiv);
            }
        });

        window.pdfjsLib = window['pdfjs-dist/build/pdf'];
        if (window.pdfjsLib) {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
    </script>

        // --- Error Boundary Component ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            componentDidCatch(error, errorInfo) {
                this.setState({ error, errorInfo });
                console.error("React Error:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-4 bg-red-100 text-red-900 h-screen overflow-auto">
                            <h1 className="text-xl font-bold mb-2">Algo deu errado</h1>
                            <p className="mb-4">Ocorreu um erro ao renderizar este componente.</p>
                            <details className="whitespace-pre-wrap text-sm font-mono bg-white p-2 border rounded">
                                {this.state.error && this.state.error.toString()}
                                <br />
                                {this.state.errorInfo && this.state.errorInfo.componentStack}
                            </details>
                            <button 
                                onClick={() => window.location.reload()}
                                className="mt-4 px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700"
                            >
                                Recarregar Página
                            </button>
                        </div>
                    );
                }

            }

        // --- Initial Data Template ---
        const createInitialData = (frenteId, dateStr, plantId = 'cambui', type = 'plantadora') => {

        const createReportFromDb = async (frenteId, dateStr, plantId) => {
             let frentesTable = 'frentes_cambui';
             let tableName = 'equipments_cambui';
             
             if (plantId === 'panorama') {
                 frentesTable = 'frentes_panorama';
                 tableName = 'equipments_panorama';
             } else if (plantId === 'vale-verdao') {
                 frentesTable = 'frentes_vale_verdao';
                 tableName = 'equipments_vale_verdao';
             } else if (plantId === 'floresta') {
                 frentesTable = 'frentes_floresta';
                 tableName = 'equipments_floresta';
             }

             // Fetch Frente Type to ensure correct template
             let frenteType = 'plantadora'; 
             const { data: frenteData } = await supabaseClient
                 .from(frentesTable)
                 .select('type')
                 .eq('name', frenteId)
                 .single();
             
             if (frenteData && frenteData.type) {
                 frenteType = frenteData.type;
             }

             const baseData = createInitialData(frenteId, dateStr, plantId, frenteType);

             // Fetch equipments filtered by frente
             const { data, error } = await supabaseClient
                .from(tableName)
                .select('*');

             // Filter locally to support fallback to 'Geral' or empty frente if needed
             // But strictly respecting user selection is safer.
             // Let's filter strictly first.
             let filteredData = [];
             
             if (data) {
                 if (frenteId === 'Geral') {
                      filteredData = data.filter(item => !item.frente || item.frente === 'Geral' || item.frente === '');
                 } else {
                      // Normalize comparison
                      filteredData = data.filter(item => item.frente && item.frente.trim() === frenteId);
                 }
             }

             if (error) {
                 console.error("Error creating report from DB:", error);
                 if (error.code === '42703') {
                     alert("ATENÇÃO: A coluna 'frente' não existe no banco de dados. Os equipamentos padrão serão carregados. Por favor, vá em Admin > Instruções SQL e execute a atualização.");
                 }
                 return baseData;
             }

             if (!filteredData || filteredData.length === 0) {
                 return baseData;
             }

             const groupsMap = {};
             filteredData.forEach(item => {
                 const gName = item.group_name;
                 if (!groupsMap[gName]) {
                     groupsMap[gName] = {
                         id: gName.toLowerCase().replace(/[^a-z0-9]/g, '-'),
                         name: gName,
                         items: []
                     };
                 }
                 groupsMap[gName].items.push({
                     id: item.id ? item.id.toString() : Math.random().toString(36).substr(2, 9),
                     frota: item.frota,
                     shiftA: { initial: null, final: null, worked: 0, maintenance: 0 },
                     shiftB: { initial: null, final: null, worked: 0, maintenance: 0 },
                     totalAB: 0,
                     status: 'ok',
                     obs: ''
                 });
             });

             const newGroups = Object.values(groupsMap).map(g => {
                 const baseGroup = baseData.groups.find(bg => bg.name.toLowerCase() === g.name.toLowerCase());
                 return {
                     ...g,
                     yield: baseGroup ? baseGroup.yield : 0,
                     yieldLabel: baseGroup ? baseGroup.yieldLabel : 'Produção'
                 };
             }).sort((a, b) => {
                 // Priority based on User Rules (Labels)
                 const getPriority = (label) => {
                     if (!label) return 99;
                     const l = label.toLowerCase();
                     if (l.includes('rendimento plantio turno "a"')) return 1;
                     if (l.includes('rendimento plantio turno "b"')) return 2;
                     if (l.includes('velocidade trabalhada')) return 3;
                     return 99;
                 };
                 
                 const pA = getPriority(a.yieldLabel);
                 const pB = getPriority(b.yieldLabel);
                 
                 if (pA !== pB) return pA - pB;
                 
                 // Secondary Sort: Predefined Group Names
                 const sortOrder = [
                     'Colhedoras', 
                     'Trator Sulcador', 
                     'Trator Distribuidor', 
                     'Trator Cobridor',
                     'Trator Transbordo', 
                     'Trator Plantadora', 
                     'Caminhão'
                 ];
                 
                 const indexA = sortOrder.indexOf(a.name);
                 const indexB = sortOrder.indexOf(b.name);
                 
                 if (indexA !== -1 && indexB !== -1) return indexA - indexB;
                 if (indexA !== -1) return -1;
                 if (indexB !== -1) return 1;
                 
                 return a.name.localeCompare(b.name);
             });

             return {
                 ...baseData,
                 groups: newGroups
             };
        };

        // --- Components ---

        // --- Transfer Modal Component ---
        const TransferModal = ({ isOpen, onClose, onTransfer, allFrentes, currentFrenteId }) => {

                            >
                                Transferir

                    </div>
                </div>
            );
        };

        const EquipmentRow = ({ equipment, plant, onChange, onDelete, onTransfer, isLast, groupName, onSqlError, lastReading, isAppMode, frenteType }) => {
            const [showMobileModal, setShowMobileModal] = useState(false);
            const isCaminhoes = frenteType === 'caminhoes';

            const handleChange = (field, value) => {
                // Validação de Excesso de Horas (> 12h)
                if ((field.includes('initial') || field.includes('final')) && value !== null && typeof value === 'number') {
                    const [shiftName, fieldType] = field.split('.');
                    if (shiftName && (shiftName === 'shiftA' || shiftName === 'shiftB')) {
                        const currentInitial = equipment[shiftName]?.initial;
                        const currentFinal = equipment[shiftName]?.final;
                        
                        let newInitial = currentInitial;
                        let newFinal = currentFinal;

                        if (fieldType === 'initial') newInitial = value;
                        if (fieldType === 'final') newFinal = value;

                        if (newInitial !== null && newFinal !== null) {
                            const diff = newFinal - newInitial;
                            // Permite tolerância de 0.1 para arredondamentos, mas o usuário pediu 12 exato ou menos
                            if (diff > 12) {
                                alert(`⚠️ BLOQUEIO: Excesso de Horas!\n\nA diferença lançada é de ${diff.toFixed(1)} horas no ${shiftName === 'shiftA' ? 'Turno A' : 'Turno B'}.\n\nValor não permitido! O limite máximo é de 12 horas.`);
                                return; // Bloqueia a atualização
                            }
                        }
                    }
                }
                onChange(equipment.id, field, value);
            };

            const handleBlur = async () => {
                if (!equipment.frota || equipment.frota === 'NOVA') return;
                
                let tableName = 'equipments_cambui';
                if (plant.id === 'panorama') tableName = 'equipments_panorama';
                else if (plant.id === 'vale-verdao') tableName = 'equipments_vale_verdao';
                else if (plant.id === 'floresta') tableName = 'equipments_floresta';

                console.log(`Auto-registering fleet ${equipment.frota} to ${tableName}...`);

                try {
                    const { error } = await supabaseClient
                        .from(tableName)
                        .upsert({ 
                            frota: equipment.frota, 
                            group_name: groupName
                        }, { onConflict: 'frota' });
                    
                    if (error) {
                        console.error("Auto-register error:", error);
                        if (error.code === '42P01' || error.message.includes('relation') || error.message.includes('does not exist')) {
                             if (onSqlError) onSqlError();
                        }
                    } else {
                        console.log("Fleet registered successfully.");
                    }
                } catch (e) {
                    console.error("Auto-register exception:", e);
                }
            };

            const renderNumberInput = (value, fieldPath, error = false, title = "") => {
                if (isAppMode) {
                     return (
                        <div 
                            className="w-full h-full flex items-center justify-center text-gray-700 font-bold cursor-pointer" 
                            onClick={() => setShowMobileModal(true)}
                        >
                            {value ?? '-'}
                        </div>
                     );
                }
                return (
                    <div className={`relative w-full h-full ${error ? 'bg-red-100 ring-2 ring-red-500 ring-inset' : ''}`} title={title}>
                        <input
                            type="number"
                            step="0.1"
                            className="w-full h-full bg-transparent text-center focus:outline-none focus:bg-white/50"
                            value={value ?? ''}
                            onChange={(e) => handleChange(fieldPath, e.target.value === '' ? null : parseFloat(e.target.value))}

                        {error && (
                            <div className="absolute top-0 right-0 text-red-600 text-[10px] font-bold px-1">!</div>

            // Validation Checks
            const shiftAError = (equipment.shiftA.final !== null && equipment.shiftA.initial !== null) && (equipment.shiftA.final < equipment.shiftA.initial);
            const shiftBError = (equipment.shiftB.final !== null && equipment.shiftB.initial !== null) && (equipment.shiftB.final < equipment.shiftB.initial);
            const workedAHigh = equipment.shiftA.worked > 24;
            const workedBHigh = equipment.shiftB.worked > 24;

            const regressionError = lastReading && 
                                    equipment.shiftA.initial !== null && 
                                    lastReading.value !== null && 
                                    equipment.shiftA.initial < lastReading.value;

            return (

                    </td>
                    {!isAppMode && !isCaminhoes && <td className="border-r border-gray-300 bg-white">{renderNumberInput(equipment.shiftA.initial, 'shiftA.initial', regressionError, regressionError ? `Valor menor que anterior (${lastReading.value} em ${lastReading.date.split('-').reverse().join('/')})` : "")}</td>}

                    {!isAppMode && !isCaminhoes && <td className="border-r border-gray-300 bg-white">{renderNumberInput(equipment.shiftB.initial, 'shiftB.initial')}</td>}
                    {!isAppMode && !isCaminhoes && <td className="border-r border-gray-300 bg-white">{renderNumberInput(equipment.shiftB.final, 'shiftB.final', shiftBError, "Hora Final menor que Inicial!")}</td>}
                    {isAppMode && (

                                >

                                <img src="${chartUrl}" alt="Gráfico" width="90" height="90" style="max-width: 90px;" />
                                <div style="font-size: 9px; color: #999; margin-top: 5px; text-align: center;">Disponibilidade</div>
                                <div style="font-size: 10px; font-weight: bold; color: #43A047; margin-top: 2px; text-align: center;">Ativos: ${activePct}%</div>
                                <div style="font-size: 10px; font-weight: bold; color: #E53935; text-align: center;">Parados: ${stoppedPct}%</div>
                            </td>
                        </tr>
                    `;
                });

                htmlContent += `
                        <!-- Rodapé -->
                        <tr>
                            <td colspan="3" style="padding: 20px; text-align: center; border-top: 2px solid #2E7D32; background-color: #f8f9fa;">
                                <div style="font-size: 10px; color: #888; margin-bottom: 30px;">Relatório gerado automaticamente pelo Sistema de Gestão de Frotas</div>
                                <div style="border-top: 1px solid #ccc; width: 200px; margin: 0 auto;"></div>
                                <div style="font-size: 12px; color: #333; margin-top: 5px;">Responsável Operacional</div>
                            </td>
                        </tr>
                    </table>
                `;

                const fullHtml = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                    <head><meta charset='utf-8'><title>Relatório</title></head>
                    <body>${htmlContent}</body>
                    </html>
                `;

                const fallbackCopyTextToClipboard = (text) => {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-9999px";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        alert("Relatório (Texto) copiado para WhatsApp!");
                    } catch (err) {
                        alert("Erro ao copiar relatório: " + err);
                    }
                    document.body.removeChild(textArea);
                };

                try {
                    const blobHtml = new Blob([fullHtml], { type: 'text/html' });
                    const blobText = new Blob([plainText], { type: 'text/plain' });
                    
                    if (navigator.clipboard && navigator.clipboard.write) {
                        navigator.clipboard.write([
                            new ClipboardItem({
                                'text/html': blobHtml,
                                'text/plain': blobText
                            })
                        ]).then(() => {
                            alert("Relatório copiado! \n- Cole no Word para ver Tabela/Gráfico.\n- Cole no WhatsApp para ver texto formatado.");
                        }).catch(err => {
                            console.warn("Clipboard write failed, trying text fallback:", err);
                            if (navigator.clipboard.writeText) {
                                navigator.clipboard.writeText(plainText).then(() => {
                                    alert("Relatório (Texto) copiado para WhatsApp!");
                                }).catch(() => fallbackCopyTextToClipboard(plainText));
                            } else {
                                fallbackCopyTextToClipboard(plainText);
                            }
                        });
                    } else if (navigator.clipboard && navigator.clipboard.writeText) {
                         navigator.clipboard.writeText(plainText).then(() => {
                            alert("Relatório (Texto) copiado para WhatsApp!");
                        }).catch(() => fallbackCopyTextToClipboard(plainText));
                    } else {
                        fallbackCopyTextToClipboard(plainText);
                    }
                } catch (err) {
                    console.error("Erro ao copiar HTML:", err);
                    fallbackCopyTextToClipboard(plainText);
                }
            };

            const generateWordReport = () => {
                let html = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                    <head>
                        <meta charset='utf-8'>
                        <title>Relatório de Status</title>
                        <style>
                            body { font-family: 'Calibri', 'Arial', sans-serif; font-size: 11pt; }
                            h1 { color: #2E7D32; font-size: 18pt; margin-bottom: 10px; }
                            h2 { color: #1565C0; font-size: 14pt; margin-top: 20px; margin-bottom: 5px; }
                            h3 { color: #424242; font-size: 12pt; margin-top: 15px; margin-bottom: 5px; font-weight: bold; text-decoration: underline; }
                            table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
                            th, td { border: 1px solid #ddd; padding: 4px; text-align: center; font-size: 10pt; }
                            th { background-color: #f2f2f2; font-weight: bold; }
                            .ok { color: green; font-weight: bold; }
                            .issue { color: red; font-weight: bold; }
                            .obs { font-style: italic; font-size: 9pt; }
                            .plant-header { border-bottom: 2px solid #2E7D32; padding-bottom: 10px; margin-bottom: 20px; }
                            .date-info { color: #666; margin-bottom: 20px; }
                        </style>
                    </head>
                    <body>
                        <div class="plant-header">
                            <h1>*${plant.name}*</h1>
                            <div class="date-info">Data: ${selectedDate.split('-').reverse().join('/')}</div>
                        </div>
                `;

                const frentesIds = Object.keys(allData).sort();
                let hasData = false;

                frentesIds.forEach(frenteId => {
                    const report = allData[frenteId]?.[selectedDate];
                    // Skip if no report or empty report (check if groups exist)
                    if (!report || !report.groups || report.groups.length === 0) return;

                    hasData = true;
                    // Título da Frente
                    html += `<h2>*${frenteId}*</h2>`;

                    report.groups.forEach(group => {
                        // Verifica se o grupo tem itens
                        if (!group.items || group.items.length === 0) return;

                        html += `<h3>*${group.name}*</h3>`;
                        
                        html += `
                            <table>
                                <thead>
                                    <tr>
                                        <th>Frota</th>
                                        <th>H. Trab (A)</th>
                                        <th>H. Manut (A)</th>
                                        <th>H. Trab (B)</th>
                                        <th>H. Manut (B)</th>
                                        <th>Total Trab</th>
                                        <th>Total Manut</th>
                                        <th>Disp. Mec. %</th>
                                        <th>Status</th>
                                        <th>Obs</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;

                        group.items.forEach(item => {
                            const workedA = item.shiftA.worked || 0;
                            const maintA = item.shiftA.maintenance || 0;
                            const workedB = item.shiftB.worked || 0;
                            const maintB = item.shiftB.maintenance || 0;
                            const totalWorked = workedA + workedB;
                            const totalMaint = maintA + maintB;
                            const totalTime = totalWorked + totalMaint;
                            const availability = totalTime > 0 ? (totalWorked / totalTime) * 100 : 0;
                            const statusIcon = item.status === 'ok' ? '✅' : '❌';
                            
                            html += `
                                <tr>
                                    <td>${item.frota}</td>
                                    <td>${workedA.toFixed(1)}</td>
                                    <td>${maintA.toFixed(1)}</td>
                                    <td>${workedB.toFixed(1)}</td>
                                    <td>${maintB.toFixed(1)}</td>
                                    <td>${totalWorked.toFixed(1)}</td>
                                    <td>${totalMaint.toFixed(1)}</td>
                                    <td>${availability.toFixed(1)}%</td>
                                    <td class="${item.status}">${statusIcon}</td>
                                    <td class="obs">${item.obs || ''}</td>
                                </tr>
                            `;
                        });

                        html += `</tbody></table>`;
                    });
                });

                if (!hasData) {
                    html += "<p>Nenhum dado encontrado para a data selecionada.</p>";
                }

                html += "</body></html>";
                
                const blob = new Blob(['\ufeff', html], {
                    type: 'application/msword'
                });
                
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `Relatorio_Status_${plant.name}_${selectedDate}.doc`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const allItems = data.groups.flatMap(g => g.items);
            const totalHoursA = allItems.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
            const totalHoursB = allItems.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
            const totalIssues = allItems.filter(i => i.status === 'issue').length;
            const totalMachines = allItems.length;

            const frentesSummary = useMemo(() => {
                if (!allData) return [];
                return Object.keys(allData).map(frenteId => {
                    const report = allData[frenteId]?.[selectedDate];
                    if (!report) {
                        return {
                            id: frenteId,
                            totalA: 0,
                            totalB: 0,
                            totalMaint: 0,
                            totalIssues: 0,
                            totalMachines: 0,
                            operational: 0,
                            availability: 0,
                            mechanicalAvailability: 0,
                            avgHoursPerMachine: 0,
                            plantioHours: 0,
                            plantioYield: 0,
                            plantioGroupName: ''
                        };
                    }
                    const items = report.groups.flatMap(g => g.items);
                    const totalA = items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
                    const totalB = items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
                    const totalMaintA = items.reduce((acc, item) => acc + (item.shiftA.maintenance || 0), 0);
                    const totalMaintB = items.reduce((acc, item) => acc + (item.shiftB.maintenance || 0), 0);
                    
                    const issues = items.filter(i => i.status === 'issue').length;
                    const machines = items.length;
                    const operational = machines - issues;
                    
                    const totalHours = totalA + totalB;
                    const totalMaint = totalMaintA + totalMaintB;
                    const totalTime = totalHours + totalMaint;
                    
                    // Disponibilidade Física (Baseada em Quantidade de Equipamentos)
                    const availability = machines > 0 ? operational / machines : 0;
                    
                    // Disponibilidade Mecânica (Baseada em Horas Trabalhadas vs Manutenção)
                    // Fórmula: Horas Trabalhadas / (Horas Trabalhadas + Horas Manutenção)
                    const mechanicalAvailability = totalTime > 0 ? totalHours / totalTime : (machines > 0 && totalMaint === 0 ? 1 : 0);
                    
                    const avgHoursPerMachine = machines > 0 ? totalHours / machines : 0;

                    let plantioHours = 0;
                    let plantioYield = 0;
                    let plantioGroupName = '';
                    let targetGroupId = null;

                    if (report.groups.some(g => g.id === 'tortao' || g.id === 'sulcador')) {
                        targetGroupId = 'distribuidor';
                    } else if (report.groups.some(g => g.id === 'plantadora')) {
                        targetGroupId = 'plantadora';
                    }

                    if (targetGroupId) {
                        const g = report.groups.find(gr => gr.id === targetGroupId);
                        if (g) {
                            plantioGroupName = g.name;
                            plantioHours = g.items.reduce((acc, item) => acc + (item.totalAB || 0), 0);
                            plantioYield = typeof g.yield === 'number' ? g.yield : parseFloat(g.yield) || 0;
                        }
                    }

                    // Gatec Availability Calculation
                    let gatecTotal = 0;
                    let gatecCount = 0;
                    items.forEach(item => {
                        if (item.gatec_availability !== undefined && item.gatec_availability !== null) {
                            gatecTotal += parseFloat(item.gatec_availability);
                            gatecCount++;
                        }
                    });
                    const gatecAvailability = gatecCount > 0 ? gatecTotal / gatecCount : 0;

                    return {
                        id: frenteId,
                        totalA,
                        totalB,
                        totalMaint,
                        totalIssues: issues,
                        totalMachines: machines,
                        operational,
                        availability,
                        mechanicalAvailability,
                        gatecAvailability,
                        avgHoursPerMachine,
                        plantioHours,
                        plantioYield,
                        plantioGroupName
                    };
                });
            }, [allData, selectedDate]);

            const frenteGroups = useMemo(() => {
                if (!allData || !selectedDate) return [];
                return Object.keys(allData).map(frenteId => {
                    const report = allData[frenteId]?.[selectedDate];
                    if (!report) return null;
                    const labels = report.groups.map(g => g.name);
                    const horasA = report.groups.map(g => g.items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0));
                    const horasB = report.groups.map(g => g.items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0));
                    
                    const gatecAvail = report.groups.map(g => {
                        let total = 0;
                        let count = 0;
                        g.items.forEach(item => {
                            if (item.gatec_availability) {
                                total += parseFloat(item.gatec_availability);
                                count++;
                            }
                        });
                        return count > 0 ? (total / count) * 100 : 0;
                    });

                    return {
                        id: frenteId,
                        labels,
                        horasA,
                        horasB,
                        gatecAvail
                    };
                }).filter(Boolean);
            }, [allData, selectedDate]);

            const rendimentoSeries = useMemo(() => {
                const getGroup = (frenteId, groupId) => {
                    const report = allData?.[frenteId]?.[selectedDate];
                    if (!report) return null;
                    return report.groups.find(g => g.id === groupId) || null;
                };

                const plantadora = getGroup('F4001', 'plantadora');
                const distribuidor = getGroup('F4002', 'distribuidor');

                const calc = (group) => {
                    if (!group) return { hours: 0, yield: 0 };
                    const hours = group.items.reduce((acc, item) => acc + (item.totalAB || 0), 0);
                    const y = typeof group.yield === 'number' ? group.yield : parseFloat(group.yield) || 0;
                    return { hours, yield: y };
                };

                const p = calc(plantadora);
                const d = calc(distribuidor);

                return {
                    labels: ['F4001 Plantadora', 'F4002 Distribuidor'],
                    hours: [p.hours, d.hours],
                    yields: [p.yield, d.yield]
                };
            }, [allData, selectedDate]);

            const acumuladoSummary = useMemo(() => {
                if (!allData || !selectedDate) return [];
                const selected = new Date(selectedDate);
                const min = new Date(selected);
                min.setUTCDate(min.getUTCDate() - (rangeDays - 1));

                return Object.keys(allData).map(frenteId => {
                    const dias = allData[frenteId] || {};
                    let totalA = 0;
                    let totalB = 0;
                    Object.entries(dias).forEach(([dateStr, report]) => {
                        const d = new Date(dateStr);
                        if (d >= min && d <= selected) {
                            const items = report.groups.flatMap(g => g.items);
                            totalA += items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
                            totalB += items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
                        }
                    });
                    return {
                        id: frenteId,
                        totalA,
                        totalB
                    };
                });
            }, [allData, selectedDate, rangeDays]);

            useEffect(() => {
                if (!chartRef.current || !pieRef.current) return;

                const ctx = chartRef.current.getContext('2d');
                if (window.myBarChart) window.myBarChart.destroy();

                window.myBarChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.groups.map(g => g.name),
                        datasets: data.frenteType === 'caminhoes' ? [{
                            label: 'Quantidade',
                            data: data.groups.map(g => g.items.length),
                            backgroundColor: plant.chartPrimary
                        }] : [
                            {
                                label: 'Turno A',
                                data: data.groups.map(g => g.items.reduce((acc, i) => acc + (i.shiftA.worked || 0), 0)),
                                backgroundColor: plant.chartPrimary
                            },
                            {
                                label: 'Turno B',
                                data: data.groups.map(g => g.items.reduce((acc, i) => acc + (i.shiftB.worked || 0), 0)),
                                backgroundColor: plant.chartSecondary
                            }
                        ]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero: true } } }
                });

                const pieCtx = pieRef.current.getContext('2d');
                if (window.myPieChart) window.myPieChart.destroy();

                window.myPieChart = new Chart(pieCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Operacional', 'Com Problema'],
                        datasets: [{
                            data: [totalMachines - totalIssues, totalIssues],
                            backgroundColor: ['#00A651', '#ED1C24']
                        }]
                    },
                    options: { responsive: true }
                });

                // Gatec Chart
                if (gatecChartRef.current) {
                    const gCtx = gatecChartRef.current.getContext('2d');
                    if (window.myGatecChart) window.myGatecChart.destroy();
                    
                    const currentGroupData = frenteGroups.find(g => g.id === data.id);
                    if (currentGroupData && currentGroupData.gatecAvail && currentGroupData.gatecAvail.some(v => v > 0)) {
                         window.myGatecChart = new Chart(gCtx, {
                            type: 'bar',
                            data: {
                                labels: currentGroupData.labels,
                                datasets: [{
                                    label: 'Disp. Gatec (%)',
                                    data: currentGroupData.gatecAvail.map(v => v.toFixed(1)),
                                    backgroundColor: '#9333ea', // Purple
                                }]
                            },
                            options: {
                                responsive: true,
                                scales: {
                                    y: { beginAtZero: true, max: 100 }
                                },
                                plugins: {
                                    tooltip: {
                                        callbacks: {
                                            label: function(context) {
                                                return context.parsed.y + '%';
                                            }
                                        }
                                    }
                                }
                            }
                        });
                    }
                }

                if (frenteChartRef.current) {
                    const frenteCtx = frenteChartRef.current.getContext('2d');
                    if (window.myFrenteChart) window.myFrenteChart.destroy();

                    const colorsA = plant.chartPrimary;
                    const colorsB = plant.chartSecondary;

                    window.myFrenteChart = new Chart(frenteCtx, {
                        type: 'bar',
                        data: {
                            labels: frentesSummary.map(f => f.id),
                            datasets: [
                                {
                                    label: 'Turno A',
                                    data: frentesSummary.map(f => f.totalA),
                                    backgroundColor: colorsA
                                },
                                {
                                    label: 'Turno B',
                                    data: frentesSummary.map(f => f.totalB),
                                    backgroundColor: colorsB
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                }

                if (rendimentoChartRef.current) {
                    const rCtx = rendimentoChartRef.current.getContext('2d');
                    if (window.myRendimentoChart) window.myRendimentoChart.destroy();
                    window.myRendimentoChart = new Chart(rCtx, {
                        type: 'bar',
                        data: {
                            labels: rendimentoSeries.labels,
                            datasets: [
                                {
                                    label: 'Horas Trabalhadas (Total A+B)',
                                    data: rendimentoSeries.hours,
                                    backgroundColor: plant.chartPrimary,
                                    yAxisID: 'y'
                                },
                                {
                                    label: 'Velocidade / Rendimento',
                                    data: rendimentoSeries.yields,
                                    backgroundColor: '#0EA5E9',
                                    yAxisID: 'y1'
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    position: 'left',
                                    title: { display: true, text: 'Horas' }
                                },
                                y1: {
                                    beginAtZero: true,
                                    position: 'right',
                                    grid: { drawOnChartArea: false },
                                    title: { display: true, text: 'Velocidade / Rendimento' }
                                }
                            }
                        }
                    });
                }

                if (acumuladoChartRef.current) {
                    const aCtx = acumuladoChartRef.current.getContext('2d');
                    if (window.myAcumuladoChart) window.myAcumuladoChart.destroy();

                    const colorsAcumA = plant.chartPrimary;
                    const colorsAcumB = plant.chartSecondary;

                    window.myAcumuladoChart = new Chart(aCtx, {
                        type: 'bar',
                        data: {
                            labels: acumuladoSummary.map(f => f.id),
                            datasets: [
                                {
                                    label: 'Horas A (acumulado)',
                                    data: acumuladoSummary.map(f => f.totalA),
                                    backgroundColor: colorsAcumA
                                },
                                {
                                    label: 'Horas B (acumulado)',
                                    data: acumuladoSummary.map(f => f.totalB),
                                    backgroundColor: colorsAcumB
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                }

                if (!window.myFrenteGroupCharts) {
                    window.myFrenteGroupCharts = {};
                }
                Object.values(window.myFrenteGroupCharts).forEach(ch => ch.destroy());
                window.myFrenteGroupCharts = {};

                frenteGroups.forEach(fg => {
                    const canvas = document.getElementById(`frente-group-chart-${fg.id}`);
                    if (!canvas) return;
                    const fgCtx = canvas.getContext('2d');
                    window.myFrenteGroupCharts[fg.id] = new Chart(fgCtx, {
                        type: 'bar',
                        data: {
                            labels: fg.labels,
                            datasets: [
                                {
                                    label: 'Turno A',
                                    data: fg.horasA,
                                    backgroundColor: plant.chartPrimary
                                },
                                {
                                    label: 'Turno B',
                                    data: fg.horasB,
                                    backgroundColor: plant.chartSecondary
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                });

                return () => {
                    if (window.myBarChart) window.myBarChart.destroy();
                    if (window.myPieChart) window.myPieChart.destroy();
                    if (window.myGatecChart) window.myGatecChart.destroy();
                    if (window.myFrenteChart) window.myFrenteChart.destroy();
                    if (window.myRendimentoChart) window.myRendimentoChart.destroy();
                    if (window.myAcumuladoChart) window.myAcumuladoChart.destroy();
                    if (window.myFrenteGroupCharts) {
                        Object.values(window.myFrenteGroupCharts).forEach(ch => ch.destroy());
                        window.myFrenteGroupCharts = {};
                    }
                };
            }, [data, frentesSummary, rendimentoSeries, acumuladoSummary, frenteGroups, totalMachines, totalIssues, showComparison]);

            const handleTransferEquipment = (groupId, equipmentId) => {
                 setTransferData({ groupId, equipmentId });
                 setTransferModalOpen(true);
            };

            const confirmTransfer = (targetFrenteId) => {
                 if (!transferData || !targetFrenteId) return;

                 onTransferEquipment(transferData.groupId, transferData.equipmentId, targetFrenteId);
                 setTransferModalOpen(false);
                 setTransferData(null);
            };

            const currentSummary = frentesSummary.find(f => f.id === data.id) || {
                totalMaint: 0, availability: 0, mechanicalAvailability: 0
            };

            return (
                <div className="space-y-6">
                    <TransferModal 
                        isOpen={transferModalOpen}
                        onClose={() => setTransferModalOpen(false)}
                        onTransfer={confirmTransfer}
                        allFrentes={Object.keys(allData)}
                        currentFrenteId={data.id}
                    />
                    <div className="flex items-center justify-between">
                        <h2 className="text-lg font-bold text-gray-700">Dashboard Frente {data.id}</h2>
                        <div className="flex space-x-2">
                            <button
                                onClick={copyWhatsAppReport}
                                className="text-xs px-3 py-1 rounded bg-green-600 text-white hover:bg-green-700 font-bold flex items-center"
                                title="Copiar Relatório para Word"
                            >
                                <Icons.Copy size={14} className="mr-1" />
                                Relatório Word / WhatsApp
                            </button>
                            <button
                                onClick={generateWordReport}
                                className="text-xs px-3 py-1 rounded bg-blue-600 text-white hover:bg-blue-700 font-bold flex items-center"
                                title="Baixar Relatório de Status (Word)"
                            >
                                <Icons.Download size={14} className="mr-1" />
                                Relatório Status
                            </button>
                            <button
                                onClick={() => setShowComparison(prev => !prev)}
                                className={`text-xs px-3 py-1 rounded border ${showComparison ? `${plant.solidBgClass} text-white ${plant.borderClass}` : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-100'}`}
                            >
                                {showComparison ? 'Ver apenas frente selecionada' : 'Comparar frentes'}
                            </button>

                    // 2. Reuse logic to find report and update

                                    selectedPlant === 'vale-verdao' ? 'daily_reports_vale_verdao' :
                                    selectedPlant === 'floresta' ? 'daily_reports_floresta' : 'daily_reports';

                    const { data: reports, error } = await supabaseClient
                        .from(tableName)

                    if (error) throw error;

                    // Fetch equipment info for fallback
                    let suffix = 'cambui';
                    if (selectedPlant === 'panorama') suffix = 'panorama';
                    else if (selectedPlant === 'vale-verdao') suffix = 'vale_verdao';

                    const reportMap = {};

                    let foundReport = null;

                                const item = g.items.find(i => String(i.frota).trim().toUpperCase() == String(frota).trim().toUpperCase());

                    }

                    const normalizedFrota = String(frota).trim().toUpperCase();

                         if (targetFrente && reportMap[targetFrente]) {

                             let groupObj = report.report_data.groups.find(g => g.name === targetGroup);

                                 groupObj = { id: targetGroup.toLowerCase(), name: targetGroup, items: [], yield: 0, yieldLabel: 'Produção' };
                                 report.report_data.groups.push(groupObj);

                             const newItem = {

                                 shiftB: { initial: null, final: null, worked: 0, maintenance: 0 },
                                 totalAB: 0,

                             groupObj.items.push(newItem);
                             foundReport = report;
                             foundItem = newItem;
                             newLogs.push(`Frota adicionada à frente ${targetFrente}.`);

                    // Update Item

                    // Save Log

            const handleFileChange = (e) => {

            const testAIConnection = async () => {

                } else {

                    } else {
                        alert(`❌ FALHA EM TODOS OS MODELOS.\n\nRelatório:\n${reportLog}\n\nDica: Se o erro for 'Quota exceeded' ou 'Limit: 0', sua conta Google pode estar sem acesso gratuito ou bloqueada na região.`);

                setProcessing(false);

            const processWithAI = async (f) => {
                setProcessing(true);
                setLogs(prev => [...prev, `Iniciando análise com ${aiProvider === 'deepseek' ? 'DeepSeek' : 'Gemini'} AI...`]);
                try {
                    let textContent = "";
                    
                    if (f.name.endsWith('.pdf')) {

                        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                        for (let i = 1; i <= pdf.numPages; i++) {

                            const text = await page.getTextContent();
                            
                            // Smart Grouping for AI Context
                            const items = text.items.map(item => ({
                                str: item.str,

                                y: item.transform[5]
                            }));
                            items.sort((a, b) => b.y - a.y);
                            
                            const lines = [];
                            let currentLine = [];
                            let lastY = null;
                            items.forEach(item => {
                                if (lastY === null || Math.abs(item.y - lastY) < 5) {
                                    currentLine.push(item);
                                } else {
                                    lines.push(currentLine.sort((a, b) => a.x - b.x));
                                    currentLine = [item];
                                }
                                lastY = item.y;
                            });
                            if (currentLine.length > 0) lines.push(currentLine.sort((a, b) => a.x - b.x));
                            
                            textContent += lines.map(line => line.map(i => i.str).join(' ')).join('\n') + "\n";
                        }
                    } else {
                        const data = await f.arrayBuffer();
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        textContent = XLSX.utils.sheet_to_csv(sheet);
                    }

                    setLogs(prev => [...prev, `Texto extraído: ${textContent.length} caracteres.`]);

                    if (textContent.length < 50) {
                        throw new Error("O arquivo parece vazio ou não pôde ser lido corretamente (Texto < 50 caracteres).");
                    }

                    // Call Gemini API
                    const prompt = `
                        Analise este relatório de disponibilidade mecânica (Gatec) - Motivo de Parada por Equipamento.
                        O relatório é estruturado em blocos por Equipamento (Frota).
                        
                        Estrutura do Bloco:
                        1. Cabeçalho: Código da Frota (ex: "6995").
                        2. Linhas de Detalhe (Paradas): Contêm Data/Hora Parada, Data/Hora Retorno, Duração (Tempo Fora), Motivo, Disponibilidade Parcial.
                        3. Linha de Rodapé (Resumo): Começa com "Acumulado" ou "Total" e contém a Disponibilidade Geral do período.

                        TAREFA: Extraia TODAS as linhas relevantes (Detalhes e Resumo).
                        
                        Retorne um JSON Array onde cada objeto representa uma linha do relatório:
                        {
                            "frota": "string (código do equipamento)",
                            "data_parada": "string (dd/mm/yyyy hh:mm:ss) ou null",
                            "data_retorno": "string (dd/mm/yyyy hh:mm:ss) ou null",
                            "tempo_fora": "string (hh:mm) ou null",
                            "motivo": "string (descrição LIMPA do motivo, SEM durações no início, ou 'ACUMULADO')",
                            "disponibilidade": number (decimal 0.0 a 1.0),
                            "tipo": "string ('detalhe' ou 'resumo')"
                        }

                        Regras Importantes:
                        - LIMPEZA DE MOTIVO: Remova durações (ex: "00:00 00:01") que aparecem antes do texto do motivo. Ex: ":00 :00 00:01 00:01 FINAL DE TURNO" deve virar apenas "FINAL DE TURNO".
                        - TEMPO FORA: Extraia a duração da parada se disponível.
                        - RESUMO ÚNICO: Se houver múltiplas linhas de resumo (Acumulado, Total, Somatória), use APENAS a linha que contém "Acumulado por Equipamento" como o resumo principal. Ignore as outras linhas de totais redundantes para a mesma frota.
                        - A disponibilidade deve ser sempre convertida para decimal (ex: 98,8% -> 0.988).

                        Texto do Relatório:
                        ${textContent.substring(0, 45000)} 
                    `;

                    let jsonStr;

                    if (aiProvider === 'deepseek') {
                         setLogs(prev => [...prev, "Enviando solicitação para DeepSeek AI..."]);
                         const response = await fetch('https://api.deepseek.com/chat/completions', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${deepseekKey}`
                            },
                            body: JSON.stringify({
                                model: "deepseek-chat",
                                messages: [
                                    {"role": "system", "content": "You are a helpful assistant that extracts structured JSON data from reports. Always return valid JSON only, without markdown code blocks. The user will provide a text report and you must extract the data according to the schema provided in the prompt."},
                                    {"role": "user", "content": prompt}
                                ],
                                stream: false
                            })
                        });

                        if (!response.ok) {
                             const err = await response.json();
                             throw new Error(`DeepSeek API Error: ${err.error?.message || response.statusText}`);
                        }
                        
                        const data = await response.json();
                        const content = data.choices?.[0]?.message?.content;
                        if (!content) throw new Error("DeepSeek retornou resposta vazia.");
                        
                        jsonStr = content.replace(/```json/g, '').replace(/```/g, '').trim();
                        setLogs(prev => [...prev, "Resposta recebida do DeepSeek!"]);

                    } else {
                        // Gemini Logic
                        const callGeminiModel = async (modelName) => {
                            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${geminiKey}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: prompt }] }]
                                })
                            });
                            
                            if (!response.ok) {
                                let errorMsg = response.statusText;
                                try {
                                    const errJson = await response.json();
                                    errorMsg = errJson.error?.message || errorMsg;
                                } catch (e) {
                                    try { errorMsg = await response.text(); } catch (e2) {}
                                }
                                throw new Error(`HTTP ${response.status} - ${errorMsg}`);
                            }

                            const res = await response.json();
                            if (res.error) throw new Error(res.error.message);
                            return res;
                        };

                        let result;
                        // Auto-Failover Logic
                        const modelsToTry = [aiModel, 'gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-1.0-pro'];
                        const uniqueModels = [...new Set(modelsToTry)];
                        let success = false;

                        for (const model of uniqueModels) {
                            try {
                                setLogs(prev => [...prev, `Tentando modelo ${model}...`]);
                                
                                // Delay para evitar rate limit agressivo
                                if (model !== uniqueModels[0]) {
                                    await new Promise(r => setTimeout(r, 1500));
                                }

                                result = await callGeminiModel(model);
                                setLogs(prev => [...prev, `Sucesso com ${model}!`]);
                                success = true;
                                if (model !== aiModel) {
                                    setAiModel(model); 
                                    setLogs(prev => [...prev, `Modelo preferido atualizado para ${model}`]);

                                break;
                            } catch (err) {
                                console.warn(`Falha com ${model}:`, err);
                                setLogs(prev => [...prev, `Falha com ${model}: ${err.message}`]);

                        }

                        if (!success) {
                            throw new Error(`Todos os modelos de IA falharam (429 Quota/Outros). Verifique sua chave API.`);
                        }
                        
                        const rawText = result.candidates[0].content.parts[0].text;
                        jsonStr = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                    }
                    let json;
                    try {
                        json = JSON.parse(jsonStr);
                    } catch (parseErr) {
                        throw new Error(`Erro ao ler resposta da IA (JSON Inválido).`);
                    }

                    // Normalize data structure
                    const rows = json.map(item => ({
                        "Conteúdo da Linha": item.motivo === 'ACUMULADO' ? "RESUMO: " + item.frota : `${item.data_parada || ''} - ${item.motivo}`,
                        "Frota (Detectado)": item.frota,
                        "Disponibilidade (Detectado)": item.disponibilidade,

                    }));

                    setParsedData(rows);
                    setLogs(prev => [...prev, `Gemini processou ${rows.length} registros com sucesso.`]);

                } catch (e) {

                    const isQuotaError = e.message.includes('429') || 
                                       e.message.includes('402') ||

                                       e.message.includes('Balance') ||

                    if (isQuotaError) {
                        setAiProvider('offline');
                        alert(`⚠️ MODO OFFLINE ATIVADO AUTOMATICAMENTE\n\nErro na IA: ${e.message}\n\nO sistema mudou para processamento local para evitar interrupções.`);
                    } else {
                        alert(`A IA encontrou um problema: ${e.message}\n\nTentando método de leitura padrão.`);

                    setLogs(prev => [...prev, `Erro na IA: ${e.message}. Alternando para método tradicional...`]);
                    
                    if (f.name.endsWith('.pdf')) parsePDF(f);

                    setProcessing(false);
