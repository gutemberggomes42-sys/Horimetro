             } else {

                 base.groups = [
                    {
                        id: 'colhedoras',
                        name: 'Colhedoras',
                        yield: 0,
                        yieldLabel: 'Rendimento Plantio turno "A"',

                            { id: '6603', frota: '6603' },

                    },

        // --- Components ---

        // --- Transfer Modal Component ---
        const TransferModal = ({ isOpen, onClose, onTransfer, allFrentes, currentFrenteId }) => {
            const [targetFrente, setTargetFrente] = useState('');

            useEffect(() => {
                if (isOpen) {
                    const firstAvailable = allFrentes.find(f => f !== currentFrenteId);
                    if (firstAvailable) setTargetFrente(firstAvailable);
                }
            }, [isOpen, allFrentes, currentFrenteId]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[70]">
                    <div className="bg-white rounded-lg p-6 w-96 shadow-2xl">
                        <h2 className="text-xl font-bold mb-4 text-gray-800">Transferir Equipamento</h2>
                        <p className="mb-4 text-sm text-gray-600">Selecione a frente de destino para este equipamento:</p>
                        
                        <div className="mb-6">

                                className={`px-4 py-2 rounded font-bold text-white ${!targetFrente ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}
                            >
                                Transferir
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const EquipmentRow = ({ equipment, plant, onChange, onDelete, onTransfer, isLast, groupName, onSqlError }) => {
            const handleChange = (field, value) => {
                onChange(equipment.id, field, value);
            };

            const handleBlur = async () => {
                if (!equipment.frota || equipment.frota === 'NOVA') return;
                
                let tableName = 'equipments_cambui';
                if (plant.id === 'panorama') tableName = 'equipments_panorama';
                else if (plant.id === 'vale-verdao') tableName = 'equipments_vale_verdao';
                else if (plant.id === 'floresta') tableName = 'equipments_floresta';

                console.log(`Auto-registering fleet ${equipment.frota} to ${tableName}...`);

                try {
                    const { error } = await supabaseClient
                        .from(tableName)
                        .upsert({ 
                            frota: equipment.frota, 
                            group_name: groupName
                        }, { onConflict: 'frota' });
                    
                    if (error) {
                        console.error("Auto-register error:", error);
                        if (error.code === '42P01' || error.message.includes('relation') || error.message.includes('does not exist')) {
                             if (onSqlError) onSqlError();
                        }
                    } else {
                        console.log("Fleet registered successfully.");
                    }
                } catch (e) {
                    console.error("Auto-register exception:", e);
                }
            };

            const renderNumberInput = (value, fieldPath) => (
                <input
                    type="number"
                    step="0.1"
                    className="w-full h-full bg-transparent text-center focus:outline-none focus:bg-white/50"
                    value={value ?? ''}
                    onChange={(e) => handleChange(fieldPath, e.target.value === '' ? null : parseFloat(e.target.value))}
                />
            );

            return (
                <tr className={`text-sm border-b border-gray-300 ${isLast ? "" : "border-b"}`}>
                    <td className={`border-r border-gray-400 font-bold text-center relative group ${equipment.status === 'issue' ? 'bg-red-500 text-white' : `${plant.solidBgClass} text-white`}`}>
                        <div className="flex items-center justify-between h-full px-1">
                            <input 
                                type="text" 
                                value={equipment.frota} 
                                onChange={(e) => handleChange('frota', e.target.value)}
                                onBlur={handleBlur}
                                className="w-full bg-transparent text-center text-white font-bold focus:outline-none placeholder-white/50"
                                placeholder="Frota"
                            />
                            <button 
                                onClick={() => onDelete(equipment.id)}
                                className="opacity-0 group-hover:opacity-100 text-white hover:text-red-200 ml-1 transition-opacity"
                                title="Excluir Frota"
                            >
                                <Icons.X size={14} />
                            </button>
                            <button 
                                onClick={() => onTransfer(equipment.id)}
                                className="opacity-0 group-hover:opacity-100 text-white hover:text-blue-200 ml-1 transition-opacity"
                                title="Transferir para outra frente"
                            >
                                <Icons.ArrowRight size={14} />
                            </button>
                        </div>
                    </td>
                    <td className="border-r border-gray-300 bg-white">{renderNumberInput(equipment.shiftA.initial, 'shiftA.initial')}</td>
                    <td className="border-r border-gray-300 bg-white">{renderNumberInput(equipment.shiftA.final, 'shiftA.final')}</td>
                    <td className="border-r border-gray-400 bg-gray-200 font-bold text-center">{equipment.shiftA.worked.toFixed(1)}</td>
                    <td className="border-r border-gray-300 bg-white">{renderNumberInput(equipment.shiftB.initial, 'shiftB.initial')}</td>
                    <td className="border-r border-gray-300 bg-white">{renderNumberInput(equipment.shiftB.final, 'shiftB.final')}</td>
                    <td className="border-r border-gray-400 bg-gray-200 font-bold text-center">{equipment.shiftB.worked.toFixed(1)}</td>
                    <td className="border-r border-gray-400 bg-gray-200 font-bold text-center">{equipment.totalAB.toFixed(1)}</td>
                    <td className="border-r border-gray-400 text-center cursor-pointer"
                        onClick={() => handleChange('status', equipment.status === 'ok' ? 'issue' : 'ok')}>
                        <div className={`flex items-center justify-center h-full w-full ${equipment.status === 'ok' ? 'text-green-600' : 'bg-red-600 text-white'}`}>
                            {equipment.status === 'ok' ? <Icons.Check size={16} /> : <Icons.X size={16} />}
                        </div>
                    </td>
                    <td className={`text-center p-0 relative ${equipment.obs.toLowerCase().includes('oficina') ? 'bg-red-500 text-white' : 'bg-green-600 text-white'}`}>
                        <input
                            type="text"
                            className="w-full h-full bg-transparent text-center text-white placeholder-white/70 focus:outline-none"
                            value={equipment.obs}
                            onChange={(e) => handleChange('obs', e.target.value)}
                        />
                    </td>
                </tr>
            );
        };

        const EquipmentGroupTable = ({ group, plant, onUpdateEquipment, onUpdateGroup, onAddEquipment, onDeleteEquipment, onTransferEquipment, onSqlError }) => {
            const handleRowChange = (equipmentId, field, value) => {
                onUpdateEquipment(group.id, equipmentId, field, value);
            };

            const totalShiftA = group.items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
            const totalShiftB = group.items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
            const totalAB = totalShiftA + totalShiftB;
            
            const count = group.items.length;
            const avgShiftA = count > 0 ? totalShiftA / count : 0;
            const avgShiftB = count > 0 ? totalShiftB / count : 0;
            const avgTotal = avgShiftA + avgShiftB;

            return (
                <div className={`mb-6 border-2 ${plant.borderClass}`}>
                    <div className={`${plant.solidBgClass} text-white text-center font-bold border-b border-black py-1`}>
                        {group.name}
                    </div>
                    <div className="flex">
                        <div className="flex-grow">
                            <table className="w-full border-collapse">
                                <thead>
                                    <tr className={`${plant.solidBgClass} text-white text-xs`}>
                                        <th className="border border-gray-400 p-1 w-20">Frota</th>
                                        <th className="border border-gray-400 p-1 w-20">Hor.Inicial</th>
                                        <th className="border border-gray-400 p-1 w-20">Hor.Final</th>
                                        <th className="border border-gray-400 p-1 w-16">H.Trab.(A)</th>
                                        <th className="border border-gray-400 p-1 w-20">Hor.Inicial</th>
                                        <th className="border border-gray-400 p-1 w-20">Hor.Final</th>
                                        <th className="border border-gray-400 p-1 w-16">H.Trab.(B)</th>
                                        <th className="border border-gray-400 p-1 w-16">Total A-B</th>
                                        <th className="border border-gray-400 p-1 w-10">Status</th>
                                        <th className="border border-gray-400 p-1">Obs.</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {group.items.map((item, index) => (
                                            <EquipmentRow 
                                                key={item.id} 
                                                equipment={item} 
                                                plant={plant}
                                                groupName={group.name}
                                                onChange={handleRowChange}
                                                onDelete={(id) => onDeleteEquipment(group.id, id)}
                                                onTransfer={(id) => onTransferEquipment(group.id, id)}
                                                onSqlError={onSqlError}
                                                isLast={index === group.items.length - 1}
                                            />
                                    ))}
                                    <tr className="bg-white">
                                        <td colSpan={10} className="p-1 text-center border-t border-gray-300">
                                            <button 
                                                onClick={() => onAddEquipment(group.id)}
                                                className="text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1 px-4 rounded inline-flex items-center"
                                            >
                                                <Icons.Plus size={12} className="mr-1"/> Adicionar Frota
                                            </button>
                                        </td>
                                    </tr>
                                    <tr className={`${plant.bgClass} font-bold text-xs border-t-2 ${plant.borderClass}`}>
                                        <td colSpan={3} className="text-right pr-2 border-r border-gray-400 py-1">TOTAL HRS GERAL TURNO A</td>
                                        <td className="text-center border-r border-gray-400 bg-white">{totalShiftA.toFixed(1).replace('.', ',')}</td>
                                        <td colSpan={2} className="text-right pr-2 border-r border-gray-400">TOTAL HRS GERAL TURNO B</td>
                                        <td className="text-center border-r border-gray-400 bg-white">{totalShiftB.toFixed(1).replace('.', ',')}</td>
                                        <td className="text-center border-r border-gray-400 bg-white">{totalAB.toFixed(1).replace('.', ',')}</td>
                                        <td colSpan={2} className="bg-green-600"></td>
                                    </tr>
                                    <tr className="bg-total-yellow font-bold text-xs border-t border-orange-500">
                                        <td colSpan={3} className="text-center py-1 border-r border-gray-400">SOMA MÉDIA "A"</td>
                                        <td className="text-center border-r border-gray-400">{avgShiftA.toFixed(1).replace('.', ',')}</td>
                                        <td colSpan={2} className="text-center border-r border-gray-400">SOMA MÉDIA "B"</td>
                                        <td className="text-center border-r border-gray-400">{avgShiftB.toFixed(1).replace('.', ',')}</td>
                                        <td className="text-center border-r border-gray-400">{avgTotal.toFixed(1).replace('.', ',')}</td>
                                        <td colSpan={2} className="bg-green-600"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        {group.yield !== undefined && (
                            <div className="w-32 bg-green-600 border-l border-black flex flex-col items-center justify-center text-center p-2 relative">
                                <div className="text-white text-xs font-bold mb-2">{group.yieldLabel || 'Rendimento'}</div>
                                <input 
                                    type="number" 
                                    step="0.01"
                                    value={group.yield}
                                    onChange={(e) => onUpdateGroup(group.id, 'yield', parseFloat(e.target.value) || 0)}
                                    className="text-4xl font-bold text-black bg-white/30 w-full text-center focus:outline-none focus:bg-white rounded"
                                />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const Dashboard = ({ data, allData, selectedDate, plant }) => {
            const chartRef = useRef(null);
            const pieRef = useRef(null);
            const frenteChartRef = useRef(null);
            const rendimentoChartRef = useRef(null);
            const acumuladoChartRef = useRef(null);
            const [rangeDays, setRangeDays] = useState(7);
            const [showComparison, setShowComparison] = useState(false);
            const [transferModalOpen, setTransferModalOpen] = useState(false);
            const [transferData, setTransferData] = useState(null); // { groupId, equipmentId }

            const allItems = data.groups.flatMap(g => g.items);
            const totalHoursA = allItems.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
            const totalHoursB = allItems.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
            const totalIssues = allItems.filter(i => i.status === 'issue').length;
            const totalMachines = allItems.length;

            const frentesSummary = useMemo(() => {
                if (!allData) return [];
                return Object.keys(allData).map(frenteId => {
                    const report = allData[frenteId]?.[selectedDate];
                    if (!report) {
                        return {
                            id: frenteId,
                            totalA: 0,
                            totalB: 0,
                            totalIssues: 0,
                            totalMachines: 0,
                            operational: 0,
                            availability: 0,
                            avgHoursPerMachine: 0,
                            plantioHours: 0,
                            plantioYield: 0,
                            plantioGroupName: ''
                        };
                    }
                    const items = report.groups.flatMap(g => g.items);
                    const totalA = items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
                    const totalB = items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
                    const issues = items.filter(i => i.status === 'issue').length;
                    const machines = items.length;
                    const operational = machines - issues;
                    const totalHours = totalA + totalB;
                    const availability = machines > 0 ? operational / machines : 0;
                    const avgHoursPerMachine = machines > 0 ? totalHours / machines : 0;

                    let plantioHours = 0;
                    let plantioYield = 0;
                    let plantioGroupName = '';
                    let targetGroupId = null;

                    if (report.groups.some(g => g.id === 'tortao' || g.id === 'sulcador')) {
                        targetGroupId = 'distribuidor';
                    } else if (report.groups.some(g => g.id === 'plantadora')) {
                        targetGroupId = 'plantadora';
                    }

                    if (targetGroupId) {
                        const g = report.groups.find(gr => gr.id === targetGroupId);
                        if (g) {
                            plantioGroupName = g.name;
                            plantioHours = g.items.reduce((acc, item) => acc + (item.totalAB || 0), 0);
                            plantioYield = typeof g.yield === 'number' ? g.yield : parseFloat(g.yield) || 0;
                        }
                    }

                    return {
                        id: frenteId,
                        totalA,
                        totalB,
                        totalIssues: issues,
                        totalMachines: machines,
                        operational,
                        availability,
                        avgHoursPerMachine,
                        plantioHours,
                        plantioYield,
                        plantioGroupName
                    };
                });
            }, [allData, selectedDate]);

            const frenteGroups = useMemo(() => {
                if (!allData || !selectedDate) return [];
                return Object.keys(allData).map(frenteId => {
                    const report = allData[frenteId]?.[selectedDate];
                    if (!report) return null;
                    const labels = report.groups.map(g => g.name);
                    const horasA = report.groups.map(g => g.items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0));
                    const horasB = report.groups.map(g => g.items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0));
                    return {
                        id: frenteId,
                        labels,
                        horasA,
                        horasB
                    };
                }).filter(Boolean);
            }, [allData, selectedDate]);

            const rendimentoSeries = useMemo(() => {
                const getGroup = (frenteId, groupId) => {
                    const report = allData?.[frenteId]?.[selectedDate];
                    if (!report) return null;
                    return report.groups.find(g => g.id === groupId) || null;
                };

                const plantadora = getGroup('F4001', 'plantadora');
                const distribuidor = getGroup('F4002', 'distribuidor');

                const calc = (group) => {
                    if (!group) return { hours: 0, yield: 0 };
                    const hours = group.items.reduce((acc, item) => acc + (item.totalAB || 0), 0);
                    const y = typeof group.yield === 'number' ? group.yield : parseFloat(group.yield) || 0;
                    return { hours, yield: y };
                };

                const p = calc(plantadora);
                const d = calc(distribuidor);

                return {
                    labels: ['F4001 Plantadora', 'F4002 Distribuidor'],
                    hours: [p.hours, d.hours],
                    yields: [p.yield, d.yield]
                };
            }, [allData, selectedDate]);

            const acumuladoSummary = useMemo(() => {
                if (!allData || !selectedDate) return [];
                const selected = new Date(selectedDate);
                const min = new Date(selected);
                min.setUTCDate(min.getUTCDate() - (rangeDays - 1));

                return Object.keys(allData).map(frenteId => {
                    const dias = allData[frenteId] || {};
                    let totalA = 0;
                    let totalB = 0;
                    Object.entries(dias).forEach(([dateStr, report]) => {
                        const d = new Date(dateStr);
                        if (d >= min && d <= selected) {
                            const items = report.groups.flatMap(g => g.items);
                            totalA += items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
                            totalB += items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
                        }
                    });
                    return {
                        id: frenteId,
                        totalA,
                        totalB
                    };
                });
            }, [allData, selectedDate, rangeDays]);

            useEffect(() => {
                if (!chartRef.current || !pieRef.current) return;

                const ctx = chartRef.current.getContext('2d');
                if (window.myBarChart) window.myBarChart.destroy();

                window.myBarChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.groups.map(g => g.name),
                        datasets: [
                            {
                                label: 'Turno A',
                                data: data.groups.map(g => g.items.reduce((acc, i) => acc + (i.shiftA.worked || 0), 0)),
                                backgroundColor: plant.chartPrimary
                            },
                            {
                                label: 'Turno B',
                                data: data.groups.map(g => g.items.reduce((acc, i) => acc + (i.shiftB.worked || 0), 0)),
                                backgroundColor: plant.chartSecondary
                            }
                        ]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero: true } } }
                });

                const pieCtx = pieRef.current.getContext('2d');
                if (window.myPieChart) window.myPieChart.destroy();

                window.myPieChart = new Chart(pieCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Operacional', 'Com Problema'],
                        datasets: [{
                            data: [totalMachines - totalIssues, totalIssues],
                            backgroundColor: ['#00A651', '#ED1C24']
                        }]
                    },
                    options: { responsive: true }
                });

                if (frenteChartRef.current) {
                    const frenteCtx = frenteChartRef.current.getContext('2d');
                    if (window.myFrenteChart) window.myFrenteChart.destroy();

                    const colorsA = plant.chartPrimary;
                    const colorsB = plant.chartSecondary;

                    window.myFrenteChart = new Chart(frenteCtx, {
                        type: 'bar',
                        data: {
                            labels: frentesSummary.map(f => f.id),
                            datasets: [
                                {
                                    label: 'Turno A',
                                    data: frentesSummary.map(f => f.totalA),
                                    backgroundColor: colorsA
                                },
                                {
                                    label: 'Turno B',
                                    data: frentesSummary.map(f => f.totalB),
                                    backgroundColor: colorsB
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                }

                if (rendimentoChartRef.current) {
                    const rCtx = rendimentoChartRef.current.getContext('2d');
                    if (window.myRendimentoChart) window.myRendimentoChart.destroy();
                    window.myRendimentoChart = new Chart(rCtx, {
                        type: 'bar',
                        data: {
                            labels: rendimentoSeries.labels,
                            datasets: [
                                {
                                    label: 'Horas Trabalhadas (Total A+B)',
                                    data: rendimentoSeries.hours,
                                    backgroundColor: plant.chartPrimary,
                                    yAxisID: 'y'
                                },
                                {
                                    label: 'Velocidade / Rendimento',
                                    data: rendimentoSeries.yields,
                                    backgroundColor: '#0EA5E9',
                                    yAxisID: 'y1'
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    position: 'left',
                                    title: { display: true, text: 'Horas' }
                                },
                                y1: {
                                    beginAtZero: true,
                                    position: 'right',
                                    grid: { drawOnChartArea: false },
                                    title: { display: true, text: 'Velocidade / Rendimento' }
                                }
                            }
                        }
                    });
                }

                if (acumuladoChartRef.current) {
                    const aCtx = acumuladoChartRef.current.getContext('2d');
                    if (window.myAcumuladoChart) window.myAcumuladoChart.destroy();

                    const colorsAcumA = plant.chartPrimary;
                    const colorsAcumB = plant.chartSecondary;

                    window.myAcumuladoChart = new Chart(aCtx, {
                        type: 'bar',
                        data: {
                            labels: acumuladoSummary.map(f => f.id),
                            datasets: [
                                {
                                    label: 'Horas A (acumulado)',
                                    data: acumuladoSummary.map(f => f.totalA),
                                    backgroundColor: colorsAcumA
                                },
                                {
                                    label: 'Horas B (acumulado)',
                                    data: acumuladoSummary.map(f => f.totalB),
                                    backgroundColor: colorsAcumB
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                }

                if (!window.myFrenteGroupCharts) {
                    window.myFrenteGroupCharts = {};
                }
                Object.values(window.myFrenteGroupCharts).forEach(ch => ch.destroy());
                window.myFrenteGroupCharts = {};

                frenteGroups.forEach(fg => {
                    const canvas = document.getElementById(`frente-group-chart-${fg.id}`);
                    if (!canvas) return;
                    const fgCtx = canvas.getContext('2d');
                    window.myFrenteGroupCharts[fg.id] = new Chart(fgCtx, {
                        type: 'bar',
                        data: {
                            labels: fg.labels,
                            datasets: [
                                {
                                    label: 'Turno A',
                                    data: fg.horasA,
                                    backgroundColor: plant.chartPrimary
                                },
                                {
                                    label: 'Turno B',
                                    data: fg.horasB,
                                    backgroundColor: plant.chartSecondary
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                });

                return () => {
                    if (window.myBarChart) window.myBarChart.destroy();
                    if (window.myPieChart) window.myPieChart.destroy();
                    if (window.myFrenteChart) window.myFrenteChart.destroy();
                    if (window.myRendimentoChart) window.myRendimentoChart.destroy();
                    if (window.myAcumuladoChart) window.myAcumuladoChart.destroy();
                    if (window.myFrenteGroupCharts) {
                        Object.values(window.myFrenteGroupCharts).forEach(ch => ch.destroy());
                        window.myFrenteGroupCharts = {};
                    }
                };
            }, [data, frentesSummary, rendimentoSeries, acumuladoSummary, frenteGroups, totalMachines, totalIssues, showComparison]);

            const handleTransferEquipment = (groupId, equipmentId) => {
                 setTransferData({ groupId, equipmentId });
                 setTransferModalOpen(true);
            };

            const confirmTransfer = (targetFrenteId) => {
                 if (!transferData || !targetFrenteId) return;

                 onTransferEquipment(transferData.groupId, transferData.equipmentId, targetFrenteId);
                 setTransferModalOpen(false);
                 setTransferData(null);
            };

            return (
                <div className="space-y-6">
                    <TransferModal 
                        isOpen={transferModalOpen}
                        onClose={() => setTransferModalOpen(false)}
                        onTransfer={confirmTransfer}
                        allFrentes={Object.keys(allData)}
                        currentFrenteId={data.id}
                    />
                    <div className="flex items-center justify-between">
                        <h2 className="text-lg font-bold text-gray-700">Dashboard Frente {data.id}</h2>
                        <button
                            onClick={() => setShowComparison(prev => !prev)}
                            className={`text-xs px-3 py-1 rounded border ${showComparison ? `${plant.solidBgClass} text-white ${plant.borderClass}` : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-100'}`}
                        >
                            {showComparison ? 'Ver apenas frente selecionada' : 'Comparar frentes'}
                        </button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className={`bg-white p-4 rounded shadow border-l-4 ${plant.borderClass}`}>
                            <div className="text-gray-500 text-sm font-bold">TOTAL HORAS (GERAL)</div>
                            <div className="text-3xl font-bold text-gray-800">{(totalHoursA + totalHoursB).toFixed(1)}h</div>
                        </div>
                        <div className="bg-white p-4 rounded shadow border-l-4" style={{ borderColor: plant.chartPrimary }}>
                            <div className="text-gray-500 text-sm font-bold">TOTAL TURNO A</div>
                            <div className="text-3xl font-bold text-gray-800">{totalHoursA.toFixed(1)}h</div>
                        </div>
                        <div className="bg-white p-4 rounded shadow border-l-4" style={{ borderColor: plant.chartSecondary }}>
                            <div className="text-gray-500 text-sm font-bold">TOTAL TURNO B</div>
                            <div className="text-3xl font-bold text-gray-800">{totalHoursB.toFixed(1)}h</div>
                        </div>
                        <div className="bg-white p-4 rounded shadow border-l-4 border-red-500">
                            <div className="text-gray-500 text-sm font-bold">EQUIP. C/ PROBLEMA</div>
                            <div className="text-3xl font-bold text-red-600">{totalIssues} / {totalMachines}</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-4 rounded shadow">
                            <h3 className="font-bold text-gray-700 mb-4">Horas por Grupo de Equipamento</h3>
                            <canvas ref={chartRef}></canvas>
                        </div>
                        <div className="bg-white p-4 rounded shadow">
                            <h3 className="font-bold text-gray-700 mb-4">Status da Frota</h3>
                            <div className="h-64 flex justify-center">
                                <canvas ref={pieRef}></canvas>
                            </div>
                        </div>
                    </div>

                    {showComparison && (
                        <div className="bg-white p-4 rounded shadow">
                            <h3 className="font-bold text-gray-700 mb-4">Resumo por Frente (dia selecionado)</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                {frentesSummary.map(f => (
                                    <div
                                        key={f.id}
                                        className={`border rounded shadow-sm p-3 ${data.id === f.id ? 'border-orange-500 bg-orange-50' : ''}`}
                                    >
                                        <div className="flex items-center justify-between mb-1">
                                            <div className="text-sm font-bold text-gray-700">Frente {f.id}</div>
                                            <div className="text-[10px] px-2 py-0.5 rounded-full bg-gray-100 text-gray-600">
                                                {f.totalMachines} equip.
                                            </div>
                                        </div>
                                        <div className="text-xs text-gray-500 mb-1">Horas trabalhadas (dia)</div>
                                        <div className="flex justify-between text-xs">
                                            <span>A: {f.totalA.toFixed(1).replace('.', ',')}h</span>
                                            <span>B: {f.totalB.toFixed(1).replace('.', ',')}h</span>
                                        </div>
                                        <div className="text-sm font-bold mt-1">
                                            Total: {(f.totalA + f.totalB).toFixed(1).replace('.', ',')}h
                                        </div>
                                        <div className="mt-2 text-xs space-y-1">
                                            <div className="flex justify-between">
                                                <span>Operacionais:</span>
                                                <span className="font-semibold text-green-600">
                                                    {f.operational} ({(f.availability * 100).toFixed(0)}%)
                                                </span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span>Com problema:</span>
                                                <span className="font-semibold text-red-600">

            const [selectedIds, setSelectedIds] = useState(new Set());
            const [connectionStatus, setConnectionStatus] = useState('idle');
            const [users, setUsers] = useState([]);
            const [loadingUsers, setLoadingUsers] = useState(false);
            const [usersError, setUsersError] = useState(null);

            // Chart Refs
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // Chart Effect
            useEffect(() => {
                if (activeView === 'dashboard' && chartRef.current && history.length > 0) {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    const ctx = chartRef.current.getContext('2d');
                    
                    // Aggregate data: Last 7 days
                    const days = 7;
                    const labels = [];
                    const dataPoints = [];
                    const now = new Date();
                    
                    for (let i = days - 1; i >= 0; i--) {
                        const d = new Date();
                        d.setDate(now.getDate() - i);
                        const day = String(d.getDate()).padStart(2, '0');
                        const month = String(d.getMonth() + 1).padStart(2, '0');
                        const year = d.getFullYear();
                        const dateStr = `${day}/${month}/${year}`;
                        
                        labels.push(`${day}/${month}`);
                        
                        // Sum hours for this date
                        const reports = history.filter(h => h.date === dateStr);
                        const totalHours = reports.reduce((acc, r) => {
                            const report = r.report_data || {};
                            const dailyTotal = (report.frotas || []).reduce((fAcc, f) => {
                                 return fAcc + (parseFloat(f.workedHoursA) || 0) + (parseFloat(f.workedHoursB) || 0);
                            }, 0);
                            return acc + dailyTotal;
                        }, 0);
                        dataPoints.push(totalHours);
                    }

                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Horas Trabalhadas',
                                data: dataPoints,
                                backgroundColor: 'rgba(249, 115, 22, 0.8)',
                                borderRadius: 6,
                                borderSkipped: false,

                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: '#1f2937',
                                    padding: 12,
                                    cornerRadius: 8,
                                    callbacks: {
                                        label: (ctx) => `${ctx.raw.toFixed(1)} horas`
                                    }
                                }
                            },
                            scales: {
                                y: { 
                                    beginAtZero: true,
                                    grid: { borderDash: [2, 4], color: '#f3f4f6' },
                                    ticks: { font: { size: 11 } }
                                },
                                x: {
                                    grid: { display: false },
                                    ticks: { font: { size: 11 } }
                                }
                            }
                        }
                    });
                }
                
                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [activeView, history]);

            // Derived Stats
            const stats = useMemo(() => {
                if (!history.length) return { total: 0, thisMonth: 0, activeFrentes: 0, lastUpdate: '-' };
                
                const now = new Date();
                const thisMonth = history.filter(r => {
                    const d = new Date(r.date.split('/').reverse().join('-'));
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                }).length;

                const uniqueFrentes = new Set(history.map(r => r.frente_id)).size;
                const lastUpdate = history[0]?.date || '-';

                return {
                    total: history.length,
                    thisMonth,
                    activeFrentes: uniqueFrentes,
                    lastUpdate
                };
            }, [history]);

            useEffect(() => {
                fetchHistory();
                setSelectedIds(new Set());
            }, [selectedPlant]);

            useEffect(() => {
                if (activeView === 'database') checkConnection();
                if (activeView === 'users') fetchUsers();

            const fetchUsers = async () => {
                setLoadingUsers(true);
                setUsersError(null);
                
                // Tenta buscar da tabela 'profiles'
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error("Erro ao buscar usuários:", error);
                    setUsersError(error);
                    setUsers([]);
                } else {
                    setUsers(data || []);
                }
                setLoadingUsers(false);
            };

            const getTableName = (plantId) => {
                if (plantId === 'cambui') return 'daily_reports_cambui';
                if (plantId === 'panorama') return 'daily_reports_panorama';
                if (plantId === 'vale-verdao') return 'daily_reports_vale_verdao';
                if (plantId === 'floresta') return 'daily_reports_floresta';
                return 'daily_reports';
            };

            const fetchHistory = async () => {
                setLoading(true);
                const tableName = getTableName(selectedPlant);
                
                const { data, error } = await supabaseClient
                    .from(tableName)
                    .select('*')
                    .order('date', { ascending: false })
                    .limit(500);
                
                if (error) {
                    console.error("Admin Fetch Error:", error);
                } else {
                    setHistory(data || []);
                }
                setLoading(false);
            };

            const checkConnection = async () => {
                setConnectionStatus('checking');
                const tableName = getTableName(selectedPlant);
                const { count, error } = await supabaseClient
                    .from(tableName)
                    .select('*', { count: 'exact', head: true });
                
                if (error) {
                    setConnectionStatus('error');
                } else {
                    setConnectionStatus('success');
                }
            };

            const handleDelete = async (record) => {
                if (!confirm(`ATENÇÃO: Esta ação é irreversível.\n\nDeseja excluir permanentemente o registro de ${record.date} da frente ${record.frente_id}?`)) return;
                
                const tableName = getTableName(selectedPlant);
                let query = supabaseClient.from(tableName).delete();
                
                if (record.id) {
                    query = query.eq('id', record.id);
                } else {
                    query = query.eq('date', record.date).eq('frente_id', record.frente_id);
                }

                const { error } = await query;
                
                if (error) {
                    alert("Erro ao excluir: " + error.message);
                } else {
                    setHistory(prev => prev.filter(h => h.id !== record.id));
                    setSelectedIds(prev => {
                        const newSet = new Set(prev);
                        newSet.delete(record.id);
                        return newSet;
                    });
                }
            };

            const handleBulkDelete = async () => {
                if (!selectedIds.size) return;
                if (!confirm(`ATENÇÃO: Você vai excluir ${selectedIds.size} registros permanentemente. Continuar?`)) return;

                setLoading(true);
                const tableName = getTableName(selectedPlant);
                const idsToDelete = Array.from(selectedIds);

                const { error } = await supabaseClient
                    .from(tableName)
                    .delete()
                    .in('id', idsToDelete);

                if (error) {
                    alert('Erro ao excluir em massa: ' + error.message);
                } else {
                    setHistory(prev => prev.filter(h => !selectedIds.has(h.id)));
                    setSelectedIds(new Set());
                }
                setLoading(false);
            };

            const handleEdit = (record) => {
                if (confirm(`Deseja carregar os dados de ${record.date} da frente ${record.frente_id} para edição?`)) {
                    onLoadEntry(selectedPlant, record.date, record.frente_id);
                    onClose();
                }
            };

            const handleExportCSV = () => {
                const headers = ['ID', 'Data', 'Frente', 'Turno A (h)', 'Turno B (h)', 'Criado em'];
                const rows = filteredHistory.map(r => {
                    const report = r.report_data || {};
                    const totalA = (report.frotas || []).reduce((acc, f) => acc + (parseFloat(f.workedHoursA) || 0), 0);
                    const totalB = (report.frotas || []).reduce((acc, f) => acc + (parseFloat(f.workedHoursB) || 0), 0);
                    return [r.id, r.date, r.frente_id, totalA.toFixed(2), totalB.toFixed(2), r.created_at];
                });
                
                const csvContent = "data:text/csv;charset=utf-8," 
                    + headers.join(",") + "\n" 
                    + rows.map(e => e.join(",")).join("\n");
                    
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `relatorio_${selectedPlant}_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const filteredHistory = useMemo(() => {
                return history.filter(r => {
                    const matchSearch = r.frente_id.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                      r.date.includes(searchTerm);
                    
                    if (!matchSearch) return false;

                    if (dateRange.start) {
                        const [d, m, y] = r.date.split('/');
                        const rDate = new Date(`${y}-${m}-${d}`);
                        const startDate = new Date(dateRange.start);
                        if (rDate < startDate) return false;
                    }
                    
                    if (dateRange.end) {
                        const [d, m, y] = r.date.split('/');
                        const rDate = new Date(`${y}-${m}-${d}`);
                        const endDate = new Date(dateRange.end);
                        if (rDate > endDate) return false;
                    }

                    return true;
                });
            }, [history, searchTerm, dateRange]);

            const toggleSelectAll = () => {
                if (selectedIds.size === filteredHistory.length) {
                    setSelectedIds(new Set());
                } else {
                    setSelectedIds(new Set(filteredHistory.map(r => r.id)));
                }
            };

            const toggleSelect = (id) => {
                setSelectedIds(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(id)) newSet.delete(id);
                    else newSet.add(id);
                    return newSet;

                            <NavItem id="users" icon={({size}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>} label="Usuários" />
                        </div>

                                <span>Sair do Admin</span>
                            </button>

                                {activeView === 'reports' && 'Gerenciamento de Relatórios'}

                                                    <Icons.FileSpreadsheet size={24} />
                                                </div>
                                                <span className="text-xs font-bold text-gray-400 bg-gray-50 px-2 py-1 rounded">TOTAL</span>
                                            </div>
                                            <div className="text-3xl font-bold text-gray-800">{stats.total}</div>
                                            <div className="text-sm text-gray-500 mt-1">Relatórios emitidos</div>
                                        </div>

                                                <div className="p-3 bg-green-50 text-green-600 rounded-lg">
                                                    <Icons.LayoutDashboard size={24} />
                                                </div>

                                            </div>
                                            <div className="text-3xl font-bold text-gray-800">{stats.thisMonth}</div>
                                            <div className="text-sm text-gray-500 mt-1">Novos relatórios</div>
                                        </div>

                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">

                                                </div>
                                                <span className="text-xs font-bold text-gray-400 bg-gray-50 px-2 py-1 rounded">ATIVIDADE</span>
                                            </div>
                                            <div className="text-3xl font-bold text-gray-800">{stats.activeFrentes}</div>
                                            <div className="text-sm text-gray-500 mt-1">Frentes ativas</div>
                                        </div>

create table if not exists public.profiles (
  id uuid references auth.users on delete cascade not null primary key,
  email text,
  first_name text,
  last_name text,
  plant_id text,
  created_at timestamp with time zone default timezone('utc'::text, now()) not null
);

-- 2. Habilita segurança (RLS)
alter table public.profiles enable row level security;
create policy "Public profiles are viewable by everyone." on profiles for select using (true);
create policy "Users can insert own profile." on profiles for insert with check (auth.uid() = id);
create policy "Users can update own profile." on profiles for update using (auth.uid() = id);

-- 3. Cria função para sincronizar novos usuários
create or replace function public.handle_new_user() 
returns trigger as $$
begin
  insert into public.profiles (id, email, first_name, last_name, plant_id)
  values (new.id, new.email, new.raw_user_meta_data->>'first_name', new.raw_user_meta_data->>'last_name', new.raw_user_meta_data->>'plant_id');
  return new;
end;
$$ language plpgsql security definer;

-- 4. Cria trigger para novos cadastros
drop trigger if exists on_auth_user_created on auth.users;
create trigger on_auth_user_created
  after insert on auth.users
  for each row execute procedure public.handle_new_user();

-- 5. Sincroniza usuários já existentes (Executar apenas uma vez)
insert into public.profiles (id, email, first_name, last_name, plant_id)
select id, email, raw_user_meta_data->>'first_name', raw_user_meta_data->>'last_name', raw_user_meta_data->>'plant_id'
from auth.users
on conflict (id) do nothing;`}

                                    }
                                } else {
                                    setNested(newItem, pathParts, value);
                                }
                            }

                            // AUTO-FILL: Shift A Final <-> Shift B Initial (Intra-day Bidirectional)
                            if (field === 'shiftA.final' && value !== null) {
                                newItem.shiftB = { ...newItem.shiftB, initial: value };
                                // Re-calc Shift B worked
                                const bInit = value;
                                const bFin = newItem.shiftB.final;
                                if (bInit !== null && bFin !== null) {
                                    newItem.shiftB.worked = bFin - bInit;
                                }
                            }
                            if (field === 'shiftB.initial' && value !== null) {
                                newItem.shiftA = { ...newItem.shiftA, final: value };
                                // Re-calc Shift A worked
                                const aInit = newItem.shiftA.initial;
                                const aFin = value;
                                if (aInit !== null && aFin !== null) {
                                    newItem.shiftA.worked = aFin - aInit;
                                }
                            }

                            newItem.totalAB = (newItem.shiftA.worked || 0) + (newItem.shiftB.worked || 0);
                            return newItem;
                        });
                        return { ...group, items: newItems };
                    });
                    
                    const newCurrentDayData = { ...currentReport, groups: recalculateSpeed(newGroups) };
                    let newFrenteData = { ...currentFrente, [selectedDate]: newCurrentDayData };

                    // 2. AUTO-FILL: Shift B Final -> Next Day Shift A Initial (Inter-day Forward)
                    if (field === 'shiftB.final' && value !== null) {
                        const nextDate = getNextDate(selectedDate);

                        if (currentFrente[nextDate]) {
                             const nextDayReport = currentFrente[nextDate];
                             const nextGroups = nextDayReport.groups.map(group => {
                                 if (group.id !== groupId) return group;

                                 const newItems = group.items.map(item => {
                                     if (item.id !== equipmentId) return item;
                                     
                                     // Update Shift A Initial
                                     const newItem = { 
                                         ...item,
                                         shiftA: { ...item.shiftA, initial: value }
                                     };
                                     
                                     // Re-calc Shift A worked
                                     const init = value;
                                     const fin = newItem.shiftA.final;
                                     if (init !== null && fin !== null) {
                                         newItem.shiftA.worked = fin - init;
                                     } else {
                                         newItem.shiftA.worked = 0;
                                     }
                                     
                                     newItem.totalAB = (newItem.shiftA.worked || 0) + (newItem.shiftB.worked || 0);
                                     return newItem;
                                 });
                                 return { ...group, items: newItems };
                             });
                             
                             newFrenteData[nextDate] = { ...nextDayReport, groups: recalculateSpeed(nextGroups) };
                        }
                    }

                    // 3. AUTO-FILL: Shift A Initial -> Prev Day Shift B Final (Inter-day Backward)
                    if (field === 'shiftA.initial' && value !== null) {
                        const prevDate = getPrevDate(selectedDate);

                        if (currentFrente[prevDate]) {
                             const prevDayReport = currentFrente[prevDate];
                             const prevGroups = prevDayReport.groups.map(group => {
                                 if (group.id !== groupId) return group;

                                 const newItems = group.items.map(item => {
                                     if (item.id !== equipmentId) return item;
                                     
                                     // Update Shift B Final
                                     const newItem = { 
                                         ...item,
                                         shiftB: { ...item.shiftB, final: value }
                                     };
                                     
                                     // Re-calc Shift B worked
                                     const init = newItem.shiftB.initial;
                                     const fin = value;
                                     if (init !== null && fin !== null) {
                                         newItem.shiftB.worked = fin - init;
                                     } else {
                                         newItem.shiftB.worked = 0;
                                     }
                                     
                                     newItem.totalAB = (newItem.shiftA.worked || 0) + (newItem.shiftB.worked || 0);
                                     return newItem;
                                 });
                                 return { ...group, items: newItems };
                             });
                             
                             newFrenteData[prevDate] = { ...prevDayReport, groups: recalculateSpeed(prevGroups) };
                        }
                    }
                    
                    return {
                        ...prev,
                        [activeFrenteId]: newFrenteData
                    };
                });
            };

            const updateGroup = (groupId, field, value) => {
                setAllData(prev => {
                    const currentFrente = prev[activeFrenteId] || {};
                    const currentReport = currentFrente[selectedDate];
                    if (!currentReport) return prev;

                    const newGroups = currentReport.groups.map(group => {
                        if (group.id !== groupId) return group;
                        return { ...group, [field]: value };

                    return {
                        ...prev,
                        [activeFrenteId]: {
                            ...currentFrente,
                            [selectedDate]: { ...currentReport, groups: recalculateSpeed(newGroups) }

                    };

            const addEquipment = (groupId) => {

                    const currentReport = currentFrente[selectedDate];
                    if (!currentReport) return prev;

                    const newGroups = currentReport.groups.map(group => {
                        if (group.id !== groupId) return group;
                        
                        const newId = Date.now().toString();
                        const newItem = { 
                            id: newId, 
                            frota: 'NOVA', 
                            shiftA: { initial: null, final: null, worked: 0 }, 
                            shiftB: { initial: null, final: null, worked: 0 }, 
                            totalAB: 0, 
                            status: 'ok', 
                            obs: '' 
                        };
                        
                        return { ...group, items: [...group.items, newItem] };
                    });

                    return {
                        ...prev,
                        [activeFrenteId]: {
                            ...currentFrente,
                            [selectedDate]: { ...currentReport, groups: recalculateSpeed(newGroups) }

                    };

            const deleteEquipment = (groupId, equipmentId) => {
                 if(!confirm("Tem certeza que deseja remover esta frota?")) return;
                 setAllData(prev => {

                    const currentReport = currentFrente[selectedDate];
                    if (!currentReport) return prev;

                    const newGroups = currentReport.groups.map(group => {
                        if (group.id !== groupId) return group;
                        return { ...group, items: group.items.filter(i => i.id !== equipmentId) };
                    });

                    return {
                        ...prev,
                        [activeFrenteId]: {
                            ...currentFrente,
                            [selectedDate]: { ...currentReport, groups: recalculateSpeed(newGroups) }
                        }
                    };
                 });
            };

            const handleTransferEquipment = (groupId, equipmentId) => {
                 setTransferData({ groupId, equipmentId });

            };

            const confirmTransfer = (targetFrenteId) => {
                 if (!transferData || !targetFrenteId) return;
                 
                 const { groupId, equipmentId } = transferData;
                 const sourceFrenteId = activeFrenteId;
                 
                 setAllData(prev => {
                    const sourceReport = prev[sourceFrenteId]?.[selectedDate];
                    const targetReport = prev[targetFrenteId]?.[selectedDate];
                    
                    if (!sourceReport) return prev; // Should not happen

                    // Find item to transfer
                    let itemToTransfer = null;
                    const newSourceGroups = sourceReport.groups.map(group => {
                        if (group.id !== groupId) return group;
                        const item = group.items.find(i => i.id === equipmentId);
                        if (item) itemToTransfer = item;
                        return { ...group, items: group.items.filter(i => i.id !== equipmentId) };
                    });

                    if (!itemToTransfer) return prev;

                    // If target report doesn't exist for this date, create it based on previous day or init
                    let newTargetReport = targetReport;
                    if (!newTargetReport) {
                        // For simplicity, just init empty for now, logic similar to createInitialData could be used if needed
                        // But usually targetFrente should be initialized if it appears in list.
                        // Wait, list comes from Object.keys(allData), so it exists. 
                        // But maybe not for this specific date?
                        // If not exists for date, we should probably initialize it.
                        // Let's assume user ensures target front has data for today or handle basic init.
                         // Actually, if it doesn't exist for date, we can't easily add to a group.
                         // Let's fallback to creating it if missing.
                         newTargetReport = createInitialData(targetFrenteId, selectedDate, plantId);
                    }

                    const newTargetGroups = newTargetReport.groups.map(group => {
                        // Try to match group ID. If not found, maybe fallback to first group or a default 'others'?
                        // Most templates have same IDs (colhedoras, transbordo).
                        if (group.id === groupId) {
                             return { ...group, items: [...group.items, itemToTransfer] };
                        }
                        return group;
                    });
                    
                    // If group ID didn't match (e.g. transferring from plantadora to distribuidora front which has different groups),
                    // we might need to ask user for target group. For now, try to find a best match or just add to first group.
                    const groupExists = newTargetGroups.some(g => g.id === groupId);
                    if (!groupExists) {
                        // Fallback: Add to the first group that accepts equipments
                        if (newTargetGroups.length > 0) {
                            newTargetGroups[0].items.push(itemToTransfer);
                        }
                    }

                    return {
                        ...prev,
                        [sourceFrenteId]: {
                            ...prev[sourceFrenteId],
                            [selectedDate]: { ...sourceReport, groups: recalculateSpeed(newSourceGroups) }
                        },
                        [targetFrenteId]: {
                            ...prev[targetFrenteId],
                            [selectedDate]: { ...newTargetReport, groups: recalculateSpeed(newTargetGroups) }
                        }
                    };
                 });

                 setTransferModalOpen(false);
                 setTransferData(null);
                 setNotification({ message: `Equipamento transferido para ${targetFrenteId}!`, type: 'success' });

                        return newData;

                            onClose={() => setNotification(null)} 
                        />
                    )}
                    <TransferModal 
                        isOpen={transferModalOpen}
                        onClose={() => setTransferModalOpen(false)}
                        onTransfer={confirmTransfer}
                        allFrentes={Object.keys(allData)}

                    />
                    {showNewFrenteModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">

                                    <input 
                                        type="text" 
                                        value={newFrenteName}

                                        className="w-full border border-gray-300 p-2 rounded uppercase focus:outline-none focus:border-blue-500 text-black"
                                        placeholder="EX: F4003"
                                        autoFocus
                                    />
                                </div>

                                <div className="mb-6">
                                    <label className="block text-sm font-bold mb-2 text-gray-700">Tipo de Frente</label>
                                    <div className="flex space-x-4">

                                            <input

                                            <span className="text-gray-800">Plantadora</span>
                                        </label>

                                            </div>
                                            
                                            <div className={`${plant.solidBgClass} text-center font-bold text-xl border-x border-b border-black py-1 text-white mt-1 shadow-md`}>
                                                Horimetro das Colhedoras e Tratores
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 gap-4">
                                            {currentData.groups.map(group => (
                                                <EquipmentGroupTable 
                                                    key={group.id} 
                                                    group={group} 
                                                    plant={plant}
                                                    onUpdateEquipment={updateEquipment}
                                                    onUpdateGroup={updateGroup}
                                                    onAddEquipment={addEquipment}
                                                    onDeleteEquipment={deleteEquipment}
                                                    onTransferEquipment={handleTransferEquipment}
                                                    onSqlError={() => setShowSql(true)}
                                                />
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="text-center py-20">
                                        <div className="text-gray-400 text-xl mb-4">Nenhuma frente selecionada ou cadastrada para esta unidade.</div>
                                        <button 
                                            onClick={addNewFrente}
                                            className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded shadow-lg"
                                        >
                                            <Icons.Plus size={20} className="inline mr-2" />
                                            Criar Nova Frente
                                        </button>
                                    </div>
                                )}
                            </div>
                        ) : (
                            currentData ? (
                                <Dashboard data={currentData} allData={allData} selectedDate={selectedDate} plant={plant} />
                            ) : (
                                <div className="text-center py-20 text-gray-400">Nenhum dado para exibir no Dashboard.</div>
                            )
                        )}
                        
                        <div className="mt-8 text-gray-500 text-xs text-center pb-8">
                            <p>Sistema Avançado de Gestão de Horimetro - {plant.name} v2.1</p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
