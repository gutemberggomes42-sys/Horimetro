             return base;
        };

        const createReportFromDb = async (frenteId, dateStr, plantId) => {
             let frentesTable = 'frentes_cambui';
             let tableName = 'equipments_cambui';
             
             if (plantId === 'panorama') {
                 frentesTable = 'frentes_panorama';
                 tableName = 'equipments_panorama';
             } else if (plantId === 'vale-verdao') {
                 frentesTable = 'frentes_vale_verdao';
                 tableName = 'equipments_vale_verdao';
             } else if (plantId === 'floresta') {
                 frentesTable = 'frentes_floresta';
                 tableName = 'equipments_floresta';
             }

             // Fetch Frente Type to ensure correct template
             let frenteType = 'plantadora'; 
             const { data: frenteData } = await supabaseClient
                 .from(frentesTable)
                 .select('type')
                 .eq('name', frenteId)
                 .single();
             
             if (frenteData && frenteData.type) {
                 frenteType = frenteData.type;
             }

             const baseData = createInitialData(frenteId, dateStr, plantId, frenteType);

             // Fetch equipments filtered by frente
             const { data, error } = await supabaseClient
                .from(tableName)
                .select('*')
                .eq('frente', frenteId) // Filter by Frente
                .order('group_name', { ascending: true })
                .order('frota', { ascending: true });

             if (error) {
                 console.error("Error creating report from DB:", error);
                 if (error.code === '42703') {
                     alert("ATENÇÃO: A coluna 'frente' não existe no banco de dados. Os equipamentos padrão serão carregados. Por favor, vá em Admin > Instruções SQL e execute a atualização.");
                 }
                 return baseData;
             }

             if (!data || data.length === 0) {
                 return baseData;
             }

             const groupsMap = {};
             data.forEach(item => {
                 const gName = item.group_name;
                 if (!groupsMap[gName]) {
                     groupsMap[gName] = {
                         id: gName.toLowerCase().replace(/[^a-z0-9]/g, '-'),
                         name: gName,
                         items: []
                     };
                 }
                 groupsMap[gName].items.push({
                     id: item.id ? item.id.toString() : Math.random().toString(36).substr(2, 9),
                     frota: item.frota,
                     shiftA: { initial: null, final: null, worked: 0, maintenance: 0 },
                     shiftB: { initial: null, final: null, worked: 0, maintenance: 0 },
                     totalAB: 0,
                     status: 'ok',
                     obs: ''
                 });
             });

             const newGroups = Object.values(groupsMap).map(g => {
                 const baseGroup = baseData.groups.find(bg => bg.name.toLowerCase() === g.name.toLowerCase());
                 return {
                     ...g,
                     yield: baseGroup ? baseGroup.yield : 0,
                     yieldLabel: baseGroup ? baseGroup.yieldLabel : 'Produção'
                 };
             }).sort((a, b) => {
                 // Priority based on User Rules (Labels)
                 const getPriority = (label) => {
                     if (!label) return 99;
                     const l = label.toLowerCase();
                     if (l.includes('rendimento plantio turno "a"')) return 1;
                     if (l.includes('rendimento plantio turno "b"')) return 2;
                     if (l.includes('velocidade trabalhada')) return 3;
                     return 99;
                 };
                 
                 const pA = getPriority(a.yieldLabel);
                 const pB = getPriority(b.yieldLabel);
                 
                 if (pA !== pB) return pA - pB;
                 
                 // Secondary Sort: Predefined Group Names
                 const sortOrder = [
                     'Colhedoras', 
                     'Trator Sulcador', 
                     'Trator Distribuidor', 
                     'Trator Cobridor',
                     'Trator Transbordo', 
                     'Trator Plantadora', 
                     'Caminhão'
                 ];
                 
                 const indexA = sortOrder.indexOf(a.name);
                 const indexB = sortOrder.indexOf(b.name);
                 
                 if (indexA !== -1 && indexB !== -1) return indexA - indexB;
                 if (indexA !== -1) return -1;
                 if (indexB !== -1) return 1;
                 
                 return a.name.localeCompare(b.name);
             });

             return {
                 ...baseData,
                 groups: newGroups
             };
        };

                            </table>
                        </div>
                        {!isAppMode && group.yield !== undefined && (
                            <div className="w-32 bg-green-600 border-l border-black flex flex-col items-center justify-center text-center p-2 relative">
                                <div className="text-white text-xs font-bold mb-2">{group.yieldLabel || 'Rendimento'}</div>
                                <input 
                                    type="number" 
                                    step="0.01"
                                    value={group.yield}
                                    onChange={(e) => onUpdateGroup(group.id, 'yield', parseFloat(e.target.value) || 0)}
                                    className="text-4xl font-bold text-black bg-white/30 w-full text-center focus:outline-none focus:bg-white rounded"
                                />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const Dashboard = ({ data, allData, selectedDate, plant }) => {
            const chartRef = useRef(null);
            const pieRef = useRef(null);
            const frenteChartRef = useRef(null);
            const rendimentoChartRef = useRef(null);
            const acumuladoChartRef = useRef(null);
            const [rangeDays, setRangeDays] = useState(7);
            const [showComparison, setShowComparison] = useState(false);
            const [transferModalOpen, setTransferModalOpen] = useState(false);
            const [transferData, setTransferData] = useState(null);
            const [activeTab, setActiveTab] = useState('launches'); // 'launches' | 'equipments' // { groupId, equipmentId }

            const copyWhatsAppReport = () => {
                const report = allData[data.id]?.[selectedDate];
                if (!report) {
                    alert("Sem dados para gerar relatório.");
                    return;
                }

                let text = `*Usina ${plant.name}*\n`;
                text += `*Frente ${data.id}*\n`;

                report.groups.forEach(group => {
                    if (!group.items || group.items.length === 0) return;
                    
                    text += `*${group.name}*\n`;
                    
                    group.items.forEach(item => {
                        const statusIcon = item.status === 'ok' ? '✅' : '❌';
                        if (item.status === 'ok') {
                            text += `${statusIcon}${item.frota}\n`;
                        } else {
                            const obs = item.obs ? item.obs : 'motivo de parada';
                            text += `${statusIcon}${item.frota}->${obs}\n`;
                        }
                    });
                    text += '\n';
                });

                navigator.clipboard.writeText(text).then(() => {
                    alert("Relatório copiado para a área de transferência!");
                }).catch(err => {
                    console.error('Erro ao copiar:', err);
                    alert("Erro ao copiar. Verifique as permissões do navegador.");
                });
            };

            const generateWordReport = () => {
                let html = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                    <head>
                        <meta charset='utf-8'>
                        <title>Relatório de Status</title>
                        <style>
                            body { font-family: 'Calibri', 'Arial', sans-serif; font-size: 11pt; }
                            h1 { color: #2E7D32; font-size: 18pt; margin-bottom: 10px; }
                            h2 { color: #1565C0; font-size: 14pt; margin-top: 20px; margin-bottom: 5px; }
                            h3 { color: #424242; font-size: 12pt; margin-top: 15px; margin-bottom: 5px; font-weight: bold; text-decoration: underline; }
                            table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
                            th, td { border: 1px solid #ddd; padding: 4px; text-align: center; font-size: 10pt; }
                            th { background-color: #f2f2f2; font-weight: bold; }
                            .ok { color: green; font-weight: bold; }
                            .issue { color: red; font-weight: bold; }
                            .obs { font-style: italic; font-size: 9pt; }
                            .plant-header { border-bottom: 2px solid #2E7D32; padding-bottom: 10px; margin-bottom: 20px; }
                            .date-info { color: #666; margin-bottom: 20px; }
                        </style>
                    </head>
                    <body>
                        <div class="plant-header">
                            <h1>*${plant.name}*</h1>
                            <div class="date-info">Data: ${selectedDate.split('-').reverse().join('/')}</div>
                        </div>
                `;

                const frentesIds = Object.keys(allData).sort();
                let hasData = false;

                frentesIds.forEach(frenteId => {
                    const report = allData[frenteId]?.[selectedDate];
                    // Skip if no report or empty report (check if groups exist)
                    if (!report || !report.groups || report.groups.length === 0) return;

                    hasData = true;
                    // Título da Frente
                    html += `<h2>*${frenteId}*</h2>`;

                    report.groups.forEach(group => {
                        // Verifica se o grupo tem itens
                        if (!group.items || group.items.length === 0) return;

                        html += `<h3>*${group.name}*</h3>`;
                        
                        html += `
                            <table>
                                <thead>
                                    <tr>
                                        <th>Frota</th>
                                        <th>H. Trab (A)</th>
                                        <th>H. Manut (A)</th>
                                        <th>H. Trab (B)</th>
                                        <th>H. Manut (B)</th>
                                        <th>Total Trab</th>
                                        <th>Total Manut</th>
                                        <th>Disp. Mec. %</th>
                                        <th>Status</th>
                                        <th>Obs</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;

                        group.items.forEach(item => {
                            const workedA = item.shiftA.worked || 0;
                            const maintA = item.shiftA.maintenance || 0;
                            const workedB = item.shiftB.worked || 0;
                            const maintB = item.shiftB.maintenance || 0;
                            const totalWorked = workedA + workedB;
                            const totalMaint = maintA + maintB;
                            const totalTime = totalWorked + totalMaint;
                            const availability = totalTime > 0 ? (totalWorked / totalTime) * 100 : 0;
                            const statusIcon = item.status === 'ok' ? '✅' : '❌';
                            
                            html += `
                                <tr>
                                    <td>${item.frota}</td>
                                    <td>${workedA.toFixed(1)}</td>
                                    <td>${maintA.toFixed(1)}</td>
                                    <td>${workedB.toFixed(1)}</td>
                                    <td>${maintB.toFixed(1)}</td>
                                    <td>${totalWorked.toFixed(1)}</td>
                                    <td>${totalMaint.toFixed(1)}</td>
                                    <td>${availability.toFixed(1)}%</td>
                                    <td class="${item.status}">${statusIcon}</td>
                                    <td class="obs">${item.obs || ''}</td>
                                </tr>
                            `;
                        });

                        html += `</tbody></table>`;
                    });
                });

                if (!hasData) {
                    html += "<p>Nenhum dado encontrado para a data selecionada.</p>";
                }

                html += "</body></html>";
                
                const blob = new Blob(['\ufeff', html], {
                    type: 'application/msword'
                });
                
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `Relatorio_Status_${plant.name}_${selectedDate}.doc`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const allItems = data.groups.flatMap(g => g.items);
            const totalHoursA = allItems.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
            const totalHoursB = allItems.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
            const totalIssues = allItems.filter(i => i.status === 'issue').length;
            const totalMachines = allItems.length;

            const frentesSummary = useMemo(() => {
                if (!allData) return [];
                return Object.keys(allData).map(frenteId => {
                    const report = allData[frenteId]?.[selectedDate];
                    if (!report) {
                        return {
                            id: frenteId,
                            totalA: 0,
                            totalB: 0,
                            totalMaint: 0,
                            totalIssues: 0,
                            totalMachines: 0,
                            operational: 0,
                            availability: 0,
                            mechanicalAvailability: 0,
                            avgHoursPerMachine: 0,
                            plantioHours: 0,
                            plantioYield: 0,
                            plantioGroupName: ''
                        };
                    }
                    const items = report.groups.flatMap(g => g.items);
                    const totalA = items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
                    const totalB = items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
                    const totalMaintA = items.reduce((acc, item) => acc + (item.shiftA.maintenance || 0), 0);
                    const totalMaintB = items.reduce((acc, item) => acc + (item.shiftB.maintenance || 0), 0);
                    
                    const issues = items.filter(i => i.status === 'issue').length;
                    const machines = items.length;
                    const operational = machines - issues;
                    
                    const totalHours = totalA + totalB;
                    const totalMaint = totalMaintA + totalMaintB;
                    const totalTime = totalHours + totalMaint;
                    
                    // Disponibilidade Física (Baseada em Quantidade de Equipamentos)
                    const availability = machines > 0 ? operational / machines : 0;
                    
                    // Disponibilidade Mecânica (Baseada em Horas Trabalhadas vs Manutenção)
                    // Fórmula: Horas Trabalhadas / (Horas Trabalhadas + Horas Manutenção)
                    const mechanicalAvailability = totalTime > 0 ? totalHours / totalTime : (machines > 0 && totalMaint === 0 ? 1 : 0);
                    
                    const avgHoursPerMachine = machines > 0 ? totalHours / machines : 0;

                    let plantioHours = 0;
                    let plantioYield = 0;
                    let plantioGroupName = '';
                    let targetGroupId = null;

                    if (report.groups.some(g => g.id === 'tortao' || g.id === 'sulcador')) {
                        targetGroupId = 'distribuidor';
                    } else if (report.groups.some(g => g.id === 'plantadora')) {
                        targetGroupId = 'plantadora';
                    }

                    if (targetGroupId) {
                        const g = report.groups.find(gr => gr.id === targetGroupId);
                        if (g) {
                            plantioGroupName = g.name;
                            plantioHours = g.items.reduce((acc, item) => acc + (item.totalAB || 0), 0);
                            plantioYield = typeof g.yield === 'number' ? g.yield : parseFloat(g.yield) || 0;
                        }
                    }

                    return {
                        id: frenteId,
                        totalA,
                        totalB,
                        totalMaint,
                        totalIssues: issues,
                        totalMachines: machines,
                        operational,
                        availability,
                        mechanicalAvailability,
                        avgHoursPerMachine,
                        plantioHours,
                        plantioYield,
                        plantioGroupName
                    };
                });
            }, [allData, selectedDate]);

            const frenteGroups = useMemo(() => {
                if (!allData || !selectedDate) return [];
                return Object.keys(allData).map(frenteId => {
                    const report = allData[frenteId]?.[selectedDate];
                    if (!report) return null;
                    const labels = report.groups.map(g => g.name);
                    const horasA = report.groups.map(g => g.items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0));
                    const horasB = report.groups.map(g => g.items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0));
                    return {
                        id: frenteId,
                        labels,
                        horasA,
                        horasB
                    };
                }).filter(Boolean);
            }, [allData, selectedDate]);

            const rendimentoSeries = useMemo(() => {
                const getGroup = (frenteId, groupId) => {
                    const report = allData?.[frenteId]?.[selectedDate];
                    if (!report) return null;
                    return report.groups.find(g => g.id === groupId) || null;
                };

                const plantadora = getGroup('F4001', 'plantadora');
                const distribuidor = getGroup('F4002', 'distribuidor');

                const calc = (group) => {
                    if (!group) return { hours: 0, yield: 0 };
                    const hours = group.items.reduce((acc, item) => acc + (item.totalAB || 0), 0);
                    const y = typeof group.yield === 'number' ? group.yield : parseFloat(group.yield) || 0;
                    return { hours, yield: y };
                };

                const p = calc(plantadora);
                const d = calc(distribuidor);

                return {
                    labels: ['F4001 Plantadora', 'F4002 Distribuidor'],
                    hours: [p.hours, d.hours],
                    yields: [p.yield, d.yield]
                };
            }, [allData, selectedDate]);

            const acumuladoSummary = useMemo(() => {
                if (!allData || !selectedDate) return [];
                const selected = new Date(selectedDate);
                const min = new Date(selected);
                min.setUTCDate(min.getUTCDate() - (rangeDays - 1));

                return Object.keys(allData).map(frenteId => {
                    const dias = allData[frenteId] || {};
                    let totalA = 0;
                    let totalB = 0;
                    Object.entries(dias).forEach(([dateStr, report]) => {
                        const d = new Date(dateStr);
                        if (d >= min && d <= selected) {
                            const items = report.groups.flatMap(g => g.items);
                            totalA += items.reduce((acc, item) => acc + (item.shiftA.worked || 0), 0);
                            totalB += items.reduce((acc, item) => acc + (item.shiftB.worked || 0), 0);
                        }
                    });
                    return {
                        id: frenteId,
                        totalA,
                        totalB
                    };
                });
            }, [allData, selectedDate, rangeDays]);

            useEffect(() => {
                if (!chartRef.current || !pieRef.current) return;

                const ctx = chartRef.current.getContext('2d');
                if (window.myBarChart) window.myBarChart.destroy();

                window.myBarChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.groups.map(g => g.name),
                        datasets: [
                            {
                                label: 'Turno A',
                                data: data.groups.map(g => g.items.reduce((acc, i) => acc + (i.shiftA.worked || 0), 0)),
                                backgroundColor: plant.chartPrimary
                            },
                            {
                                label: 'Turno B',
                                data: data.groups.map(g => g.items.reduce((acc, i) => acc + (i.shiftB.worked || 0), 0)),
                                backgroundColor: plant.chartSecondary
                            }
                        ]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero: true } } }
                });

                const pieCtx = pieRef.current.getContext('2d');
                if (window.myPieChart) window.myPieChart.destroy();

                window.myPieChart = new Chart(pieCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Operacional', 'Com Problema'],
                        datasets: [{
                            data: [totalMachines - totalIssues, totalIssues],
                            backgroundColor: ['#00A651', '#ED1C24']
                        }]
                    },
                    options: { responsive: true }
                });

                if (frenteChartRef.current) {
                    const frenteCtx = frenteChartRef.current.getContext('2d');
                    if (window.myFrenteChart) window.myFrenteChart.destroy();

                    const colorsA = plant.chartPrimary;
                    const colorsB = plant.chartSecondary;

                    window.myFrenteChart = new Chart(frenteCtx, {
                        type: 'bar',
                        data: {
                            labels: frentesSummary.map(f => f.id),
                            datasets: [
                                {
                                    label: 'Turno A',
                                    data: frentesSummary.map(f => f.totalA),
                                    backgroundColor: colorsA
                                },
                                {
                                    label: 'Turno B',
                                    data: frentesSummary.map(f => f.totalB),
                                    backgroundColor: colorsB
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                }

                if (rendimentoChartRef.current) {
                    const rCtx = rendimentoChartRef.current.getContext('2d');
                    if (window.myRendimentoChart) window.myRendimentoChart.destroy();
                    window.myRendimentoChart = new Chart(rCtx, {
                        type: 'bar',
                        data: {
                            labels: rendimentoSeries.labels,
                            datasets: [
                                {
                                    label: 'Horas Trabalhadas (Total A+B)',
                                    data: rendimentoSeries.hours,
                                    backgroundColor: plant.chartPrimary,
                                    yAxisID: 'y'
                                },
                                {
                                    label: 'Velocidade / Rendimento',
                                    data: rendimentoSeries.yields,
                                    backgroundColor: '#0EA5E9',
                                    yAxisID: 'y1'
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    position: 'left',
                                    title: { display: true, text: 'Horas' }
                                },
                                y1: {
                                    beginAtZero: true,
                                    position: 'right',
                                    grid: { drawOnChartArea: false },
                                    title: { display: true, text: 'Velocidade / Rendimento' }
                                }
                            }
                        }
                    });
                }

                if (acumuladoChartRef.current) {
                    const aCtx = acumuladoChartRef.current.getContext('2d');
                    if (window.myAcumuladoChart) window.myAcumuladoChart.destroy();

                    const colorsAcumA = plant.chartPrimary;
                    const colorsAcumB = plant.chartSecondary;

                    window.myAcumuladoChart = new Chart(aCtx, {
                        type: 'bar',
                        data: {
                            labels: acumuladoSummary.map(f => f.id),
                            datasets: [
                                {
                                    label: 'Horas A (acumulado)',
                                    data: acumuladoSummary.map(f => f.totalA),
                                    backgroundColor: colorsAcumA
                                },
                                {
                                    label: 'Horas B (acumulado)',
                                    data: acumuladoSummary.map(f => f.totalB),
                                    backgroundColor: colorsAcumB
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                }

                if (!window.myFrenteGroupCharts) {
                    window.myFrenteGroupCharts = {};
                }
                Object.values(window.myFrenteGroupCharts).forEach(ch => ch.destroy());
                window.myFrenteGroupCharts = {};

                frenteGroups.forEach(fg => {
                    const canvas = document.getElementById(`frente-group-chart-${fg.id}`);
                    if (!canvas) return;
                    const fgCtx = canvas.getContext('2d');
                    window.myFrenteGroupCharts[fg.id] = new Chart(fgCtx, {
                        type: 'bar',
                        data: {
                            labels: fg.labels,
                            datasets: [
                                {
                                    label: 'Turno A',
                                    data: fg.horasA,
                                    backgroundColor: plant.chartPrimary
                                },
                                {
                                    label: 'Turno B',
                                    data: fg.horasB,
                                    backgroundColor: plant.chartSecondary
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                });

                return () => {
                    if (window.myBarChart) window.myBarChart.destroy();
                    if (window.myPieChart) window.myPieChart.destroy();
                    if (window.myFrenteChart) window.myFrenteChart.destroy();
                    if (window.myRendimentoChart) window.myRendimentoChart.destroy();
                    if (window.myAcumuladoChart) window.myAcumuladoChart.destroy();
                    if (window.myFrenteGroupCharts) {
                        Object.values(window.myFrenteGroupCharts).forEach(ch => ch.destroy());
                        window.myFrenteGroupCharts = {};
                    }
                };
            }, [data, frentesSummary, rendimentoSeries, acumuladoSummary, frenteGroups, totalMachines, totalIssues, showComparison]);

            const handleTransferEquipment = (groupId, equipmentId) => {
                 setTransferData({ groupId, equipmentId });
                 setTransferModalOpen(true);
            };

            const confirmTransfer = (targetFrenteId) => {
                 if (!transferData || !targetFrenteId) return;

                 onTransferEquipment(transferData.groupId, transferData.equipmentId, targetFrenteId);
                 setTransferModalOpen(false);
                 setTransferData(null);
            };

            return (
                <div className="space-y-6">
                    <TransferModal 
                        isOpen={transferModalOpen}
                        onClose={() => setTransferModalOpen(false)}
                        onTransfer={confirmTransfer}
                        allFrentes={Object.keys(allData)}
                        currentFrenteId={data.id}
                    />
                    <div className="flex items-center justify-between">
                        <h2 className="text-lg font-bold text-gray-700">Dashboard Frente {data.id}</h2>
                        <div className="flex space-x-2">
                            <button
                                onClick={copyWhatsAppReport}
                                className="text-xs px-3 py-1 rounded bg-green-600 text-white hover:bg-green-700 font-bold flex items-center"
                                title="Copiar Relatório WhatsApp"
                            >
                                <Icons.Copy size={14} className="mr-1" />
                                WhatsApp
                            </button>
                            <button
                                onClick={generateWordReport}
                                className="text-xs px-3 py-1 rounded bg-blue-600 text-white hover:bg-blue-700 font-bold flex items-center"
                                title="Baixar Relatório de Status (Word)"
                            >
                                <Icons.Download size={14} className="mr-1" />
                                Relatório Status
                            </button>
                            <button
                                onClick={() => setShowComparison(prev => !prev)}
                                className={`text-xs px-3 py-1 rounded border ${showComparison ? `${plant.solidBgClass} text-white ${plant.borderClass}` : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-100'}`}
                            >
                                {showComparison ? 'Ver apenas frente selecionada' : 'Comparar frentes'}
                            </button>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className={`bg-white p-4 rounded shadow border-l-4 ${plant.borderClass}`}>
                            <div className="text-gray-500 text-sm font-bold">TOTAL HORAS (GERAL)</div>
                            <div className="text-3xl font-bold text-gray-800">{(totalHoursA + totalHoursB).toFixed(1)}h</div>
                        </div>
                        <div className="bg-white p-4 rounded shadow border-l-4" style={{ borderColor: plant.chartPrimary }}>
                            <div className="text-gray-500 text-sm font-bold">TOTAL TURNO A</div>
                            <div className="text-3xl font-bold text-gray-800">{totalHoursA.toFixed(1)}h</div>
                        </div>
                        <div className="bg-white p-4 rounded shadow border-l-4" style={{ borderColor: plant.chartSecondary }}>
                            <div className="text-gray-500 text-sm font-bold">TOTAL TURNO B</div>
                            <div className="text-3xl font-bold text-gray-800">{totalHoursB.toFixed(1)}h</div>
                        </div>
                        <div className="bg-white p-4 rounded shadow border-l-4 border-red-500">
                            <div className="text-gray-500 text-sm font-bold">EQUIP. C/ PROBLEMA</div>
                            <div className="text-3xl font-bold text-red-600">{totalIssues} / {totalMachines}</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-4 rounded shadow">
                            <h3 className="font-bold text-gray-700 mb-4">Horas por Grupo de Equipamento</h3>
                            <canvas ref={chartRef}></canvas>
                        </div>
                        <div className="bg-white p-4 rounded shadow">
                            <h3 className="font-bold text-gray-700 mb-4">Status da Frota</h3>
                            <div className="h-64 flex justify-center">
                                <canvas ref={pieRef}></canvas>
                            </div>
                        </div>
                    </div>

                    {showComparison && (
                        <div className="bg-white p-4 rounded shadow">
                            <h3 className="font-bold text-gray-700 mb-4">Resumo por Frente (dia selecionado)</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                {frentesSummary.map(f => (
                                    <div
                                        key={f.id}
                                        className={`border rounded shadow-sm p-3 ${data.id === f.id ? 'border-orange-500 bg-orange-50' : ''}`}
                                    >
                                        <div className="flex items-center justify-between mb-1">
                                            <div className="text-sm font-bold text-gray-700">Frente {f.id}</div>
                                            <div className="text-[10px] px-2 py-0.5 rounded-full bg-gray-100 text-gray-600">
                                                {f.totalMachines} equip.
                                            </div>
                                        </div>
                                        <div className="text-xs text-gray-500 mb-1">Horas trabalhadas (dia)</div>
                                        <div className="flex justify-between text-xs">
                                            <span>A: {f.totalA.toFixed(1).replace('.', ',')}h</span>
                                            <span>B: {f.totalB.toFixed(1).replace('.', ',')}h</span>
                                        </div>
                                        <div className="text-sm font-bold mt-1">
                                            Total: {(f.totalA + f.totalB).toFixed(1).replace('.', ',')}h
                                        </div>
                                        <div className="mt-2 text-xs space-y-1">
                                            <div className="flex justify-between">
                                                <span>Operacionais:</span>

            const chartInstance = useRef(null);

            useEffect(() => {
                if (activeView === 'dashboard' && chartRef.current && history.length > 0) {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    const ctx = chartRef.current.getContext('2d');
                    
                    // Aggregate data: Last 7 days
                    const days = 7;
                    const labels = [];
                    const dataPoints = [];
                    const now = new Date();
                    
                    for (let i = days - 1; i >= 0; i--) {
                        const d = new Date();
                        d.setDate(now.getDate() - i);
                        const day = String(d.getDate()).padStart(2, '0');
                        const month = String(d.getMonth() + 1).padStart(2, '0');
                        const year = d.getFullYear();
                        const dateStr = `${day}/${month}/${year}`;
                        
                        labels.push(`${day}/${month}`);
                        
                        // Sum hours for this date
                        const reports = history.filter(h => h.date === dateStr);
                        const totalHours = reports.reduce((acc, r) => {
                            const report = r.report_data || {};
                            const dailyTotal = (report.frotas || []).reduce((fAcc, f) => {
                                 return fAcc + (parseFloat(f.workedHoursA) || 0) + (parseFloat(f.workedHoursB) || 0);
                            }, 0);
                            return acc + dailyTotal;
                        }, 0);
                        dataPoints.push(totalHours);
                    }

                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Horas Trabalhadas',
                                data: dataPoints,
                                backgroundColor: 'rgba(249, 115, 22, 0.8)',
                                borderRadius: 6,
                                borderSkipped: false,

                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: '#1f2937',
                                    padding: 12,
                                    cornerRadius: 8,
                                    callbacks: {
                                        label: (ctx) => `${ctx.raw.toFixed(1)} horas`
                                    }
                                }
                            },
                            scales: {
                                y: { 
                                    beginAtZero: true,
                                    grid: { borderDash: [2, 4], color: '#f3f4f6' },
                                    ticks: { font: { size: 11 } }
                                },
                                x: {
                                    grid: { display: false },
                                    ticks: { font: { size: 11 } }
                                }
                            }
                        }
                    });
                }
                
                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [activeView, history]);

            // Derived Stats
            const stats = useMemo(() => {
                if (!history.length) return { total: 0, thisMonth: 0, activeFrentes: 0, lastUpdate: '-' };
                
                const now = new Date();
                const thisMonth = history.filter(r => {
                    const d = new Date(r.date.split('/').reverse().join('-'));
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                }).length;

                const uniqueFrentes = new Set(history.map(r => r.frente_id)).size;
                const lastUpdate = history[0]?.date || '-';

                return {
                    total: history.length,
                    thisMonth,
                    activeFrentes: uniqueFrentes,
                    lastUpdate
                };
            }, [history]);

            useEffect(() => {
                fetchHistory();
                setSelectedIds(new Set());
            }, [selectedPlant]);

            useEffect(() => {
                if (activeView === 'database') checkConnection();
                if (activeView === 'users') fetchUsers();
            }, [activeView, selectedPlant]);

            const fetchUsers = async () => {
                setLoadingUsers(true);
                setUsersError(null);
                
                // Tenta buscar da tabela 'profiles'
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error("Erro ao buscar usuários:", error);
                    setUsersError(error);
                    setUsers([]);
                } else {
                    setUsers(data || []);
                }
                setLoadingUsers(false);
            };

            const handleSaveUser = async (updatedUser) => {
                try {
                    const { error } = await supabaseClient
                        .from('profiles')
                        .update({
                            plant_id: updatedUser.plant_id,
                            role: updatedUser.role,
                            is_admin: updatedUser.is_admin
                        })
                        .eq('id', updatedUser.id);

                    if (error) throw error;

                    setUsers(prev => prev.map(u => u.id === updatedUser.id ? updatedUser : u));
                    setEditingUser(null);
                    alert('Usuário atualizado com sucesso!');
                } catch (error) {
                    console.error('Erro ao atualizar usuário:', error);
                    alert(`Erro ao atualizar usuário: ${error.message}\n\nProvável causa: Permissões insuficientes (RLS).\nExecute o script SQL atualizado no painel do Supabase para permitir que admins editem outros usuários.`);
                }
            };

            const getTableName = (plantId) => {
                if (plantId === 'cambui') return 'daily_reports_cambui';
                if (plantId === 'panorama') return 'daily_reports_panorama';
                if (plantId === 'vale-verdao') return 'daily_reports_vale_verdao';
                if (plantId === 'floresta') return 'daily_reports_floresta';
                return 'daily_reports';
            };

            const fetchHistory = async () => {
                setLoading(true);
                const tableName = getTableName(selectedPlant);
                
                const { data, error } = await supabaseClient
                    .from(tableName)
                    .select('*')
                    .order('date', { ascending: false })
                    .limit(500);
                
                if (error) {
                    console.error("Admin Fetch Error:", error);
                } else {
                    setHistory(data || []);
                }
                setLoading(false);
            };

            const checkConnection = async () => {
                setConnectionStatus('checking');
                const tableName = getTableName(selectedPlant);
                const { count, error } = await supabaseClient
                    .from(tableName)
                    .select('*', { count: 'exact', head: true });
                
                if (error) {
                    setConnectionStatus('error');
                } else {
                    setConnectionStatus('success');
                }
            };

            const handleDelete = async (record) => {
                if (!confirm(`ATENÇÃO: Esta ação é irreversível.\n\nDeseja excluir permanentemente o registro de ${record.date} da frente ${record.frente_id}?`)) return;
                
                const tableName = getTableName(selectedPlant);
                let query = supabaseClient.from(tableName).delete();
                
                if (record.id) {
                    query = query.eq('id', record.id);
                } else {
                    query = query.eq('date', record.date).eq('frente_id', record.frente_id);
                }

                const { error } = await query;
                
                if (error) {
                    alert("Erro ao excluir: " + error.message);
                } else {
                    setHistory(prev => prev.filter(h => h.id !== record.id));
                    setSelectedIds(prev => {
                        const newSet = new Set(prev);
                        newSet.delete(record.id);
                        return newSet;
                    });
                }
            };

            const handleBulkDelete = async () => {
                if (!selectedIds.size) return;
                if (!confirm(`ATENÇÃO: Você vai excluir ${selectedIds.size} registros permanentemente. Continuar?`)) return;

                setLoading(true);
                const tableName = getTableName(selectedPlant);
                const idsToDelete = Array.from(selectedIds);

                const { error } = await supabaseClient
                    .from(tableName)
                    .delete()
                    .in('id', idsToDelete);

                if (error) {
                    alert('Erro ao excluir em massa: ' + error.message);
                } else {
                    setHistory(prev => prev.filter(h => !selectedIds.has(h.id)));
                    setSelectedIds(new Set());
                }
                setLoading(false);
            };

            const handleEdit = (record) => {
                if (confirm(`Deseja carregar os dados de ${record.date} da frente ${record.frente_id} para edição?`)) {
                    onLoadEntry(selectedPlant, record.date, record.frente_id);
                    onClose();
                }
            };

            const handleExportCSV = () => {
                const headers = ['ID', 'Data', 'Frente', 'Turno A (h)', 'Turno B (h)', 'Criado em'];
                const rows = filteredHistory.map(r => {
                    const report = r.report_data || {};
                    const totalA = (report.frotas || []).reduce((acc, f) => acc + (parseFloat(f.workedHoursA) || 0), 0);
                    const totalB = (report.frotas || []).reduce((acc, f) => acc + (parseFloat(f.workedHoursB) || 0), 0);
                    return [r.id, r.date, r.frente_id, totalA.toFixed(2), totalB.toFixed(2), r.created_at];
                });
                
                const csvContent = "data:text/csv;charset=utf-8," 
                    + headers.join(",") + "\n" 
                    + rows.map(e => e.join(",")).join("\n");
                    
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `relatorio_${selectedPlant}_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const filteredHistory = useMemo(() => {
                return history.filter(r => {
                    const matchSearch = r.frente_id.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                      r.date.includes(searchTerm);
                    
                    if (!matchSearch) return false;

                    if (dateRange.start) {
                        const [d, m, y] = r.date.split('/');
                        const rDate = new Date(`${y}-${m}-${d}`);
                        const startDate = new Date(dateRange.start);
                        if (rDate < startDate) return false;
                    }
                    
                    if (dateRange.end) {
                        const [d, m, y] = r.date.split('/');
                        const rDate = new Date(`${y}-${m}-${d}`);
                        const endDate = new Date(dateRange.end);
                        if (rDate > endDate) return false;
                    }

                    return true;
                });
            }, [history, searchTerm, dateRange]);

                if (selectedIds.size === filteredHistory.length) {
                    setSelectedIds(new Set());
                } else {
                    setSelectedIds(new Set(filteredHistory.map(r => r.id)));
                }

                setSelectedIds(prev => {

                    return newSet;

create table if not exists public.profiles (
  id uuid references auth.users on delete cascade not null primary key,
  email text,
  first_name text,
  last_name text,
  plant_id text,
  created_at timestamp with time zone default timezone('utc'::text, now()) not null
);

-- 2. Habilita segurança (RLS)
alter table public.profiles enable row level security;
create policy "Public profiles are viewable by everyone." on profiles for select using (true);
create policy "Users can insert own profile." on profiles for insert with check (auth.uid() = id);
create policy "Users can update own profile." on profiles for update using (auth.uid() = id);
create policy "Admins can update all profiles." on profiles for update using (
  exists (select 1 from profiles where id = auth.uid() and is_admin = true)
);

-- 3. Cria função para sincronizar novos usuários
create or replace function public.handle_new_user() 
returns trigger as $$
begin
  insert into public.profiles (id, email, first_name, last_name, plant_id)
  values (new.id, new.email, new.raw_user_meta_data->>'first_name', new.raw_user_meta_data->>'last_name', new.raw_user_meta_data->>'plant_id');
  return new;
end;
$$ language plpgsql security definer;

-- 4. Cria trigger para novos cadastros
drop trigger if exists on_auth_user_created on auth.users;
create trigger on_auth_user_created
  after insert on auth.users
  for each row execute procedure public.handle_new_user();

-- 5. Sincroniza usuários já existentes (Executar apenas uma vez)
insert into public.profiles (id, email, first_name, last_name, plant_id)
select id, email, raw_user_meta_data->>'first_name', raw_user_meta_data->>'last_name', raw_user_meta_data->>'plant_id'
from auth.users
on conflict (id) do nothing;

-- 6. Adiciona colunas de função e permissão
alter table public.profiles add column if not exists role text default 'Operador';
alter table public.profiles add column if not exists is_admin boolean default false;`}

returns trigger as $$

  insert into public.profiles (id, email, first_name, last_name, plant_id)
  values (new.id, new.email, new.raw_user_meta_data->>'first_name', new.raw_user_meta_data->>'last_name', new.raw_user_meta_data->>'plant_id');
  return new;
end;

        const App = () => {
            const [session, setSession] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminPanel, setShowAdminPanel] = useState(false);

            // App Mode (APK) - Detect via Capacitor or URL param
            const isAppMode = useMemo(() => window.Capacitor !== undefined || window.location.search.includes('mode=app'), []);

            useEffect(() => {
                const fetchProfileAndSetAdmin = async (currentSession) => {
                    if (!currentSession?.user) {
                        setUserProfile(null);
                        setIsAdmin(false);
                        return;
                    }

                    try {
                        const { data, error } = await supabaseClient
                            .from('profiles')
                            .select('*')
                            .eq('id', currentSession.user.id)
                            .single();
                        
                        if (data) {
                            setUserProfile(data);
                            // Admin if email matches hardcoded OR profile says is_admin
                            const isUserAdmin = currentSession.user.email === 'gutemberggg10@gmail.com' || data.is_admin === true;
                            setIsAdmin(isUserAdmin);
                            
                            // If user has a specific plant assigned and is NOT admin/manager, force that plant
                            const isManager = data.role === 'Gerente';
                            if (data.plant_id && !isUserAdmin && !isManager) {
                                setPlantId(data.plant_id);
                            }
                        } else {
                            // Fallback to metadata if profile not found
                            const isUserAdmin = currentSession.user.email === 'gutemberggg10@gmail.com';
                            setIsAdmin(isUserAdmin);
                            if (currentSession.user.user_metadata?.plant_id && !isUserAdmin) {
                                setPlantId(currentSession.user.user_metadata.plant_id);
                            }
                        }
                    } catch (err) {
                        console.error("Error fetching profile:", err);
                        setIsAdmin(currentSession.user.email === 'gutemberggg10@gmail.com');
                    }
                };

                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    fetchProfileAndSetAdmin(session);
                });

                const {
                    data: { subscription },
                } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    fetchProfileAndSetAdmin(session);
                });

                return () => subscription.unsubscribe();
            }, []);

            const [plantId, setPlantId] = useState(() => localStorage.getItem('selectedPlantId') || 'cambui');
            
            // Access Control: Determine which plants are visible to the current user
            const availablePlants = useMemo(() => {
                if (!session) return PLANTS;
                // Admins and Managers (Gerente) have full access
                if (isAdmin || userProfile?.role === 'Gerente') return PLANTS;
                
                const userPlantId = userProfile?.plant_id || session.user?.user_metadata?.plant_id;
                if (userPlantId) {
                    return PLANTS.filter(p => p.id === userPlantId);
                }
                
                return PLANTS; 
            }, [session, isAdmin, userProfile]);

            // Enforce Access Control: If current plant is not allowed, switch to allowed one
            useEffect(() => {
                if (session && availablePlants.length > 0) {
                    const isAllowed = availablePlants.find(p => p.id === plantId);
                    if (!isAllowed) {
                        setPlantId(availablePlants[0].id);
                    }
                }
            }, [availablePlants, plantId, session]);

            const plant = useMemo(() => PLANTS.find(p => p.id === plantId) || PLANTS[0], [plantId]);

            useEffect(() => {
                localStorage.setItem('selectedPlantId', plantId);
            }, [plantId]);

            const [selectedDate, setSelectedDate] = useState(() => new Date().toISOString().split('T')[0]);
            
            // State: Map of frenteId -> { [date]: ReportData }
            const [allData, setAllData] = useState({});
            const [activeFrenteId, setActiveFrenteId] = useState('');
            
            const [view, setView] = useState('entry'); // 'entry' or 'dashboard'
            const [entryMode, setEntryMode] = useState('list'); // 'list' or 'form'

            // Mobile Flow State
            const [mobileView, setMobileView] = useState('home'); // 'home', 'shift', 'input'
            const [mobileShift, setMobileShift] = useState(null); // 'shiftA', 'shiftB'
            const [activeTab, setActiveTab] = useState('launches'); // 'launches' | 'equipments'

            // Force Entry View in App Mode
            useEffect(() => {
                if (isAppMode) {
                    setView('entry');
                    setEntryMode('form');
                }
            }, [isAppMode]);

            const [showSql, setShowSql] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [showNewFrenteModal, setShowNewFrenteModal] = useState(false);
            const [newFrenteName, setNewFrenteName] = useState('');
            const [newFrenteType, setNewFrenteType] = useState('plantadora');
            const [refreshTrigger, setRefreshTrigger] = useState(0);
            const [transferModalOpen, setTransferModalOpen] = useState(false);
            const [transferData, setTransferData] = useState(null);

            // Load Data from Supabase
            useEffect(() => {
                const loadAll = async () => {
                    setIsLoading(true);
                    try {
                        let tableName = 'daily_reports'; // fallback default
                        let frentesTable = 'frentes_cambui'; // fallback default
                        
                        if (plantId === 'cambui') { tableName = 'daily_reports_cambui'; frentesTable = 'frentes_cambui'; }
                        else if (plantId === 'panorama') { tableName = 'daily_reports_panorama'; frentesTable = 'frentes_panorama'; }
                        else if (plantId === 'vale-verdao') { tableName = 'daily_reports_vale_verdao'; frentesTable = 'frentes_vale_verdao'; }
                        else if (plantId === 'floresta') { tableName = 'daily_reports_floresta'; frentesTable = 'frentes_floresta'; }

                        // 1. Load Frentes Registry
                        const { data: frentesData, error: frentesError } = await supabaseClient
                            .from(frentesTable)
                            .select('*');
                            
                        // 2. Load Reports
                        const { data, error } = await supabaseClient
                            .from(tableName)
                            .select('*');

                        if (error || frentesError) {
                             console.error("Supabase Load Error:", error || frentesError);
                             if ((error && (error.code === '42P01' || error.message.includes('relation') || error.message.includes('does not exist'))) || 
                                 (frentesError && (frentesError.code === '42P01' || frentesError.message.includes('relation') || frentesError.message.includes('does not exist')))) {
                                setShowSql(true);
                            }
                            // Fallback to local init if error or empty
                            setAllData({});
                            setActiveFrenteId('');
                        } else {
                            const newData = {};
                            
                            // Initialize with empty reports for registered frentes
                            if (frentesData) {
                                frentesData.forEach(f => {
                                    newData[f.name] = {}; 
                                    // Store type metadata implicitly or explicit state? 
                                    // Current structure is allData[frenteId][date] = report
                                    // We might need a separate state for frente types if we want to preserve it correctly for new dates
                                });
                            }

                            if (data) {
                                data.forEach(row => {
                                    const report = row.report_data;
                                    // Filter by Plant ID. If missing plantId (legacy), assume 'cambui'
                                    const reportPlantId = report.plantId || 'cambui';
                                    
                                    if (reportPlantId === plantId) {
                                        if (!newData[row.frente_id]) newData[row.frente_id] = {};
                                        newData[row.frente_id][row.date] = report;
                                    }
                                });
                            }
                            
                            setAllData(newData);
                            
                            // Update active frente logic
                            const availableFrentes = Object.keys(newData);
                            if (availableFrentes.length > 0) {
                                if (!newData[activeFrenteId]) {
                                    setActiveFrenteId(availableFrentes[0]);
                                }
                            } else {
                                setActiveFrenteId('');
                            }
                        }
                    } catch (err) {
                        console.error("Connection Error:", err);
                        // Fallback
                        setAllData({});
                        setActiveFrenteId('');
                    }
                    setIsLoading(false);
                };
                loadAll();
            }, [plantId, refreshTrigger]); // Reload when plant changes or refresh triggered

            // Real-time Subscription to Changes
            useEffect(() => {
                let tableName = 'daily_reports'; // fallback
                if (plantId === 'cambui') tableName = 'daily_reports_cambui';
                else if (plantId === 'panorama') tableName = 'daily_reports_panorama';
                else if (plantId === 'vale-verdao') tableName = 'daily_reports_vale_verdao';
                else if (plantId === 'floresta') tableName = 'daily_reports_floresta';

                console.log(`Subscribing to changes on ${tableName}...`);

                const channel = supabaseClient
                    .channel(`public:${tableName}`)
                    .on('postgres_changes', { event: '*', schema: 'public', table: tableName }, (payload) => {
                        console.log('Realtime Change:', payload);
                        
                        if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
                            const { frente_id, date, report_data } = payload.new;
                            
                            // Check if the update belongs to the current plant logic (double check)
                            // report_data might not have plantId if older record, but table ensures scope.
                            
                            setAllData(prev => ({
                                ...prev,
                                [frente_id]: {
                                    ...(prev[frente_id] || {}),
                                    [date]: report_data
                                }
                            }));
                            
                            setNotification({ message: 'Dados atualizados remotamente!', type: 'success' });
                        } else if (payload.eventType === 'DELETE') {
                            const { frente_id, date } = payload.old;
                            
                            setAllData(prev => {
                                const currentFrente = prev[frente_id];
                                if (!currentFrente) return prev;

                                const newFrenteData = { ...currentFrente };
                                delete newFrenteData[date];

                                const newData = { ...prev };
                                
                                // If no more dates for this frente, remove the frente entirely
                                if (Object.keys(newFrenteData).length === 0) {
                                    delete newData[frente_id];
                                } else {
                                    newData[frente_id] = newFrenteData;
                                }
                                
                                return newData;
                            });
                        }
                    })
                    .subscribe();

                return () => {
                    supabaseClient.removeChannel(channel);
                };
            }, [plantId]);

            const [isSaving, setIsSaving] = useState(false);
            const [notification, setNotification] = useState(null);

            // Manual Save Function
            const handleSave = async () => {
                if (!allData[activeFrenteId]) return;
                setIsSaving(true);
                setNotification({ message: 'Sincronizando com o banco de dados...', type: 'info' });
                
                const currentUser = session?.user?.email || 'Desconhecido';

                const updates = Object.entries(allData[activeFrenteId]).map(([date, report]) => {
                    // Update report with editor info
                    const updatedReport = {
                        ...report,
                        last_editor: currentUser,
                        updated_at: new Date().toISOString()
                    };
                    
                    // Update local state as well to reflect immediately
                    allData[activeFrenteId][date] = updatedReport;

                    return {
                        frente_id: activeFrenteId,
                        date: date,
                        report_data: updatedReport
                    };
                });

                if (updates.length === 0) {
                    setIsSaving(false);
                    return;
                }

                try {
                    let tableName = 'daily_reports'; // fallback default
                    if (plantId === 'cambui') tableName = 'daily_reports_cambui';
                    else if (plantId === 'panorama') tableName = 'daily_reports_panorama';
                    else if (plantId === 'vale-verdao') tableName = 'daily_reports_vale_verdao';
                    else if (plantId === 'floresta') tableName = 'daily_reports_floresta';

                    const { error } = await supabaseClient
                        .from(tableName)
                        .upsert(updates, { onConflict: 'frente_id, date' });

                    if (error) {
                        console.error("Supabase Save Error:", error);
                        if (error.code === '42P01' || error.message.includes('relation') || error.message.includes('does not exist')) {
                            setShowSql(true);
                        }
                        setNotification({ message: 'Salvo localmente. Pendente para subir pro banco de dados', type: 'warning' });
                    } else {
                        setNotification({ message: 'Salvo com sucesso e sincronizado com o banco de dados', type: 'success' });
                    }

            const recalculateSpeed = (groups) => {

                // Identify groups by Label (Universal Logic) with fallback to Name/ID
                groups.forEach((g, index) => {
                    const label = (g.yieldLabel || '').toLowerCase();
                    const name = (g.name || '').toLowerCase();
                    const id = (g.id || '').toLowerCase();
                    const y = parseFloat(g.yield) || 0;

                    const isLabelA = label.includes('rendimento') && label.includes('turno') && (label.includes('"a"') || label.includes("'a'") || label.includes(' a'));
                    const isLabelB = label.includes('rendimento') && label.includes('turno') && (label.includes('"b"') || label.includes("'b'") || label.includes(' b'));
                    const isLabelSpeed = label.includes('velocidade');

                    // Fallback logic if labels are generic 'produção' or missing
                    const isNameA = name.includes('colhedora');
                    const isNameB = name.includes('transbordo') || name.includes('sulcador');
                    const isNameSpeed = name.includes('plantadora') || name.includes('distribuidor');

                    if (isLabelA || (!isLabelB && !isLabelSpeed && isNameA)) {
                        yieldA = y;
                    } else if (isLabelB || (!isLabelA && !isLabelSpeed && isNameB)) {
                        yieldB = y;
                    } else if (isLabelSpeed || (!isLabelA && !isLabelB && isNameSpeed)) {
                        targetGroupIndex = index;
                    }
                });

                if (targetGroupIndex === -1) return groups;

                const targetGroup = groups[targetGroupIndex];
                const totalHours = targetGroup.items.reduce((acc, item) => acc + (item.totalAB || 0), 0);
                
                let speed = 0;
                if (totalHours > 0) {
                    // Formula: ((YieldA + YieldB) * 6666 / TotalHours / 1000) (Gross Speed)
                    // 6666 is the factor for 1.5m spacing (10000/1.5)
                    speed = ((yieldA + yieldB) * 6666) / totalHours / 1000;
                }

                const newGroups = [...groups];
                newGroups[targetGroupIndex] = {
                    ...targetGroup,
                    yield: parseFloat(speed.toFixed(2))
                };
                
                return newGroups;
            };

                        if (group.id !== groupId) return group;

                        const newItems = group.items.map(item => {
                            if (item.id !== equipmentId) return item;

                            const newItem = { ...item };
                            const setNested = (obj, path, val) => {
                                const last = path.pop();
                                const target = path.reduce((o, key) => o[key], obj);
                                if (last) target[last] = val;
                            };

                            const pathParts = field.split('.');
                            
                            // Apply change
                            if (pathParts.length === 1) {
                                newItem[field] = value;
                            } else {
                                if (pathParts[0] === 'shiftA' || pathParts[0] === 'shiftB') {
                                    const shift = pathParts[0];
                                    const prop = pathParts[1];
                                    newItem[shift] = { ...newItem[shift], [prop]: value };
                                    
                                    // Auto-calc worked hours
                                    const init = newItem[shift].initial;
                                    const fin = newItem[shift].final;
                                    if (init !== null && fin !== null) {
                                        newItem[shift].worked = fin - init;
                                    } else {
                                        newItem[shift].worked = 0;
                                    }
                                } else {
                                    setNested(newItem, pathParts, value);
                                }
                            }

                            // AUTO-FILL: Shift A Final <-> Shift B Initial (Intra-day Bidirectional)
                            if (field === 'shiftA.final' && value !== null) {
                                newItem.shiftB = { ...newItem.shiftB, initial: value };
                                // Re-calc Shift B worked
                                const bInit = value;
                                const bFin = newItem.shiftB.final;
                                if (bInit !== null && bFin !== null) {
                                    newItem.shiftB.worked = bFin - bInit;
                                }
                            }
                            if (field === 'shiftB.initial' && value !== null) {
                                newItem.shiftA = { ...newItem.shiftA, final: value };
                                // Re-calc Shift A worked
                                const aInit = newItem.shiftA.initial;
                                const aFin = value;
                                if (aInit !== null && aFin !== null) {
                                    newItem.shiftA.worked = aFin - aInit;
                                }
                            }

                            newItem.totalAB = (newItem.shiftA.worked || 0) + (newItem.shiftB.worked || 0);
                            return newItem;
                        });
                        return { ...group, items: newItems };
                    });
                    
                    const newCurrentDayData = { ...currentReport, groups: recalculateSpeed(newGroups) };
                    let newFrenteData = { ...currentFrente, [selectedDate]: newCurrentDayData };

                                 return { ...group, items: newItems };

                             newFrenteData[nextDate] = { ...nextDayReport, groups: recalculateSpeed(nextGroups) };
