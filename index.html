                date.setUTCDate(date.getUTCDate() - 1);
                return date.toISOString().split('T')[0];
            };

            const recalculateSpeed = (groups) => {
                let yieldA = 0;
                let yieldB = 0;
                let targetGroupIndex = -1;

                // Identify groups by Label (Universal Logic) with fallback to Name/ID
                groups.forEach((g, index) => {
                    const label = (g.yieldLabel || '').toLowerCase();
                    const name = (g.name || '').toLowerCase();
                    const id = (g.id || '').toLowerCase();
                    const y = parseFloat(g.yield) || 0;

                    const isLabelA = label.includes('rendimento') && label.includes('turno') && (label.includes('"a"') || label.includes("'a'") || label.includes(' a'));
                    const isLabelB = label.includes('rendimento') && label.includes('turno') && (label.includes('"b"') || label.includes("'b'") || label.includes(' b'));
                    const isLabelSpeed = label.includes('velocidade');

                    // Fallback logic if labels are generic 'produção' or missing
                    const isNameA = name.includes('colhedora');
                    const isNameB = name.includes('transbordo') || name.includes('sulcador');
                    const isNameSpeed = name.includes('plantadora') || name.includes('distribuidor');

                    if (isLabelA || (!isLabelB && !isLabelSpeed && isNameA)) {
                        yieldA = y;
                    } else if (isLabelB || (!isLabelA && !isLabelSpeed && isNameB)) {
                        yieldB = y;
                    } else if (isLabelSpeed || (!isLabelA && !isLabelB && isNameSpeed)) {
                        targetGroupIndex = index;
                    }
                });

                if (targetGroupIndex === -1) return groups;

                const targetGroup = groups[targetGroupIndex];
                const totalHours = targetGroup.items.reduce((acc, item) => acc + (item.totalAB || 0), 0);
                
                let speed = 0;
                if (totalHours > 0) {
                    // Formula: ((YieldA + YieldB) * 6666 / TotalHours / 1000) (Gross Speed)
                    // 6666 is the factor for 1.5m spacing (10000/1.5)
                    speed = ((yieldA + yieldB) * 6666) / totalHours / 1000;
                }

                const newGroups = [...groups];
                newGroups[targetGroupIndex] = {
                    ...targetGroup,
                    yield: parseFloat(speed.toFixed(2))
                };
                
                return newGroups;
            };

            const updateEquipment = (groupId, equipmentId, field, value) => {
                // Security Check: Prevent editing completed reports if not admin
                const currentReportCheck = allData[activeFrenteId]?.[selectedDate];
                if (currentReportCheck?.status === 'completed' && !isAdmin) {
                     setNotification({ message: 'Lançamento concluído não pode ser editado.', type: 'warning' });
                     return;
                }

                setAllData(prev => {
                    const currentFrente = prev[activeFrenteId] || {};
                    const currentReport = currentFrente[selectedDate];
                    if (!currentReport) return prev;

                    // 1. Update Current Day
                    const newGroups = currentReport.groups.map(group => {
                        if (group.id !== groupId) return group;

                        const newItems = group.items.map(item => {
                            if (item.id !== equipmentId) return item;

                            const newItem = { ...item };
                            const setNested = (obj, path, val) => {
                                const last = path.pop();
                                const target = path.reduce((o, key) => o[key], obj);
                                if (last) target[last] = val;
                            };

                            const pathParts = field.split('.');
                            
                            // Apply change
                            if (pathParts.length === 1) {
                                newItem[field] = value;
                            } else {
                                if (pathParts[0] === 'shiftA' || pathParts[0] === 'shiftB') {
                                    const shift = pathParts[0];
                                    const prop = pathParts[1];
                                    newItem[shift] = { ...newItem[shift], [prop]: value };
                                    
                                    // Auto-calc worked hours
                                    const init = newItem[shift].initial;
                                    const fin = newItem[shift].final;
                                    if (init !== null && fin !== null) {
                                        newItem[shift].worked = fin - init;
                                    } else {
                                        newItem[shift].worked = 0;
                                    }
                                } else {
                                    setNested(newItem, pathParts, value);
                                }
                            }

                            // AUTO-FILL: Shift A Final <-> Shift B Initial (Intra-day Bidirectional)
                            if (field === 'shiftA.final' && value !== null) {
                                newItem.shiftB = { ...newItem.shiftB, initial: value };
                                // Re-calc Shift B worked
                                const bInit = value;
                                const bFin = newItem.shiftB.final;
                                if (bInit !== null && bFin !== null) {
                                    newItem.shiftB.worked = bFin - bInit;
                                }
                            }
                            if (field === 'shiftB.initial' && value !== null) {
                                newItem.shiftA = { ...newItem.shiftA, final: value };
                                // Re-calc Shift A worked
                                const aInit = newItem.shiftA.initial;
                                const aFin = value;
                                if (aInit !== null && aFin !== null) {
                                    newItem.shiftA.worked = aFin - aInit;
                                }
                            }

                            newItem.totalAB = (newItem.shiftA.worked || 0) + (newItem.shiftB.worked || 0);
                            return newItem;
                        });
                        return { ...group, items: newItems };
                    });
                    
                    const newCurrentDayData = { ...currentReport, groups: recalculateSpeed(newGroups) };
                    let newFrenteData = { ...currentFrente, [selectedDate]: newCurrentDayData };

                                     // Re-calc Shift A worked
                                     const init = value;

                                     newItem.totalAB = (newItem.shiftA.worked || 0) + (newItem.shiftB.worked || 0);
                                     return newItem;

                                 return { ...group, items: newItems };
                             });
                             
                             newFrenteData[nextDate] = { ...nextDayReport, groups: recalculateSpeed(nextGroups) };

                 });
            };

            const handleTransferEquipment = (groupId, equipmentId) => {
                 setTransferData({ groupId, equipmentId });
                 setTransferModalOpen(true);
            };

            const confirmTransfer = (targetFrenteId) => {
                 if (!transferData || !targetFrenteId) return;
                 
                 const { groupId, equipmentId } = transferData;
                 const sourceFrenteId = activeFrenteId;

                 // Security Check: Prevent transfer if source or target is completed (unless admin)
                 const sourceReportCheck = allData[sourceFrenteId]?.[selectedDate];
                 const targetReportCheck = allData[targetFrenteId]?.[selectedDate];
                 
                 if (!isAdmin) {
                     if (sourceReportCheck?.status === 'completed') {
                         setNotification({ message: 'Origem concluída. Transferência bloqueada.', type: 'warning' });
                         return;
                     }
                     if (targetReportCheck?.status === 'completed') {
                         setNotification({ message: 'Destino concluído. Transferência bloqueada.', type: 'warning' });
                         return;
                     }
                 }
                 
                 setAllData(prev => {
                    const sourceReport = prev[sourceFrenteId]?.[selectedDate];
                    const targetReport = prev[targetFrenteId]?.[selectedDate];
                    
                    if (!sourceReport) return prev; // Should not happen

                    // Find item to transfer
                    let itemToTransfer = null;
                    const newSourceGroups = sourceReport.groups.map(group => {
                        if (group.id !== groupId) return group;
                        const item = group.items.find(i => i.id === equipmentId);
                        if (item) itemToTransfer = item;
                        return { ...group, items: group.items.filter(i => i.id !== equipmentId) };
                    });

                    if (!itemToTransfer) return prev;

                    // If target report doesn't exist for this date, create it based on previous day or init
                    let newTargetReport = targetReport;
                    if (!newTargetReport) {
                        // For simplicity, just init empty for now, logic similar to createInitialData could be used if needed
                        // But usually targetFrente should be initialized if it appears in list.
                        // Wait, list comes from Object.keys(allData), so it exists. 
                        // But maybe not for this specific date?
                        // If not exists for date, we should probably initialize it.
                        // Let's assume user ensures target front has data for today or handle basic init.
                         // Actually, if it doesn't exist for date, we can't easily add to a group.
                         // Let's fallback to creating it if missing.
                         newTargetReport = createInitialData(targetFrenteId, selectedDate, plantId);
                    }

                    const newTargetGroups = newTargetReport.groups.map(group => {
                        // Try to match group ID. If not found, maybe fallback to first group or a default 'others'?
                        // Most templates have same IDs (colhedoras, transbordo).
                        if (group.id === groupId) {
                             return { ...group, items: [...group.items, itemToTransfer] };
                        }
                        return group;
                    });
                    
                    // If group ID didn't match (e.g. transferring from plantadora to distribuidora front which has different groups),
                    // we might need to ask user for target group. For now, try to find a best match or just add to first group.
                    const groupExists = newTargetGroups.some(g => g.id === groupId);
                    if (!groupExists) {
                        // Fallback: Add to the first group that accepts equipments
                        if (newTargetGroups.length > 0) {
                            newTargetGroups[0].items.push(itemToTransfer);
                        }
                    }

                    return {
                        ...prev,
                        [sourceFrenteId]: {
                            ...prev[sourceFrenteId],
                            [selectedDate]: { ...sourceReport, groups: recalculateSpeed(newSourceGroups) }
                        },
                        [targetFrenteId]: {
                            ...prev[targetFrenteId],
                            [selectedDate]: { ...newTargetReport, groups: recalculateSpeed(newTargetGroups) }
                        }
                    };
                 });

                 setTransferModalOpen(false);
                 setTransferData(null);
                 setNotification({ message: `Equipamento transferido para ${targetFrenteId}!`, type: 'success' });
            };

            const addNewFrente = () => {
                setNewFrenteName('');
                setNewFrenteType('plantadora');
                setShowNewFrenteModal(true);
            };

            const handleCreateFrente = async () => {
                const name = newFrenteName.trim().toUpperCase();
                if (!name) {
                    alert("Digite um nome válido.");
                    return;
                }
                if (allData[name]) {
                    alert("Frente já existe!");
                    return;
                }

                // Insert into Supabase Registry
                let frentesTable = 'frentes_cambui'; // fallback default
                if (plantId === 'cambui') frentesTable = 'frentes_cambui';
                else if (plantId === 'panorama') frentesTable = 'frentes_panorama';
                else if (plantId === 'vale-verdao') frentesTable = 'frentes_vale_verdao';
                else if (plantId === 'floresta') frentesTable = 'frentes_floresta';

                const { error } = await supabaseClient
                    .from(frentesTable)
                    .insert([{ name: name, type: newFrenteType }]);

                if (error) {
                    console.error("Error creating frente:", error);
                    alert("Erro ao criar frente. Verifique permissões ou se já existe.");
                    return;
                }

                setAllData(prev => ({
                    ...prev,
                    [name]: { [selectedDate]: createInitialData(name, selectedDate, plantId, newFrenteType) }
                }));
                setActiveFrenteId(name);
                setShowNewFrenteModal(false);
                setNotification({ message: 'Frente criada com sucesso!', type: 'success' });
            };

            const deleteFrente = async () => {
                // Security Check: Only admins can delete Frentes
                if (!isAdmin) {
                    setNotification({ message: 'Apenas administradores podem excluir frentes.', type: 'warning' });
                    return;
                }

                // Allow deleting the last frente (remove restriction)
                if (confirm(`Tem certeza que deseja excluir a ${activeFrenteId}?`)) {
                    // Delete from Supabase Reports
                    let tableName = 'daily_reports'; // fallback default
                    let frentesTable = 'frentes_cambui'; // fallback default
                    
                    if (plantId === 'cambui') { tableName = 'daily_reports_cambui'; frentesTable = 'frentes_cambui'; }
                    else if (plantId === 'panorama') { tableName = 'daily_reports_panorama'; frentesTable = 'frentes_panorama'; }
                    else if (plantId === 'vale-verdao') { tableName = 'daily_reports_vale_verdao'; frentesTable = 'frentes_vale_verdao'; }
                    else if (plantId === 'floresta') { tableName = 'daily_reports_floresta'; frentesTable = 'frentes_floresta'; }

                    const { error: reportsError } = await supabaseClient
                        .from(tableName)
                        .delete()
                        .eq('frente_id', activeFrenteId);

                    if (reportsError) console.error("Delete Reports Error", reportsError);

                    // Delete from Supabase Registry
                    const { error: frenteError } = await supabaseClient
                        .from(frentesTable)
                        .delete()
                        .eq('name', activeFrenteId);
                    
                    if (frenteError) console.error("Delete Registry Error", frenteError);

                    setAllData(prev => {
                        const newData = { ...prev };
                        delete newData[activeFrenteId];
                        return newData;
                    });
                    
                    // Update active frente
                    const remaining = Object.keys(allData).filter(k => k !== activeFrenteId);
                    if (remaining.length > 0) {
                        setActiveFrenteId(remaining[0]);
                    } else {
                        setActiveFrenteId(''); // No frentes left
                    }
                    setNotification({ message: 'Frente excluída!', type: 'success' });
                }
            };

            const handleEditHistory = (frenteId, date) => {
                const report = allData[frenteId]?.[date];
                if (report?.status === 'completed' && !isAdmin) {
                    setNotification({ message: 'Lançamento concluído não pode ser editado.', type: 'warning' });
                    return;
                }
                setActiveFrenteId(frenteId);
                setSelectedDate(date);
                setEntryMode('form');
            };

            const handleConclude = async (frenteId, date) => {
                if (!confirm('Deseja realmente concluir este lançamento?')) return;
                
                const report = allData[frenteId]?.[date];
                if (!report) return;

                const currentUser = session?.user?.email || 'Desconhecido';
                const updatedReport = { 
                    ...report, 
                    status: 'completed',
                    concluded_by: currentUser,
                    last_editor: currentUser,
                    updated_at: new Date().toISOString()
                };

                // Optimistic update
                setAllData(prev => ({
                    ...prev,
                    [frenteId]: {
                        ...prev[frenteId],
                        [date]: updatedReport
                    }
                }));

                try {
                    let tableName = 'daily_reports'; 
                    if (plantId === 'cambui') tableName = 'daily_reports_cambui';
                    else if (plantId === 'panorama') tableName = 'daily_reports_panorama';
                    else if (plantId === 'vale-verdao') tableName = 'daily_reports_vale_verdao';
                    else if (plantId === 'floresta') tableName = 'daily_reports_floresta';

                    const { error } = await supabaseClient
                        .from(tableName)
                        .upsert({
                            frente_id: frenteId,
                            date: date,
                            report_data: updatedReport
                        }, { onConflict: 'frente_id, date' });

                    if (error) throw error;
                    setNotification({ message: 'Lançamento concluído com sucesso!', type: 'success' });
                } catch (err) {
                    console.error("Error concluding:", err);
                    setNotification({ message: 'Erro ao concluir lançamento.', type: 'error' });
                }
            };

            const handleLoadEntry = (targetPlantId, targetDate, targetFrenteId) => {
                setPlantId(targetPlantId);
                setSelectedDate(targetDate);
                setActiveFrenteId(targetFrenteId);
                setShowAdminPanel(false);
                setRefreshTrigger(prev => prev + 1); // Ensure we have fresh data
                setNotification({ message: `Carregando dados de ${targetFrenteId}...`, type: 'success' });
            };

            // Calculate Previous Readings for Validation
            const lastReadings = useMemo(() => {
                const readings = {};
                if (!allData || !activeFrenteId) return readings;

                const frenteData = allData[activeFrenteId];
                if (!frenteData) return readings;

                const previousDates = Object.keys(frenteData)
                    .filter(d => d < selectedDate)
                    .sort()
                    .reverse();

                if (previousDates.length === 0) return readings;

                for (const date of previousDates) {
                    const report = frenteData[date];
                    if (!report || !report.groups) continue;

                    report.groups.forEach(group => {
                        if (!group.items) return;
                        group.items.forEach(item => {
                            if (!item.frota) return;
                            if (!readings[item.frota]) {
                                const finalB = item.shiftB?.final;
                                const finalA = item.shiftA?.final;
                                
                                let finalVal = null;
                                if (finalB !== null && finalB !== undefined) finalVal = finalB;
                                else if (finalA !== null && finalA !== undefined) finalVal = finalA;
                                
                                if (finalVal !== null) {
                                    readings[item.frota] = {
                                        value: finalVal,
                                        date: date
                                    };
                                }
                            }
                        });
                    });
                }
                return readings;
            }, [allData, activeFrenteId, selectedDate]);

            const playErrorSound = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // Sirene / Alerta Intenso
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.type = 'square'; // Som mais "agressivo"
                    
                    const now = ctx.currentTime;
                    
                    // Padrão de Sirene (Sobe e Desce)
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.linearRampToValueAtTime(900, now + 0.2);
                    osc.frequency.linearRampToValueAtTime(600, now + 0.4);
                    osc.frequency.linearRampToValueAtTime(900, now + 0.6);
                    osc.frequency.linearRampToValueAtTime(600, now + 0.8);
                    
                    // Volume constante e depois fade out
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.setValueAtTime(0.3, now + 0.8);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
                    
                    osc.start(now);
                    osc.stop(now + 1.0);

                } catch (e) {
                    console.error("Audio context error", e);
                }
            };

            const copyWhatsAppReport = () => {
                const report = allData[activeFrenteId]?.[selectedDate];
                if (!report) {
                    alert("Sem dados para gerar relatório.");
                    return;
                }

                // Generate Plain Text for WhatsApp
                let plainText = `*Usina ${plant.name}*\n`;
                plainText += `*Frente ${activeFrenteId}*\n\n`;

                report.groups.forEach(group => {
                    if (!group.items || group.items.length === 0) return;
                    
                    plainText += `*${group.name}*\n`;
                    
                    group.items.forEach(item => {
                        if (item.status === 'issue') {
                             const obs = item.obs ? item.obs : 'motivo de parada';
                             plainText += `❌ ${item.frota} -> ${obs.toUpperCase()}\n`;
                        } else {
                             plainText += `✅ ${item.frota}\n`;
                        }
                    });
                    plainText += '\n';
                });
                
                // Fallback copy function
                const fallbackCopyTextToClipboard = (text) => {
                    var textArea = document.createElement("textarea");
                    textArea.value = text;
                    
                    // Avoid scrolling to bottom
                    textArea.style.top = "0";
                    textArea.style.left = "0";
                    textArea.style.position = "fixed";
                    
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    
                    try {
                        var successful = document.execCommand('copy');
                        var msg = successful ? 'successful' : 'unsuccessful';
                        alert("Relatório copiado para a área de transferência!");
                    } catch (err) {
                        console.error('Fallback: Oops, unable to copy', err);
                        alert("Erro ao copiar relatório.");
                    }
                    
                    document.body.removeChild(textArea);
                }

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(plainText).then(() => {
                        alert("Relatório copiado para a área de transferência!");
                    }, (err) => {
                        console.error('Async: Could not copy text: ', err);
                        fallbackCopyTextToClipboard(plainText);
                    });
                } else {
                    fallbackCopyTextToClipboard(plainText);
                }
            };

            // Mobile Handlers
            const handleMobileNewLaunch = () => {
                if (!activeFrenteId && Object.keys(allData).length > 0) {
                    setActiveFrenteId(Object.keys(allData)[0]);
                }
                setMobileView('shift');
            };

            const handleMobileEditLaunch = (item) => {
                const report = allData[item.frenteId]?.[item.date];
                if (report?.status === 'completed' && !isAdmin) {
                    setNotification({ message: 'Lançamento concluído não pode ser editado por usuários não administradores.', type: 'warning' });
                    return;
                }
                setActiveFrenteId(item.frenteId);
                setSelectedDate(item.date);
                setMobileView('shift');
            };

            const handleMobileSelectShift = (shift) => {
                setMobileShift(shift);
                setMobileView('input');
            };

            const handleMobileBack = () => {
                if (mobileView === 'input') setMobileView('shift');
                else if (mobileView === 'shift') setMobileView('home');
            };

            if (!session) {
                return <Auth plants={PLANTS} />;
            }

            if (showAdminPanel) {
                return <AdminPanel 
                    session={session} 
                    plants={PLANTS} 
                    onClose={() => {
                        setShowAdminPanel(false);
                        setRefreshTrigger(prev => prev + 1); // Refresh data on close in case of deletions
                    }} 
                    onLoadEntry={handleLoadEntry} 
                />;
            }

            // Mobile App Flow
            if (isAppMode) {
                let mobileContent;
                if (mobileView === 'shift') {
                    mobileContent = <MobileShiftSelector onSelectShift={handleMobileSelectShift} onBack={handleMobileBack} />;
                } else if (mobileView === 'input') {
                    if (!currentData) {
                        mobileContent = <div className="p-4 text-center">Carregando dados...</div>;
                    } else {
                        mobileContent = (
                            <ErrorBoundary>
                                <MobileInputList 
                                    groups={currentData.groups || []} 
                                    shift={mobileShift} 
                                    frenteType={frenteTypes[activeFrenteId] || 'plantadora'}
                                    onCopyReport={copyWhatsAppReport}
                                    onUpdate={(groupId, itemId, field, value) => {
                                 // Bypass validation for status and obs updates
                                 if (field === 'status' || field === 'obs') {
                                     updateEquipment(groupId, itemId, field, value);
                                     return;
                                 }

                                 const val = value === '' ? null : parseFloat(value);
                                 
                                 // Mobile Validation with Sound and Alert
                                 if (val !== null) {
                                     const group = currentData.groups.find(g => g.id === groupId);
                                     const item = group ? group.items.find(i => i.id === itemId) : null;
                                     
                                     if (item && item.frota) {
                                         // 1. Check against Previous Reading - REMOVED TO ALLOW TYPING
                                         // 2. Check Consistency (Final >= Initial) - REMOVED TO ALLOW TYPING
                                         
                                         const parts = field.split('.');
                                         if (parts.length === 2) {
                                             const shiftName = parts[0]; 
                                             const type = parts[1];
 
                                            // 3. Check 12 Hour Limit
                                            let newInitial = item[shiftName].initial;
                                            let newFinal = item[shiftName].final;
                                            
                                            if (type === 'initial') newInitial = val;
                                            if (type === 'final') newFinal = val;
                                            
                                            if (newInitial !== null && newFinal !== null) {
                                                const diff = newFinal - newInitial;
                                                if (diff > 12) {
                                                    playErrorSound();
                                                    setMobileConfirmData({ groupId, itemId, field, value: val, diff, shiftName });
                                                    return; // Block update until confirmed
                                                }
                                            }
                                        }
                                    }
                                }

                                updateEquipment(groupId, itemId, field, val);
                            }} 
                            onBack={handleMobileBack} 
                            onSave={handleSave} 
                            isSaving={isSaving} 
                        />
                    </ErrorBoundary>
                );
                    }
                } else {
                    // Default to home
                    mobileContent = <MobileHome 
                        history={historyList} 
                        onNewLaunch={handleMobileNewLaunch} 
                        onEditLaunch={handleMobileEditLaunch} 
                        onRefresh={() => {
                            setRefreshTrigger(prev => prev + 1);
                            setNotification({ message: 'Atualizando dados...', type: 'success' });
                        }}
                    />;
                }

                return (
                    <div className="min-h-screen bg-gray-100 font-sans">
                        {notification && (
                            <ToastNotification 
                                message={notification.message} 
                                type={notification.type} 
                                onClose={() => setNotification(null)} 
                            />
                        )}
                        {mobileContent}
                        {mobileConfirmData && (
                            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[10000] p-4 animate-fade-in">
                                <div className="bg-white rounded-lg shadow-2xl w-full max-w-sm overflow-hidden border-2 border-red-600">
                                    <div className="bg-red-600 p-4 text-white flex items-center">
                                        <Icons.AlertTriangle size={24} className="mr-2" />
                                        <h3 className="font-bold text-lg">Bloqueio: Excesso de Horas</h3>
                                    </div>
                                    <div className="p-6 text-center">
                                        <p className="text-gray-800 text-lg mb-4">
                                            A diferença lançada é de <strong className="text-red-600 text-xl">{mobileConfirmData.diff.toFixed(1)} horas</strong><br/>
                                            no {mobileConfirmData.shiftName === 'shiftA' ? 'Turno A' : 'Turno B'}.
                                        </p>
                                        <p className="text-gray-600 font-bold">
                                            Valor não permitido! O limite máximo é de 12 horas.
                                        </p>
                                    </div>
                                    <div className="p-4 bg-gray-50 flex justify-center">
                                        <button 
                                            onClick={() => setMobileConfirmData(null)}
                                            className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded shadow"
                                        >
                                            Corrigir Valor
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100 font-sans">
                    {notification && (
                        <ToastNotification 
                            message={notification.message} 
                            type={notification.type} 
                            onClose={() => setNotification(null)} 
                        />
                    )}
                    <TransferModal 
                        isOpen={transferModalOpen}
                        onClose={() => setTransferModalOpen(false)}
                        onTransfer={confirmTransfer}
                        allFrentes={Object.keys(allData)}
                        currentFrenteId={activeFrenteId}
                    />
                    {showNewFrenteModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                            <div className="bg-white rounded-lg p-6 w-96 shadow-2xl">
                                <h2 className="text-xl font-bold mb-4 text-gray-800">Nova Frente</h2>
                                
                                <div className="mb-4">
                                    <label className="block text-sm font-bold mb-1 text-gray-700">Nome da Frente</label>
                                    <input 
                                        type="text" 
                                        value={newFrenteName}
                                        onChange={(e) => setNewFrenteName(e.target.value)}
                                        className="w-full border border-gray-300 p-2 rounded uppercase focus:outline-none focus:border-blue-500 text-black"
                                        placeholder="EX: F4003"
                                        autoFocus
                                    />
                                </div>

                                <div className="mb-6">
                                    <label className="block text-sm font-bold mb-2 text-gray-700">Tipo de Frente</label>
                                    <div className="flex space-x-4">
                                        <label className="flex items-center space-x-2 cursor-pointer">
                                            <input 
                                                type="radio" 
                                                name="frenteType"
                                                value="plantadora"
                                                checked={newFrenteType === 'plantadora'}
                                                onChange={(e) => setNewFrenteType(e.target.value)}
                                                className="form-radio text-green-600 h-4 w-4"
                                            />
                                            <span className="text-gray-800">Plantadora</span>
                                        </label>
                                        <label className="flex items-center space-x-2 cursor-pointer">
                                            <input 
                                                type="radio" 
                                                name="frenteType"
                                                value="distribuidora"
                                                checked={newFrenteType === 'distribuidora'}
                                                onChange={(e) => setNewFrenteType(e.target.value)}
                                                className="form-radio text-blue-600 h-4 w-4"
                                            />
                                            <span className="text-gray-800">Distribuidora</span>
                                        </label>
                                        <label className="flex items-center space-x-2 cursor-pointer">
                                            <input 
                                                type="radio" 
                                                name="frenteType"
                                                value="caminhoes"
                                                checked={newFrenteType === 'caminhoes'}
                                                onChange={(e) => setNewFrenteType(e.target.value)}
                                                className="form-radio text-orange-600 h-4 w-4"
                                            />
                                            <span className="text-gray-800">Caminhões</span>
                                        </label>
                                    </div>
                                </div>

                                <div className="flex justify-end space-x-2">
                                    <button 
                                        onClick={() => setShowNewFrenteModal(false)}
                                        className="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400 text-gray-800 font-medium"
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        onClick={handleCreateFrente}
                                        className="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 font-bold"
                                    >
                                        Criar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    {showSql && <SqlInstructions onClose={() => setShowSql(false)} />}
                    {isLoading && (
                        <div className="fixed inset-0 bg-white/80 flex items-center justify-center z-50">
                            <div className={`animate-spin rounded-full h-16 w-16 border-t-4 ${plant ? plant.borderClass : 'border-blue-500'}`}></div>
                        </div>
                    )}
                    {/* Top Navigation Bar */}
                    <div className="bg-gray-800 text-white shadow-lg sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center space-y-3 md:space-y-0">
                            <div className="flex items-center justify-center space-x-4 w-full md:w-auto">
                                <div className="flex flex-col relative group">
                                    <div className="flex items-center space-x-2 cursor-pointer">
                                        <select 
                                            value={plantId} 
                                            onChange={(e) => setPlantId(e.target.value)}
                                            className={`text-xl font-bold ${plant.color} tracking-tighter bg-gray-800 border-none focus:ring-0 cursor-pointer appearance-none pr-6`}
                                        >
                                            {availablePlants.map(p => (
                                                <option key={p.id} value={p.id} className="text-black bg-white">{p.name}</option>
                                            ))}
                                        </select>
                                        <Icons.ChevronDown size={16} className={`absolute right-0 top-1.5 pointer-events-none ${plant.color}`} />
                                    </div>
                                    <span className="text-xs text-white font-normal block text-center md:text-left">Sistema de Gestão</span>
                                </div>
                                
                                {!isAppMode && (
                                    <>
                                        <div className="h-8 w-px bg-gray-600 mx-2 hidden md:block"></div>
                                        <div className="flex space-x-2 hidden md:flex">
                                            <button 
                                                onClick={() => { setActiveTab('launches'); setView('entry'); }}
                                                className={`px-3 py-1 rounded flex items-center space-x-1 ${activeTab === 'launches' && view === 'entry' ? 'bg-orange-600 text-white' : 'text-gray-300 hover:text-white hover:bg-gray-700'}`}
                                            >
                                                <Icons.FileSpreadsheet size={18} />
                                                <span>Lançamento</span>
                                            </button>
                                            <button 
                                                onClick={() => { setActiveTab('launches'); setView('dashboard'); }}
                                                className={`px-3 py-1 rounded flex items-center space-x-1 ${activeTab === 'launches' && view === 'dashboard' ? 'bg-orange-600 text-white' : 'text-gray-300 hover:text-white hover:bg-gray-700'}`}
                                            >
                                                <Icons.LayoutDashboard size={18} />
                                                <span>Dashboard</span>
                                            </button>
                                            <button 
                                                onClick={() => setActiveTab('equipments')}
                                                className={`px-3 py-1 rounded flex items-center space-x-1 ${activeTab === 'equipments' ? 'bg-orange-600 text-white' : 'text-gray-300 hover:text-white hover:bg-gray-700'}`}
                                            >
                                                <Icons.Truck size={18} />
                                                <span>Equipamentos</span>
                                            </button>
                                            <button 
                                                onClick={() => setActiveTab('availability')}
                                                className={`px-3 py-1 rounded flex items-center space-x-1 ${activeTab === 'availability' ? 'bg-orange-600 text-white' : 'text-gray-300 hover:text-white hover:bg-gray-700'}`}
                                            >
                                                <Icons.Wrench size={18} />
                                                <span>Disponibilidade</span>
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>

                            <div className="flex flex-wrap items-center justify-center gap-2 w-full md:w-auto">
                                <button 
                                    onClick={handleSave} 
                                    disabled={isSaving}
                                    className={`flex items-center space-x-1 px-4 py-1 rounded font-bold shadow-lg transition-all ${isSaving ? 'bg-gray-500 cursor-not-allowed' : 'bg-green-600 hover:bg-green-500 text-white'}`}
                                    title="Salvar alterações no banco de dados"
                                >
                                    {isSaving ? (
                                        <div className="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
                                    ) : (
                                        <Icons.Check size={18} />
                                    )}
                                    <span>{isSaving ? 'Salvando...' : 'Salvar'}</span>
                                </button>

                                <div className="h-6 w-px bg-gray-600 mx-2 hidden md:block"></div>

                                <div className="flex items-center bg-gray-700 rounded px-2 py-1 border border-gray-600">
                                    <span className="text-gray-400 text-sm mr-2 hidden sm:inline">{isAppMode ? 'Data:' : 'Data do Lançamento:'}</span>
                                    <input 
                                        type="date" 
                                        value={selectedDate}
                                        onChange={(e) => {
                                            if (e.target.value) setSelectedDate(e.target.value);
                                        }}
                                        className="bg-white text-black rounded px-2 py-1 focus:outline-none text-sm font-bold cursor-pointer"
                                    />
                                </div>

                                <div className="h-6 w-px bg-gray-600 mx-2 hidden md:block"></div>

                                <div className="flex items-center space-x-2 bg-gray-700/50 p-1 rounded">
                                    <label className="text-sm text-gray-400 hidden sm:inline">Frente:</label>
                                    <select 
                                        value={activeFrenteId} 
                                        onChange={(e) => setActiveFrenteId(e.target.value)}
                                        className="bg-gray-700 text-white border border-gray-600 rounded px-2 py-1 focus:outline-none focus:border-orange-500"
                                    >
                                        {Object.keys(allData).map(key => (
                                            <option key={key} value={key}>{key}</option>
                                        ))}
                                    </select>
                                    <button onClick={() => setShowNewFrenteModal(true)} className="bg-green-600 hover:bg-green-700 p-1 rounded text-white" title="Adicionar Frente">
                                        <Icons.Plus size={20} />
                                    </button>
                                    {activeFrenteId && (
                                        <button onClick={deleteFrente} className="bg-red-600 hover:bg-red-700 p-1 rounded text-white" title="Excluir Frente Atual">
                                            <Icons.Trash size={20} />
                                        </button>
                                    )}
                                </div>
                                
                                <div className="h-6 w-px bg-gray-600 mx-2 hidden md:block"></div>
                                
                                {isAdmin && !isAppMode && (
                                    <>
                                        <button 
                                            onClick={() => setShowAdminPanel(true)} 
                                            className="text-red-400 hover:text-red-300 p-1 rounded" 
                                            title="Painel Administrativo"
                                        >
                                            <Icons.Shield size={24} />
                                        </button>
                                        <div className="h-6 w-px bg-gray-600 mx-2"></div>
                                    </>
                                )}

                                <button 
                                    onClick={() => supabaseClient.auth.signOut()} 
                                    className="text-gray-300 hover:text-white text-sm font-medium flex items-center space-x-1 ml-2"
                                    title="Sair do sistema"
                                >
                                    <span className="hidden sm:inline">Sair</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto p-4">
                        {activeTab === 'availability' ? (
                            <AvailabilityView plants={PLANTS} selectedPlant={plantId} />
                        ) : activeTab === 'equipments' ? (
                            <EquipmentPanel plantId={plantId} plant={plant} />
                        ) : !activeFrenteId && view === 'entry' ? (
                             <div className="bg-white rounded-xl shadow-lg p-12 text-center mt-6">
                                <div className="flex justify-center mb-6">
                                    <div className="bg-orange-100 p-6 rounded-full">
                                        <Icons.LayoutDashboard size={64} className="text-orange-600" />
                                    </div>
                                </div>
                                <h2 className="text-2xl font-bold text-gray-800 mb-2">Nenhuma Frente Selecionada</h2>
                                <p className="text-gray-500 mb-8 max-w-md mx-auto">
                                    Comece criando uma nova frente de trabalho para gerenciar seus apontamentos.
                                </p>
                                <button
                                    onClick={() => setShowNewFrenteModal(true)}
                                    className="bg-orange-600 text-white px-6 py-3 rounded-lg hover:bg-orange-700 font-bold transition-all shadow-lg hover:shadow-orange-500/30 flex items-center mx-auto space-x-2"
                                >
                                    <Icons.Plus size={20} />
                                    <span>Criar Minha Primeira Frente</span>
                                </button>
                            </div>
                        ) : view === 'entry' ? (
                            <div className="bg-white p-2 md:p-4 shadow-lg rounded overflow-hidden">
                                {entryMode === 'list' && !isAppMode ? (
                                    <div className="p-4">
                                        <div className="flex justify-between items-center mb-6">
                                            <h2 className="text-2xl font-bold text-gray-800">Histórico de Lançamentos</h2>
                                            <button 
                                                onClick={() => {
                                                    setEntryMode('form');
                                                }}
                                                className="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700 font-bold flex items-center space-x-2"
                                            >
                                                <Icons.Plus size={20} />
                                                <span>Novo Lançamento</span>
                                            </button>
                                        </div>

                                        <div className="overflow-x-auto">
                                            <table className="min-w-full bg-white border border-gray-200">
                                                <thead className="bg-gray-50">
                                                    <tr>
                                                        <th className="px-6 py-3 border-b text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Data</th>
                                                        <th className="px-6 py-3 border-b text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Frente</th>
                                                        <th className="px-6 py-3 border-b text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                                        <th className="px-6 py-3 border-b text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Usuário</th>
                                                        <th className="px-6 py-3 border-b text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-200">
                                                    {historyList.map((item, idx) => (
                                                        <tr key={idx} className="hover:bg-gray-50">
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                                {new Date(item.date + 'T12:00:00').toLocaleDateString('pt-BR')}
                                                            </td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{item.frenteId}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap">
                                                                <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${
                                                                    item.status === 'completed' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'
                                                                }`}>
                                                                    {item.status === 'completed' ? 'Concluído' : 'Pendente'}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-xs text-gray-500 max-w-[150px] truncate" title={item.lastEditor}>
                                                                {item.lastEditor}
                                                            </td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
                                                                <button 
                                                                    onClick={() => handleEditHistory(item.frenteId, item.date)}
                                                                    className="text-indigo-600 hover:text-indigo-900 font-bold"
                                                                >
                                                                    Editar
                                                                </button>
                                                                {item.status !== 'completed' && (
                                                                    <button 
                                                                        onClick={() => handleConclude(item.frenteId, item.date)}
                                                                        className="text-green-600 hover:text-green-900 font-bold"
                                                                    >
                                                                        Concluir
                                                                    </button>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {historyList.length === 0 && (
                                                        <tr>
                                                            <td colSpan="4" className="px-6 py-4 text-center text-sm text-gray-500">
                                                                Nenhum lançamento encontrado.
                                                            </td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                        {!isAppMode && (
                                            <button 
                                                onClick={() => setEntryMode('list')}
                                                className="mb-4 text-gray-600 hover:text-gray-900 flex items-center space-x-1"
                                            >
                                                <Icons.ArrowLeft size={20} />
                                                <span>Voltar para Histórico</span>
                                            </button>
                                        )}
                                        {currentData ? (
                                            <>
                                                {/* Report Header */}
                                                {!isAppMode ? (
                                            <div className="bg-white mb-4">
                                                <div className={`flex flex-col md:flex-row justify-between items-center md:items-end border-b-2 ${plant.borderClass} pb-2 mb-2`}>
                                                    <div className="w-full md:w-48 flex items-center justify-center md:justify-start space-x-2 mb-2 md:mb-0">
                                                        <PlantLogo plant={plant} />
                                                        <div className="block text-left"> 
                                                            <div className={`text-3xl font-black ${plant.color} tracking-tighter leading-none`}>{plant.name}</div>
                                                            <div className="text-sm font-bold text-black leading-none ml-1">{plant.subtitle}</div>
                                                        </div>
                                                    </div>
                                                    <div className="text-center flex-grow px-2 md:px-4 w-full md:w-auto mb-2 md:mb-0">
                                                        <h1 className={`text-xl md:text-2xl font-bold italic text-black ${plant.bgClass} rounded px-2`}>
                                                            Horas Trabalhadas por Equipamentos. {activeFrenteId}
                                                        </h1>
                                                    </div>
                                                    <div className="w-full md:w-32 hidden md:block"></div>
                                                </div>
                                                
                                                <div className="flex border border-black text-xs font-bold text-center bg-gray-100 overflow-x-auto">
                                                    <div className="w-24 min-w-[6rem] border-r border-black flex items-center justify-center p-1 bg-white">Turnos</div>
                                                    <div className="flex-grow flex flex-col min-w-[12rem]">
                                                        <div className="border-b border-black p-1 bg-white">FECHAMENTO HORIMETRO</div>
                                                        <div className="flex flex-grow">
                                                            <div className="w-1/2 border-r border-black p-1 bg-white">"A"</div>
                                                            <div className="w-1/2 p-1 bg-white">"B"</div>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className={`${plant.solidBgClass} text-center font-bold text-lg md:text-xl border-x border-b border-black py-1 text-white mt-1 shadow-md`}>
                                                    Horimetro das Colhedoras e Tratores
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="bg-white mb-2 pb-2 border-b-2 border-orange-500">
                                                <h1 className="text-xl font-bold text-center text-orange-600 uppercase tracking-tighter">
                                                    Lançamento: {activeFrenteId}
                                                </h1>
                                            </div>
                                        )}

                                        <div className="grid grid-cols-1 gap-4">
                                            {currentData.groups.map(group => (
                                                <EquipmentGroupTable 
                                                    key={group.id} 
                                                    group={group} 
                                                    plant={plant}
                                                    lastReadings={lastReadings}
                                                    onUpdateEquipment={updateEquipment}
                                                    onUpdateGroup={updateGroup}
                                                    onAddEquipment={addEquipment}
                                                    onDeleteEquipment={deleteEquipment}
                                                    onTransferEquipment={handleTransferEquipment}
                                                    onSqlError={() => setShowSql(true)}
                                                    isAppMode={isAppMode}
                                                    frenteType={frenteTypes[activeFrenteId] || 'plantadora'}
                                                />
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="text-center py-20">
                                        <div className="text-gray-400 text-xl mb-4">Nenhuma frente selecionada ou cadastrada para esta unidade.</div>
                                        <button 
                                            onClick={addNewFrente}
                                            className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded shadow-lg"
                                        >
                                            <Icons.Plus size={20} className="inline mr-2" />
                                            Criar Nova Frente
                                        </button>
                                    </div>
                                )}
                                    </>
                                )}
                            </div>
                        ) : (
                            currentData ? (
                                <Dashboard data={currentData} allData={allData} selectedDate={selectedDate} plant={plant} frenteTypes={frenteTypes} />
                            ) : (
                                <div className="text-center py-20 text-gray-400">Nenhum dado para exibir no Dashboard.</div>
                            )
                        )}
                        
                        <div className="mt-8 text-gray-500 text-xs text-center pb-8">
                            <p>Sistema Avançado de Gestão de Horimetro - {plant.name} v2.1</p>
                        </div>
                    </div>
                </div>
            );
        };

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(
                <ErrorBoundary>
                    <App />
                </ErrorBoundary>
            );
        } catch (err) {
            console.error("FATAL ERROR MOUNTING APP:", err);
            document.body.innerHTML += '<div style="color:red; padding:20px; font-size: 24px;"><h1>FATAL ERROR MOUNTING APP</h1><pre>' + err.toString() + '</pre></div>';
        }
    </script>
</body>
</html>
